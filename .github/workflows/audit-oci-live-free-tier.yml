# Live-audit every OCI tenancy against Always Free caps via WIF.
# Complements inventory validation (validate-oci-free-tier.py) which only
# sees R2 nodes.yaml; this hits the OCI APIs for instances, volumes,
# VCNs, object storage, reserved IPs, LBs, and ADBs.
name: audit-oci-live-free-tier

on:
  workflow_dispatch:
  # Optional nightly signal; disable if noisy.
  # schedule:
  #   - cron: "17 6 * * *"

permissions:
  contents: read
  id-token: write # OIDC → OCI WIF

concurrency:
  group: audit-oci-live-free-tier
  cancel-in-progress: false

jobs:
  discover-oracle:
    runs-on: ubuntu-latest
    outputs:
      accounts: ${{ steps.list.outputs.accounts }}
      count: ${{ steps.list.outputs.count }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5
      - name: Enumerate oracle accounts
        id: list
        run: |
          set -euo pipefail
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          mkdir -p /tmp/oracle-inv
          aws s3 sync "s3://cluster-tofu-state/production/inventory/oracle/" /tmp/oracle-inv/ \
            --endpoint-url "$R2_ENDPOINT" --region us-east-1 \
            --exclude "*" --include "*/auth.yaml"
          pip install --quiet pyyaml
          accounts=$(python3 - <<'PY'
          import json, os, yaml
          base = "/tmp/oracle-inv"
          out = []
          for entry in sorted(os.listdir(base)):
              auth_p = os.path.join(base, entry, "auth.yaml")
              if not os.path.exists(auth_p):
                  continue
              data = yaml.safe_load(open(auth_p)) or {}
              auth = data.get("auth", data)
              if not auth.get("region") or not auth.get("tenancy_ocid"):
                  continue
              comp = (
                  auth.get("compartment_ocid")
                  or auth.get("compartment_id")
                  or data.get("compartment_ocid")
                  or data.get("compartment_id")
              )
              if not comp:
                  continue
              out.append({
                  "profile": entry,
                  "region": auth["region"],
                  "tenancy_ocid": auth["tenancy_ocid"],
                  "compartment_ocid": comp,
              })
          print(json.dumps(out))
          PY
          )
          count=$(jq 'length' <<<"$accounts")
          echo "::notice::oracle accounts (${count}): ${accounts}"
          echo "accounts=${accounts}" >> "$GITHUB_OUTPUT"
          echo "count=${count}" >> "$GITHUB_OUTPUT"

  audit:
    needs: discover-oracle
    if: needs.discover-oracle.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        account: ${{ fromJson(needs.discover-oracle.outputs.accounts) }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      OCI_CLI_AUTH: security_token
      PROFILE: ${{ matrix.account.profile }}
      REGION: ${{ matrix.account.region }}
      COMPARTMENT_OCID: ${{ matrix.account.compartment_ocid }}
      TENANCY_OCID: ${{ matrix.account.tenancy_ocid }}
      ACCOUNT: ${{ matrix.account.profile }}
    steps:
      - uses: actions/checkout@v5

      - name: Configure OCI WIF
        run: |
          set -euo pipefail
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          TMPDIR_AUTH=$(mktemp -d)
          # R2 inventory auth.yaml is plaintext (repo copies are sops-encrypted).
          aws s3 sync "s3://cluster-tofu-state/production/inventory/oracle/${PROFILE}/" \
            "${TMPDIR_AUTH}/${PROFILE}/" \
            --endpoint-url "$R2_ENDPOINT" --region us-east-1 \
            --exclude "*" --include "auth.yaml"
          pip install --quiet pyyaml
          AUTH_JSON=$(python3 scripts/build-oci-auth-json.py "${TMPDIR_AUTH}")
          echo "$AUTH_JSON" > /tmp/oci_auth_accounts.json
          scripts/configure-oci-wif.sh /tmp/oci_auth_accounts.json

      - name: Install OCI CLI
        run: |
          set -euo pipefail
          pip install --quiet oci-cli
          oci --version

      - name: Live free-tier audit
        run: |
          set -euo pipefail
          chmod +x scripts/audit-oci-live-free-tier.sh
          scripts/audit-oci-live-free-tier.sh
