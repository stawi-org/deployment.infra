# One-shot cleanup: delete transitional files from production/inventory/
# that are no longer part of the agreed layout.
#
# Agreed layout keeps only:
#   <provider>/<account>/auth.yaml
#   <provider>/<account>/nodes.yaml           (evolving: declarative + provider_data)
#   <provider>/<account>/<talos-version>/<node>.yaml
#
# This workflow removes:
#   <provider>/<account>/state.yaml
#   <provider>/<account>/talos-state.yaml
#   <provider>/<account>/machine-configs.yaml
#
# No user-controlled inputs reach run: blocks — no injection risk.
name: cleanup-legacy-inventory
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  prune:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID:        ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:    ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ACCOUNT_ID:            ${{ secrets.R2_ACCOUNT_ID }}
      R2_ENDPOINT:              https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
    steps:
      - uses: actions/checkout@v5
      - name: Delete legacy inventory files from R2
        run: scripts/cleanup-legacy-inventory.sh
