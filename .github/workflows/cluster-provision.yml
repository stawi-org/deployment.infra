# Single entrypoint for reproducible cluster bring-up / repair.
#
# Modes:
#   full     — images (only if catalog incomplete or force) → tofu-apply →
#              optional wipe → sync-cluster-template → optional flux
#   infra    — tofu-apply only (fast path for add/remove nodes)
#   cluster  — force-clear (optional) + sync-cluster-template + Ready
#   images   — sync-talos-images only (still no-ops when catalog ready)
#
# Image efficiency: preflight compares R2 talos-images.yaml against the
# current schematic + every accounts.yaml roster entry. When complete,
# mode=full skips sync-talos-images entirely so day-2 provision is just
# tofu-apply. force_image_sync=true always rebuilds.
#
# All destructive sub-steps require confirm tokens. Dry-run skips applies.
#
# Design goals: one run ID, no manual multi-workflow sequencing, modes
# that stay valid as account count grows (infra work is still the
# per-account matrix inside tofu-apply).
name: cluster-provision

on:
  workflow_call:
    inputs:
      mode:
        description: "full | infra | cluster | images"
        type: string
        required: false
        default: full
      talos_version:
        description: "Talos version for image sync (empty = versions pin)"
        type: string
        required: false
        default: ""
      force_image_sync:
        description: Force image rebuild even if catalog already complete
        type: boolean
        required: false
        default: false
      wipe_cluster:
        description: Force-clear Omni cluster before template sync
        type: boolean
        required: false
        default: false
      confirm_wipe:
        description: Type stawi to confirm wipe_cluster
        type: string
        required: false
        default: ""
      deploy_flux:
        description: Run deploy-flux after cluster Ready
        type: boolean
        required: false
        default: true
      dry_run:
        description: Validate / plan path only where supported
        type: boolean
        required: false
        default: false
  workflow_dispatch:
    inputs:
      mode:
        description: "full | infra | cluster | images"
        type: choice
        options: [full, infra, cluster, images]
        default: full
      talos_version:
        description: "Talos version for image sync (empty = versions.auto.tfvars.json)"
        type: string
        required: false
        default: ""
      force_image_sync:
        description: Force image rebuild even if catalog already complete
        type: boolean
        default: false
      wipe_cluster:
        description: Force-clear Omni cluster before template sync (cluster|full)
        type: boolean
        default: false
      confirm_wipe:
        description: Type stawi to confirm wipe_cluster
        type: string
        required: false
        default: ""
      deploy_flux:
        description: Run deploy-flux after cluster Ready
        type: boolean
        default: true
      dry_run:
        description: Validate / plan path only where supported
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: cluster-provision-production
  cancel-in-progress: false

env:
  OMNI_VERSION: v1.9.3

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      talos_version: ${{ steps.versions.outputs.talos_version }}
      free_tier_ok: ${{ steps.free_tier.outputs.ok }}
      need_images: ${{ steps.catalog.outputs.need_images }}
      catalog_ready: ${{ steps.catalog.outputs.ready }}
      catalog_reason: ${{ steps.catalog.outputs.reason }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      MODE: ${{ inputs.mode }}
      WIPE: ${{ inputs.wipe_cluster }}
      CONFIRM_WIPE: ${{ inputs.confirm_wipe }}
      TALOS_VERSION_INPUT: ${{ inputs.talos_version }}
      FORCE_IMAGE_SYNC: ${{ inputs.force_image_sync }}
    steps:
      - uses: actions/checkout@v5

      - name: Confirm wipe token
        if: env.WIPE == 'true'
        run: |
          set -euo pipefail
          if [[ "$CONFIRM_WIPE" != "stawi" ]]; then
            echo "::error::wipe_cluster=true requires confirm_wipe=stawi"
            exit 1
          fi
          if [[ "$MODE" != "full" && "$MODE" != "cluster" ]]; then
            echo "::error::wipe_cluster only valid for mode=full|cluster"
            exit 1
          fi

      - name: Resolve versions
        id: versions
        run: |
          set -euo pipefail
          pinned=$(jq -r '.talos_version' tofu/shared/versions.auto.tfvars.json)
          ver="${TALOS_VERSION_INPUT:-}"
          if [[ -z "$ver" ]]; then
            ver="$pinned"
          fi
          echo "talos_version=$ver" >> "$GITHUB_OUTPUT"
          echo "pinned_talos=$pinned" >> "$GITHUB_OUTPUT"
          echo "::notice::talos_version=$ver (pinned file=$pinned)"
          jq -r 'to_entries[] | "\(.key)=\(.value)"' tofu/shared/versions.auto.tfvars.json

      - name: Secrets present (non-empty smoke)
        run: |
          set -euo pipefail
          missing=0
          for name in OMNI_SERVICE_ACCOUNT_KEY R2_ACCOUNT_ID R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY; do
            # Values arrive via env only when mapped; check mapped ones.
            :
          done
          if [[ -z "${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}" ]]; then
            echo "::error::OMNI_SERVICE_ACCOUNT_KEY missing"; missing=1
          fi
          if [[ -z "${{ secrets.R2_ACCOUNT_ID }}" ]]; then
            echo "::error::R2_ACCOUNT_ID missing"; missing=1
          fi
          exit "$missing"

      - name: Omni health
        env:
          OMNI_ENDPOINT: https://cp.stawi.org
          OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}
        run: |
          set -euo pipefail
          curl -fsSL -o /usr/local/bin/omnictl.real \
            "https://github.com/siderolabs/omni/releases/download/${OMNI_VERSION}/omnictl-linux-amd64"
          chmod +x /usr/local/bin/omnictl.real
          cat > /usr/local/bin/omnictl <<'WRAP'
          #!/bin/bash
          exec /usr/local/bin/omnictl.real --insecure-skip-tls-verify "$@"
          WRAP
          chmod +x /usr/local/bin/omnictl
          # Soft-fail omni health in dry_run so operators can validate
          # inventory offline; hard-fail otherwise.
          if omnictl get user --output json >/dev/null 2>&1; then
            echo "::notice::Omni auth OK"
          else
            if [[ "${{ inputs.dry_run }}" == "true" ]]; then
              echo "::warning::Omni unreachable (dry_run continues)"
            else
              echo "::error::Omni unreachable or OMNI_SERVICE_ACCOUNT_KEY invalid"
              exit 1
            fi
          fi

      - name: Validate OCI Always Free inventory
        id: free_tier
        run: |
          set -euo pipefail
          pip install --quiet pyyaml
          mkdir -p /tmp/inventory
          aws s3 sync "s3://cluster-tofu-state/production/inventory/oracle/" /tmp/inventory/oracle/ \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --region us-east-1 || true
          if python3 scripts/validate-oci-free-tier.py --inventory-dir /tmp/inventory/oracle; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            if [[ "${{ inputs.dry_run }}" == "true" ]]; then
              echo "::warning::free-tier violations (dry_run continues)"
            else
              echo "::error::OCI inventory exceeds Always Free caps — reconcile with scripts/reconcile-oci-free-tier-inventory.py or workflow reconcile-oci-free-tier"
              exit 1
            fi
          fi

      # Fast path gate: skip the whole image pipeline when R2 already
      # has a schematic-matching catalog covering every roster account.
      # mode=images always wants a catalog pass (still no-ops inside
      # sync-talos-images when ready unless force).
      - name: Talos image catalog readiness
        id: catalog
        env:
          TALOS_VERSION: ${{ steps.versions.outputs.talos_version }}
        run: |
          set -euo pipefail
          pip install --quiet pyyaml
          mkdir -p /tmp
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          if ! aws s3 cp \
              "s3://cluster-tofu-state/production/inventory/talos-images.yaml" \
              /tmp/talos-images.yaml \
              --endpoint-url "$R2_ENDPOINT" --region us-east-1 2>/tmp/catalog-pull.err; then
            echo "::notice::no talos-images.yaml in R2 yet (first image sync required)"
            : > /tmp/talos-images.yaml
          fi
          force_args=()
          if [[ "${FORCE_IMAGE_SYNC}" == "true" ]]; then
            force_args+=(--force)
          fi
          # mode=images with force=false still runs the workflow so
          # operators can refresh reuse checks; catalog gate only
          # skips the images *job* for mode=full.
          python3 scripts/check-talos-image-catalog.py \
            --accounts-yaml tofu/shared/accounts.yaml \
            --catalog-yaml /tmp/talos-images.yaml \
            --schematic tofu/shared/schematics/cluster.yaml \
            --talos-version "${TALOS_VERSION}" \
            "${force_args[@]}" \
            --github-output
          need=$(grep -E '^need_images=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2-)
          ready=$(grep -E '^ready=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2-)
          reason=$(grep -E '^reason=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2-)
          echo "::notice::catalog ready=${ready} need_images=${need} — ${reason}"

  images:
    needs: preflight
    # mode=full: only when catalog incomplete or force_image_sync.
    # mode=images: always invoke (internal early-skip still applies).
    if: |
      needs.preflight.result == 'success'
      && inputs.dry_run != true
      && (
        inputs.mode == 'images'
        || (inputs.mode == 'full' && (
          needs.preflight.outputs.need_images == 'true'
          || inputs.force_image_sync == true
        ))
      )
    uses: ./.github/workflows/sync-talos-images.yml
    with:
      talos_version: ${{ needs.preflight.outputs.talos_version }}
      force: ${{ inputs.force_image_sync }}
    secrets: inherit

  # full|infra mode: tofu-apply matrix includes contabo/oracle/onprem/gcp
  # (and oci-storage). GCP cells appear only when tofu/shared/accounts.yaml
  # has non-empty gcp: keys; empty gcp: [] skips that matrix. No GCP
  # free-tier preflight (paid Spot capacity — OCI Always Free only above).
  infra:
    needs: [preflight, images]
    # images may report failure if a single oci-import matrix cell
    # fails (empty tenancy, OOC). Prefer proceeding when preflight
    # passed — inventory free-tier + Omni are the hard gates. Soft
    # images failure still usually left talos-images.yaml partially
    # updated (assemble-and-upload always() path).
    if: |
      always()
      && needs.preflight.result == 'success'
      && (inputs.mode == 'full' || inputs.mode == 'infra')
      && (needs.images.result == 'success' || needs.images.result == 'skipped' || needs.images.result == 'failure')
      && inputs.dry_run != true
    uses: ./.github/workflows/tofu-apply.yml
    secrets: inherit

  wipe:
    needs: [preflight, infra]
    if: |
      always()
      && needs.preflight.result == 'success'
      && inputs.wipe_cluster == true
      && inputs.dry_run != true
      && (inputs.mode == 'full' || inputs.mode == 'cluster')
      && needs.infra.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OMNI_ENDPOINT: https://cp.stawi.org
      OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}
    steps:
      - name: Install omnictl
        run: |
          set -euo pipefail
          curl -fsSL -o /usr/local/bin/omnictl.real \
            "https://github.com/siderolabs/omni/releases/download/${OMNI_VERSION}/omnictl-linux-amd64"
          chmod +x /usr/local/bin/omnictl.real
          cat > /usr/local/bin/omnictl <<'WRAP'
          #!/bin/bash
          exec /usr/local/bin/omnictl.real --insecure-skip-tls-verify "$@"
          WRAP
          chmod +x /usr/local/bin/omnictl

      - name: Force-clear cluster stawi
        timeout-minutes: 15
        run: |
          set -euo pipefail
          # Official path for stuck Destroying clusters with ghost
          # (disconnected) machines — see omni-force-cluster-clear.yml
          # and siderolabs/omni#2465.
          set +e
          timeout 600 omnictl cluster delete stawi \
            --destroy-disconnected-machines -v
          del_rc=$?
          set -e
          echo "::notice::cluster delete exit=$del_rc"
          if timeout 30 omnictl get Clusters.omni.sidero.dev stawi -o yaml >/dev/null 2>&1; then
            echo "::warning::cluster stawi still present after wipe attempt"
          else
            echo "::notice::cluster stawi is gone"
          fi

  converge:
    needs: [preflight, infra, wipe]
    # Infra reusable workflow fails when any account matrix cell fails
    # (e.g. empty ambetera tenancy). Still converge on healthy nodes —
    # same isolation philosophy as fail-fast=false matrices.
    if: |
      always()
      && needs.preflight.result == 'success'
      && (inputs.mode == 'full' || inputs.mode == 'cluster')
      && inputs.dry_run != true
      && needs.infra.result != 'cancelled'
      && (needs.wipe.result == 'success' || needs.wipe.result == 'skipped')
    uses: ./.github/workflows/sync-cluster-template.yml
    with:
      dry_run: false
    secrets: inherit

  flux:
    needs: [converge]
    if: |
      always()
      && needs.converge.result == 'success'
      && inputs.deploy_flux == true
      && inputs.dry_run != true
      && (inputs.mode == 'full' || inputs.mode == 'cluster')
    uses: ./.github/workflows/deploy-flux.yml
    with:
      cluster_name: stawi
    secrets: inherit
