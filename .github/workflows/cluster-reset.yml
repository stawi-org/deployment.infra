# .github/workflows/cluster-reset.yml
#
# One-shot full reset. Used when the cluster is in an unrecoverable
# state (etcd unreachable, bootstrap stuck, etc.) or when you want a
# truly clean baseline install. Safe to re-run — everything is
# idempotent.
#
# What it does:
#   1. Deletes every DNS record matching cp* on both Cloudflare zones.
#   2. Wipes the R2 state objects for layers 01-contabo, 02-oracle,
#      02-onprem, 03-talos, and 04-flux. Layer 00 is preserved so the
#      cluster keeps the same PKI identity. Contabo / OCI instances
#      themselves are not destroyed; layer 01's imports.tf re-adopts
#      the fixed CP instance IDs on the next apply.
#   3. Deletes every Talos* custom Contabo image so the next apply
#      registers a fresh one.
#
# After the wipe steps, this workflow runs tofu-apply automatically
# as part of the same run — no manual follow-up dispatch. The apply
# rebuilds layer 01 (registering a new Contabo image and triggering
# Contabo reinstall via the reconstruction mechanism if the request
# file persists), then layers 02/03/04 from empty state.
#
# Trigger:
#   gh workflow run cluster-reset.yml --ref main -f confirm=RESET
#   or merge an approved tofu-reconstruct PR that adds
#   .github/reconstruction/reset-*.yaml on main.

name: cluster-reset
on:
  push:
    branches: [main]
    paths:
      - '.github/reconstruction/reset-*.yaml'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RESET verbatim to confirm.'
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: tofu-apply-production
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    env:
      CONFIRM: ${{ github.event_name == 'workflow_dispatch' && inputs.confirm || 'RESET' }}
    steps:
      - name: Validate confirm
        run: |
          [[ "$CONFIRM" == "RESET" ]] || { echo "::error::confirm must be RESET"; exit 1; }

  clean-cloudflare:
    needs: guard
    runs-on: ubuntu-latest
    env:
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Delete every cp* record on both managed zones
        run: |
          set -euo pipefail
          for ZONE_ID in e5a43681579acad9c15657ac21dbd66a 706bf604a333d866bb38c03bf643e79a ; do
            for TYPE in A AAAA ; do
              IDS=$(curl -fsSL -H "Authorization: Bearer $CF_TOKEN" \
                "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=$TYPE&per_page=200" \
                | jq -r '.result[] | select(.name | test("^cp(-[0-9]+)?\\.")) | .id')
              for ID in $IDS ; do
                curl -fsSL -X DELETE -H "Authorization: Bearer $CF_TOKEN" \
                  "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$ID" >/dev/null
                echo "deleted $TYPE $ID in zone $ZONE_ID"
              done
            done
          done

  wipe-state:
    needs: guard
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
    steps:
      - name: Delete R2 state objects for layers 01, 02, 03, 04
        run: |
          set -euo pipefail
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          for LAYER in 01-contabo-infra 02-oracle-infra 02-onprem-infra 03-talos 04-flux ; do
            for OBJ in "production/${LAYER}.tfstate" "production/${LAYER}.tfstate.tflock" "production/${LAYER}.tfstate.backup" ; do
              aws s3 rm "s3://cluster-tofu-state/$OBJ" --endpoint-url "$ENDPOINT" --region us-east-1 2>&1 \
                | grep -v "NoSuchKey\|^$" || true
            done
          done
          aws s3 ls "s3://cluster-tofu-state/production/" --endpoint-url "$ENDPOINT" --region us-east-1

  clean-contabo-images:
    needs: guard
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID:        ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:    ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ACCOUNT_ID:            ${{ secrets.R2_ACCOUNT_ID }}
      SOPS_AGE_KEY:             ${{ secrets.SOPS_AGE_KEY }}
    steps:
      - uses: actions/checkout@v5

      - name: Install age + sops + yq
        run: |
          set -euo pipefail
          AGE_VER="v1.2.1"
          curl -fsSL -o /tmp/age.tgz "https://github.com/FiloSottile/age/releases/download/${AGE_VER}/age-${AGE_VER}-linux-amd64.tar.gz"
          tar -xzf /tmp/age.tgz -C /tmp
          sudo install -m 0755 /tmp/age/age /usr/local/bin/age

          SOPS_VER="v3.10.2"
          curl -fsSL -o /tmp/sops "https://github.com/getsops/sops/releases/download/${SOPS_VER}/sops-${SOPS_VER}.linux.amd64"
          sudo install -m 0755 /tmp/sops /usr/local/bin/sops

          YQ_VER="v4.46.1"
          curl -fsSL -o /tmp/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VER}/yq_linux_amd64"
          sudo install -m 0755 /tmp/yq /usr/local/bin/yq

      - name: Delete every Talos* custom image, per Contabo account
        # Iterates the accounts manifest, decrypts each account's
        # auth.yaml from R2 (same source the contabo provider uses in
        # layer 01 — single source of truth, no GitHub-secret drift),
        # and runs the cleanup loop with those creds.
        run: |
          set -euo pipefail
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          ACCOUNTS=$(yq -r '.contabo[]' tofu/shared/accounts.yaml)
          if [[ -z "$ACCOUNTS" ]]; then
            echo "::notice::no Contabo accounts in tofu/shared/accounts.yaml — nothing to clean"
            exit 0
          fi

          for ACCT in $ACCOUNTS ; do
            echo "::group::cleanup contabo/${ACCT}"
            AUTH_KEY="production/inventory/contabo/${ACCT}/auth.yaml"
            AUTH_FILE="/tmp/${ACCT}-auth.yaml"

            if ! aws s3 cp "s3://cluster-tofu-state/${AUTH_KEY}" "$AUTH_FILE" \
                 --endpoint-url "$ENDPOINT" --region us-east-1 2>/dev/null ; then
              echo "::warning::auth.yaml not found at s3://cluster-tofu-state/${AUTH_KEY} — skipping ${ACCT}"
              echo "::endgroup::"
              continue
            fi

            DEC=$(sops -d "$AUTH_FILE" 2>&1) || {
              echo "::warning::sops decrypt failed for ${ACCT}: $(echo "$DEC" | head -3)"
              shred -u "$AUTH_FILE" || rm -f "$AUTH_FILE"
              echo "::endgroup::"
              continue
            }

            CLIENT_ID=$(yq -r '.auth.oauth2_client_id' <<<"$DEC")
            CLIENT_SEC=$(yq -r '.auth.oauth2_client_secret' <<<"$DEC")
            USER=$(yq -r '.auth.oauth2_user' <<<"$DEC")
            PASS=$(yq -r '.auth.oauth2_pass' <<<"$DEC")
            shred -u "$AUTH_FILE" || rm -f "$AUTH_FILE"

            if [[ -z "$CLIENT_ID" || "$CLIENT_ID" == "null" ]]; then
              echo "::warning::auth.yaml for ${ACCT} missing oauth2_client_id — skipping"
              echo "::endgroup::"
              continue
            fi

            RESP=$(curl -sS -X POST 'https://auth.contabo.com/auth/realms/contabo/protocol/openid-connect/token' \
              -H 'Content-Type: application/x-www-form-urlencoded' \
              --data-urlencode "client_id=${CLIENT_ID}" \
              --data-urlencode "client_secret=${CLIENT_SEC}" \
              --data-urlencode "username=${USER}" \
              --data-urlencode "password=${PASS}" \
              --data-urlencode "grant_type=password")
            TOKEN=$(jq -r '.access_token // empty' <<<"$RESP")
            if [[ -z "$TOKEN" ]]; then
              echo "::warning::Contabo auth failed for ${ACCT}: $(echo "$RESP" | head -1)"
              echo "::endgroup::"
              continue
            fi

            LIST_RESP=$(curl -sS \
              -H "Authorization: Bearer $TOKEN" \
              -H "x-request-id: $(cat /proc/sys/kernel/random/uuid)" \
              'https://api.contabo.com/v1/compute/images?size=100')
            if ! jq -e '.data' >/dev/null 2>&1 <<<"$LIST_RESP" ; then
              echo "::warning::Contabo images list failed for ${ACCT}: $(echo "$LIST_RESP" | head -1)"
              echo "::endgroup::"
              continue
            fi
            IDS=$(jq -r '.data[] | select(.name | test("^Talos")) | .imageId' <<<"$LIST_RESP")
            if [[ -z "$IDS" ]]; then
              echo "no Talos* images to delete in ${ACCT}"
              echo "::endgroup::"
              continue
            fi
            for ID in $IDS ; do
              echo "deleting Contabo image $ID (account=${ACCT})"
              curl -sS -w "\n  http=%{http_code}\n" -X DELETE \
                -H "Authorization: Bearer $TOKEN" \
                -H "x-request-id: $(cat /proc/sys/kernel/random/uuid)" \
                "https://api.contabo.com/v1/compute/images/$ID" | tail -2
            done
            echo "::endgroup::"
          done

  # Apply runs in-line so the reset is a single workflow run that
  # ends with a working cluster, not a wipe that leaves the operator
  # to chase a follow-up dispatch.
  apply:
    needs: [clean-cloudflare, wipe-state, clean-contabo-images]
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-apply.yml
    secrets: inherit
