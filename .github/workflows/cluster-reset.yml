# .github/workflows/cluster-reset.yml
#
# One-shot full reset. Used when the cluster is in an unrecoverable
# state (etcd unreachable, bootstrap stuck, etc.) or when you want a
# truly clean baseline install. Safe to re-run — everything is
# idempotent.
#
# What it does:
#   1. Deletes every DNS record matching cp* on both Cloudflare zones.
#   2. Wipes the R2 state objects for layers 01-contabo, 02-oracle,
#      02-onprem, 03-talos, and 04-flux. Layer 00 is preserved so the
#      cluster keeps the same PKI identity. Contabo / OCI instances
#      themselves are not destroyed; layer 01's imports.tf re-adopts
#      the fixed CP instance IDs on the next apply.
#   3. Deletes every Talos* custom Contabo image so the next apply
#      registers a fresh one.
#
# After a successful reset, dispatch tofu-apply manually — it will
# reapply layer 01 (registering a new Contabo image and triggering
# Contabo reinstall via the reconstruction mechanism if the request
# file persists), then build layers 02/03/04 from empty state.
#
# Trigger:
#   gh workflow run cluster-reset.yml --ref main -f confirm=RESET
#   or merge an approved tofu-reconstruct PR that adds
#   .github/reconstruction/reset-*.yaml on main.

name: cluster-reset
on:
  push:
    branches: [main]
    paths:
      - '.github/reconstruction/reset-*.yaml'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RESET verbatim to confirm.'
        required: true
        type: string

permissions:
  contents: read
  actions: write

concurrency:
  group: tofu-apply-production
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    env:
      CONFIRM: ${{ github.event_name == 'workflow_dispatch' && inputs.confirm || 'RESET' }}
    steps:
      - name: Validate confirm
        run: |
          [[ "$CONFIRM" == "RESET" ]] || { echo "::error::confirm must be RESET"; exit 1; }

  clean-cloudflare:
    needs: guard
    runs-on: ubuntu-latest
    env:
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Delete every cp* record on both managed zones
        run: |
          set -euo pipefail
          for ZONE_ID in e5a43681579acad9c15657ac21dbd66a 706bf604a333d866bb38c03bf643e79a ; do
            for TYPE in A AAAA ; do
              IDS=$(curl -fsSL -H "Authorization: Bearer $CF_TOKEN" \
                "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=$TYPE&per_page=200" \
                | jq -r '.result[] | select(.name | test("^cp(-[0-9]+)?\\.")) | .id')
              for ID in $IDS ; do
                curl -fsSL -X DELETE -H "Authorization: Bearer $CF_TOKEN" \
                  "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$ID" >/dev/null
                echo "deleted $TYPE $ID in zone $ZONE_ID"
              done
            done
          done

  wipe-state:
    needs: guard
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
    steps:
      - name: Delete R2 state objects for layers 01, 02, 03, 04
        run: |
          set -euo pipefail
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          for LAYER in 01-contabo-infra 02-oracle-infra 02-onprem-infra 03-talos 04-flux ; do
            for OBJ in "production/${LAYER}.tfstate" "production/${LAYER}.tfstate.tflock" "production/${LAYER}.tfstate.backup" ; do
              aws s3 rm "s3://cluster-tofu-state/$OBJ" --endpoint-url "$ENDPOINT" --region us-east-1 2>&1 \
                | grep -v "NoSuchKey\|^$" || true
            done
          done
          aws s3 ls "s3://cluster-tofu-state/production/" --endpoint-url "$ENDPOINT" --region us-east-1

  clean-contabo-images:
    needs: guard
    runs-on: ubuntu-latest
    env:
      CONTABO_CLIENT_ID:     ${{ secrets.CONTABO_CLIENT_ID }}
      CONTABO_CLIENT_SECRET: ${{ secrets.CONTABO_CLIENT_SECRET }}
      CONTABO_API_USER:      ${{ secrets.CONTABO_API_USER }}
      CONTABO_API_PASSWORD:  ${{ secrets.CONTABO_API_PASSWORD }}
    steps:
      - name: Delete every Talos* custom image in the Contabo account
        run: |
          set -euo pipefail
          RESP=$(curl -sS -X POST 'https://auth.contabo.com/auth/realms/contabo/protocol/openid-connect/token' \
            -H 'Content-Type: application/x-www-form-urlencoded' \
            --data-urlencode "client_id=${CONTABO_CLIENT_ID}" \
            --data-urlencode "client_secret=${CONTABO_CLIENT_SECRET}" \
            --data-urlencode "username=${CONTABO_API_USER}" \
            --data-urlencode "password=${CONTABO_API_PASSWORD}" \
            --data-urlencode "grant_type=password" )
          TOKEN=$(jq -r '.access_token // empty' <<<"$RESP")
          if [[ -z "$TOKEN" ]]; then
            echo "Contabo auth failed. Response body:"
            echo "$RESP"
            exit 1
          fi

          LIST_RESP=$(curl -sS \
            -H "Authorization: Bearer $TOKEN" \
            -H "x-request-id: $(cat /proc/sys/kernel/random/uuid)" \
            'https://api.contabo.com/v1/compute/images?size=100')
          if ! jq -e '.data' >/dev/null 2>&1 <<<"$LIST_RESP" ; then
            echo "Contabo images list failed:"
            echo "$LIST_RESP"
            exit 1
          fi
          IDS=$(jq -r '.data[] | select(.name | test("^Talos")) | .imageId' <<<"$LIST_RESP")
          if [[ -z "$IDS" ]]; then
            echo "No Talos* images to delete."
            exit 0
          fi
          for ID in $IDS ; do
            echo "deleting Contabo image $ID"
            DEL_RESP=$(curl -sS -w "\nHTTP_%{http_code}" -X DELETE \
              -H "Authorization: Bearer $TOKEN" \
              -H "x-request-id: $(cat /proc/sys/kernel/random/uuid)" \
              "https://api.contabo.com/v1/compute/images/$ID")
            echo "$DEL_RESP" | tail -5
          done

  done:
    needs: [clean-cloudflare, wipe-state, clean-contabo-images]
    runs-on: ubuntu-latest
    steps:
      - name: Summarize
        run: |
          echo "::notice::Reset complete. Next step — dispatch tofu-apply:"
          echo "::notice::  gh workflow run tofu-apply.yml --ref main"
          echo "::notice::Or open a fresh tofu-reconstruct PR to run it through approval."
