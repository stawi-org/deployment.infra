# Reboot a Contabo VPS via the Contabo Compute API.
#
# Use case (2026-05-05): the per-node-patches PR (#177) introduced
# static LinkConfig for Contabo nodes; live-applying static IPs
# disrupted kernel networking state on contabo-bwire-node-1 and
# contabo-bwire-node-2. Removing the per-node patch via
# omni-delete-configpatch did not auto-revert the static kernel
# state. Talosctl reboot-via-SideroLink is unreachable from a
# GitHub runner. The Contabo Compute API restart endpoint goes
# through Contabo's hypervisor — works regardless of in-VM network
# state.
#
# Auth + restart pattern lifted from
# tofu/modules/node-contabo/ensure-image.sh.
#
# Security: workflow_dispatch only. display_name input is allowlist-
# validated against the `<provider>-<account>-node-<n>` shape before
# reaching curl/jq. No untrusted github.event-derived strings reach
# any shell command — the user input is bound to env DISPLAY_NAME
# and only flows into validated parameters.
name: contabo-reboot-vps
on:
  workflow_dispatch:
    inputs:
      display_name:
        description: Contabo VPS display_name (e.g. contabo-bwire-node-2)
        required: true
        type: string

permissions:
  contents: read

jobs:
  reboot:
    runs-on: ubuntu-latest
    env:
      DISPLAY_NAME: ${{ inputs.display_name }}
      CONTABO_CLIENT_ID: ${{ secrets.CONTABO_CLIENT_ID }}
      CONTABO_CLIENT_SECRET: ${{ secrets.CONTABO_CLIENT_SECRET }}
      CONTABO_API_USER: ${{ secrets.CONTABO_API_USER }}
      CONTABO_API_PASSWORD: ${{ secrets.CONTABO_API_PASSWORD }}
    steps:
      - name: Validate input
        run: |
          set -euo pipefail
          if ! [[ "$DISPLAY_NAME" =~ ^contabo-[a-zA-Z0-9_-]+-node-[0-9]+$ ]]; then
            echo "::error::display_name must match contabo-<account>-node-<n> (got: $DISPLAY_NAME)"
            exit 1
          fi
      - name: Reboot via Contabo API
        run: |
          set -euo pipefail
          uuid() { cat /proc/sys/kernel/random/uuid; }

          echo "::notice::authenticating with Contabo OAuth"
          token=$(curl -fsSL -X POST 'https://auth.contabo.com/auth/realms/contabo/protocol/openid-connect/token' \
            -H 'Content-Type: application/x-www-form-urlencoded' \
            --data-urlencode "client_id=${CONTABO_CLIENT_ID}" \
            --data-urlencode "client_secret=${CONTABO_CLIENT_SECRET}" \
            --data-urlencode "username=${CONTABO_API_USER}" \
            --data-urlencode "password=${CONTABO_API_PASSWORD}" \
            --data-urlencode 'grant_type=password' | jq -r '.access_token')
          if [[ -z "$token" || "$token" == "null" ]]; then
            echo "::error::Contabo auth returned no access_token"
            exit 1
          fi

          echo "::notice::listing all Contabo instances (no name filter — the API name= filter is fuzzy and missed our display_name on prior attempts)"
          instances=$(curl -fsSL -X GET \
            "https://api.contabo.com/v1/compute/instances?size=100" \
            -H "Authorization: Bearer ${token}" \
            -H "x-request-id: $(uuid)")
          # Diagnostic: show every (instanceId, displayName, name)
          # tuple so a future name-mismatch is obvious from the log.
          echo "::group::Contabo inventory"
          jq -r '.data[] | "instanceId=\(.instanceId) displayName=\(.displayName) name=\(.name // "?")"' <<<"$instances"
          echo "::endgroup::"
          instance_id=$(jq -r --arg n "$DISPLAY_NAME" \
            '.data[] | select(.displayName == $n) | .instanceId' <<<"$instances" | head -n1)
          if [[ -z "$instance_id" ]]; then
            echo "::error::no Contabo instance found with displayName=${DISPLAY_NAME} (see inventory dump above)"
            exit 1
          fi
          echo "::notice::resolved displayName=${DISPLAY_NAME} → instanceId=${instance_id}"

          echo "::notice::issuing restart"
          resp=$(curl -fsSL -w '\nHTTP_%{http_code}' -X POST \
            "https://api.contabo.com/v1/compute/instances/${instance_id}/actions/restart" \
            -H "Authorization: Bearer ${token}" \
            -H "x-request-id: $(uuid)" || true)
          code=$(awk -F_ '/^HTTP_/{print $2; exit}' <<<"$resp")
          body=$(awk '/^HTTP_/{exit} {print}' <<<"$resp")
          if [[ "$code" != "201" && "$code" != "200" && "$code" != "202" ]]; then
            echo "::error::Contabo restart returned HTTP ${code}: ${body:0:300}"
            exit 1
          fi
          echo "::notice::restart accepted (HTTP ${code}); VPS will reboot in 30-90s"
