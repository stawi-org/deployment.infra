name: debug-cluster
on:
  workflow_dispatch: {}

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Install kubectl
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/kubectl "https://dl.k8s.io/release/v1.35.2/bin/linux/amd64/kubectl"
          chmod +x /tmp/kubectl
          sudo install -m 0755 /tmp/kubectl /usr/local/bin/kubectl
      - name: Pull kubeconfig from R2
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          aws s3 cp "s3://cluster-tofu-state/production/03-talos.tfstate" /tmp/03.tfstate \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" --region us-east-1
          jq -r '.outputs.kubeconfig.value' /tmp/03.tfstate > /tmp/kc.json
          HOST=$(jq -r '.host' /tmp/kc.json)
          CA=$(jq -r '.ca_certificate' /tmp/kc.json)
          CRT=$(jq -r '.client_certificate' /tmp/kc.json)
          KEY=$(jq -r '.client_key' /tmp/kc.json)
          umask 077
          cat > /tmp/kubeconfig <<KC
          apiVersion: v1
          kind: Config
          clusters:
          - name: t
            cluster: { server: ${HOST}, certificate-authority-data: ${CA} }
          users:
          - name: t
            user: { client-certificate-data: ${CRT}, client-key-data: ${KEY} }
          contexts:
          - name: t
            context: { cluster: t, user: t }
          current-context: t
          KC
          echo "KUBECONFIG=/tmp/kubeconfig" >> "$GITHUB_ENV"
      - name: nodes
        run: kubectl get nodes -o wide
      - name: kube-system pods (CNI + critical addons)
        run: |
          kubectl -n kube-system get pods -o wide 2>&1 || true
          echo
          echo "=== flannel pod logs (first one) ==="
          POD=$(kubectl -n kube-system get pods -o name 2>/dev/null | grep -i flannel | head -1)
          [[ -n "$POD" ]] && kubectl -n kube-system logs "$POD" --tail=40 2>&1 || echo "(no flannel pod found)"
      - name: flux-system pods
        run: kubectl -n flux-system get pods -o wide || true
      - name: flux-system deployments
        run: kubectl -n flux-system get deploy -o wide || true
      - name: FluxInstance
        run: kubectl get fluxinstance -A -o yaml 2>&1 | head -80 || true
      - name: flux-system events (last 40)
        run: kubectl -n flux-system get events --sort-by='.lastTimestamp' 2>&1 | tail -40 || true
      - name: summary
        run: |
          echo "Nodes total:   $(kubectl get nodes --no-headers 2>/dev/null | wc -l)"
          echo "Workers total: $(kubectl get nodes --no-headers -l '!node-role.kubernetes.io/control-plane' 2>/dev/null | wc -l)"

      # Talos-API probes (port 50000). Run unconditionally so we always
      # get diagnostics even when kubectl above failed — this is the
      # codepath that actually helps when kube-apiserver isn't up.
      - name: Install talosctl + pull CP IPs
        if: always()
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/talosctl "https://github.com/siderolabs/talos/releases/download/v1.12.6/talosctl-linux-amd64"
          chmod +x /tmp/talosctl
          sudo install -m 0755 /tmp/talosctl /usr/local/bin/talosctl
          jq -r '.outputs.talosconfig.value' /tmp/03.tfstate > /tmp/talosconfig
          aws s3 cp "s3://cluster-tofu-state/production/01-contabo-infra.tfstate" /tmp/01.tfstate \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" --region us-east-1
          jq -r '.outputs.nodes.value | to_entries[] | select(.value.role=="controlplane") | .value.ipv4' /tmp/01.tfstate > /tmp/cps
          echo "CPs:" ; cat /tmp/cps
          echo "TALOSCONFIG=/tmp/talosconfig" >> "$GITHUB_ENV"

      - name: Talos version per CP
        if: always()
        run: |
          set +e
          while read -r CP ; do
            echo "===== $CP version ====="
            timeout 15 talosctl --talosconfig /tmp/talosconfig -n "$CP" -e "$CP" version 2>&1 | head -20
            echo
          done < /tmp/cps

      - name: Talos service status per CP
        if: always()
        run: |
          set +e
          while read -r CP ; do
            echo "===== $CP ====="
            timeout 20 talosctl --talosconfig /tmp/talosconfig -n "$CP" -e "$CP" service 2>&1 | head -40
            echo
          done < /tmp/cps

      - name: Talos kube-apiserver logs per CP
        if: always()
        run: |
          set +e
          while read -r CP ; do
            echo "===== $CP kube-apiserver (last 60) ====="
            talosctl --talosconfig /tmp/talosconfig -n "$CP" -e "$CP" logs kube-apiserver --tail=60 2>&1 | tail -60
            echo
          done < /tmp/cps

      - name: Talos kubelet logs per CP
        if: always()
        run: |
          set +e
          while read -r CP ; do
            echo "===== $CP kubelet (last 50) ====="
            talosctl --talosconfig /tmp/talosconfig -n "$CP" -e "$CP" logs kubelet --tail=50 2>&1 | tail -50
            echo
          done < /tmp/cps

      - name: Talos etcd status per CP
        if: always()
        run: |
          set +e
          while read -r CP ; do
            echo "===== $CP etcd members ====="
            timeout 30 talosctl --talosconfig /tmp/talosconfig -n "$CP" -e "$CP" etcd members 2>&1 | head -20
            echo "===== $CP etcd status ====="
            timeout 30 talosctl --talosconfig /tmp/talosconfig -n "$CP" -e "$CP" etcd status 2>&1 | head -20
            echo
          done < /tmp/cps
