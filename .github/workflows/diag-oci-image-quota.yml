name: diag-oci-image-quota
on:
  workflow_dispatch:
    inputs:
      account:
        type: string
        default: ambetera
permissions:
  contents: read
  id-token: write
jobs:
  diag:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      OCI_CLI_AUTH: security_token
      PROFILE: ${{ inputs.account }}
    steps:
      - uses: actions/checkout@v5
      - name: WIF + diag + limit request
        run: |
          set -euo pipefail
          pip install --quiet pyyaml oci-cli
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          TMP=$(mktemp -d)
          aws s3 sync "s3://cluster-tofu-state/production/inventory/oracle/${PROFILE}/" \
            "${TMP}/${PROFILE}/" --endpoint-url "$R2_ENDPOINT" --region us-east-1 \
            --exclude "*" --include "auth.yaml"
          AUTH_JSON=$(python3 scripts/build-oci-auth-json.py "$TMP")
          echo "$AUTH_JSON" > /tmp/auth.json
          scripts/configure-oci-wif.sh /tmp/auth.json
          TEN=$(jq -r '.[0].tenancy_ocid' /tmp/auth.json)
          REG=$(jq -r '.[0].region' /tmp/auth.json)
          {
            echo "TEN=$TEN REG=$REG"
            echo "==== region subscriptions ===="
            oci --profile "$PROFILE" iam region-subscription list --all 2>&1 | jq -r '.data[]? | "\(.["region-name"]) home=\(.["is-home-region"]) status=\(.status)"'
            echo "==== custom-image-count availability ===="
            oci --profile "$PROFILE" limits resource-availability get \
              --compartment-id "$TEN" --service-name compute --limit-name custom-image-count 2>&1 | jq .
            echo "==== custom-image-count limit value ===="
            oci --profile "$PROFILE" limits value list --compartment-id "$TEN" --service-name compute --name custom-image-count --all 2>&1 | jq .
            echo "==== try service limit increase to 3 ===="
            # Create a limit increase request if the API allows it
            oci --profile "$PROFILE" limits quota list --compartment-id "$TEN" --all 2>&1 | head -c 2000 || true
            echo
            # Support request path varies; attempt create-limit-request style via limits
            oci --profile "$PROFILE" support incident-resource-type list --problem-type LIMIT 2>&1 | head -c 1500 || true
            echo
            echo "==== tenancy get ===="
            oci --profile "$PROFILE" iam tenancy get --tenancy-id "$TEN" 2>&1 | jq '{name:.data.name, home:.data["home-region-key"], id:.data.id}'
          } | tee /tmp/diag.txt
      - uses: actions/upload-artifact@v6
        with:
          name: diag-image-quota
          path: /tmp/diag.txt
