name: dispatch-kubeconfig
# Issues a short-lived, per-user kubeconfig — encrypted to the dispatching
# user's public SSH keys so that even though the resulting artifact is
# downloadable by anyone with repo read access, only the dispatcher can
# decrypt it with their private SSH key.
#
# Audit: the SA inside the kubeconfig is named access-<github-username>, so
# every API call is logged as
#   system:serviceaccount:access-tokens:access-<username>
# and the GitHub Actions run shows who dispatched the workflow.
#
# Dispatch:
#   gh workflow run dispatch-kubeconfig.yml --ref main
#   # optional: -f ttl_hours=24
#
# Retrieve + decrypt (locally):
#   gh run download <run-id> -n kubeconfig -D /tmp
#   age -d -i ~/.ssh/id_ed25519 /tmp/kubeconfig.age > ~/.kube/config
#   export KUBECONFIG=~/.kube/config
#   kubectl get nodes
on:
  workflow_dispatch:
    inputs:
      ttl_hours:
        description: 'Token lifetime in hours (1-24)'
        required: false
        type: string
        default: '8'

permissions:
  contents: read

jobs:
  issue:
    runs-on: ubuntu-latest
    steps:
      - name: Install kubectl + age
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/kubectl "https://dl.k8s.io/release/v1.36.0-rc.1/bin/linux/amd64/kubectl"
          chmod +x /tmp/kubectl
          sudo install -m 0755 /tmp/kubectl /usr/local/bin/kubectl

          AGE_VER="v1.2.1"
          curl -fsSL -o /tmp/age.tgz "https://github.com/FiloSottile/age/releases/download/${AGE_VER}/age-${AGE_VER}-linux-amd64.tar.gz"
          tar -xzf /tmp/age.tgz -C /tmp
          sudo install -m 0755 /tmp/age/age /usr/local/bin/age

      - name: Fetch dispatcher's SSH public keys from GitHub
        env:
          ACTOR: ${{ github.triggering_actor }}
        run: |
          set -euo pipefail
          # GitHub publishes every user's SSH public keys at https://github.com/<user>.keys
          # (plaintext, one key per line). age-encryption supports ssh-ed25519
          # and ssh-rsa (>= 2048 bits) as recipients. Filter the rest out so
          # age doesn't refuse.
          curl -fsSL "https://github.com/${ACTOR}.keys" \
            | grep -E '^(ssh-ed25519|ssh-rsa)[[:space:]]' \
            > /tmp/recipients.keys || true

          if [[ ! -s /tmp/recipients.keys ]]; then
            echo "::error::${ACTOR} has no ssh-ed25519 or ssh-rsa public keys on GitHub."
            echo "::error::Add one at https://github.com/settings/keys so this workflow can encrypt the kubeconfig to you."
            exit 1
          fi

          echo "Will encrypt to $(wc -l < /tmp/recipients.keys) public key(s) belonging to ${ACTOR}"

      - name: Pull admin kubeconfig from R2 state
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          aws s3 cp "s3://cluster-tofu-state/production/03-talos.tfstate" /tmp/03.tfstate \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" --region us-east-1
          jq -r '.outputs.kubeconfig.value' /tmp/03.tfstate > /tmp/kc.json
          HOST=$(jq -r '.host' /tmp/kc.json)
          CA=$(jq -r '.ca_certificate' /tmp/kc.json)
          CRT=$(jq -r '.client_certificate' /tmp/kc.json)
          KEY=$(jq -r '.client_key' /tmp/kc.json)
          umask 077
          cat > /tmp/admin-kubeconfig <<KC
          apiVersion: v1
          kind: Config
          clusters:
          - name: t
            cluster: { server: ${HOST}, certificate-authority-data: ${CA} }
          users:
          - name: t
            user: { client-certificate-data: ${CRT}, client-key-data: ${KEY} }
          contexts:
          - name: t
            context: { cluster: t, user: t }
          current-context: t
          KC
          echo "CLUSTER_SERVER=${HOST}" >> "$GITHUB_ENV"
          echo "CLUSTER_CA=${CA}"       >> "$GITHUB_ENV"
          echo "KUBECONFIG=/tmp/admin-kubeconfig" >> "$GITHUB_ENV"

      - name: Ensure per-user ServiceAccount + ClusterRoleBinding
        env:
          ACTOR: ${{ github.triggering_actor }}
        run: |
          set -euo pipefail
          SA_NAME="access-$(echo "$ACTOR" | tr '[:upper:]' '[:lower:]' | tr -c '[:alnum:]-' '-' | sed 's/-\+/-/g;s/^-//;s/-$//')"
          echo "SA_NAME=$SA_NAME" >> "$GITHUB_ENV"

          kubectl get ns access-tokens >/dev/null 2>&1 || kubectl create ns access-tokens

          cat <<MANIFEST | kubectl apply -f -
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: ${SA_NAME}
            namespace: access-tokens
            labels:
              github.actor: "${ACTOR}"
              managed-by: dispatch-kubeconfig
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: ${SA_NAME}
            labels:
              github.actor: "${ACTOR}"
              managed-by: dispatch-kubeconfig
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: cluster-admin
          subjects:
          - kind: ServiceAccount
            name: ${SA_NAME}
            namespace: access-tokens
          MANIFEST

      - name: Mint token, render kubeconfig, encrypt for dispatcher
        env:
          TTL_HOURS: ${{ inputs.ttl_hours }}
        run: |
          set -euo pipefail
          TTL=$(( TTL_HOURS > 24 ? 24 : (TTL_HOURS < 1 ? 8 : TTL_HOURS) ))
          DUR="${TTL}h"
          TOKEN=$(kubectl -n access-tokens create token "${SA_NAME}" --duration="${DUR}")
          EXPIRES_AT=$(date -u -d "+${TTL} hours" +'%Y-%m-%dT%H:%M:%SZ')

          umask 077
          cat > /tmp/kubeconfig <<KC
          apiVersion: v1
          kind: Config
          clusters:
          - name: stawi
            cluster:
              server: ${CLUSTER_SERVER}
              certificate-authority-data: ${CLUSTER_CA}
          users:
          - name: ${SA_NAME}
            user:
              token: ${TOKEN}
          contexts:
          - name: stawi-${SA_NAME}
            context:
              cluster: stawi
              user: ${SA_NAME}
          current-context: stawi-${SA_NAME}
          KC

          # Encrypt the kubeconfig to every SSH public key the dispatcher
          # publishes on GitHub. Any of their private keys can decrypt;
          # nobody else can.
          age -R /tmp/recipients.keys -o /tmp/kubeconfig.age /tmp/kubeconfig
          shred -u /tmp/kubeconfig

          echo "✓ kubeconfig encrypted for ${SA_NAME} (ttl=${DUR}, expires=${EXPIRES_AT})"
          echo "  Decrypt locally with:"
          echo "    age -d -i ~/.ssh/id_ed25519 kubeconfig.age > ~/.kube/config"

      - name: Upload encrypted kubeconfig
        uses: actions/upload-artifact@v4
        with:
          name: kubeconfig
          path: /tmp/kubeconfig.age
          retention-days: 1
