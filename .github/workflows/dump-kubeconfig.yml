name: dump-kubeconfig
on:
  workflow_dispatch:
jobs:
  dump:
    runs-on: ubuntu-latest
    env:
      OMNI_ENDPOINT: https://cp.stawi.org
      OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}
    steps:
      - run: |
          set -euo pipefail
          curl -fsSL -o /usr/local/bin/omnictl.real \
            "https://github.com/siderolabs/omni/releases/download/v1.9.3/omnictl-linux-amd64"
          chmod +x /usr/local/bin/omnictl.real
          cat > /usr/local/bin/omnictl <<'WRAP'
          #!/bin/bash
          exec /usr/local/bin/omnictl.real --insecure-skip-tls-verify "$@"
          WRAP
          chmod +x /usr/local/bin/omnictl
          curl -fsSLo /usr/local/bin/kubectl https://dl.k8s.io/release/v1.36.0/bin/linux/amd64/kubectl
          chmod +x /usr/local/bin/kubectl
          omnictl kubeconfig --cluster stawi --service-account --user diag --groups system:masters --ttl 1h --grant-type=read /tmp/kubeconfig.yaml 2>&1 | head -5 \
            || omnictl kubeconfig --cluster stawi --user diag /tmp/kubeconfig.yaml
          export KUBECONFIG=/tmp/kubeconfig.yaml
          echo "=== nodes ==="
          kubectl get nodes -o wide --insecure-skip-tls-verify=true
          echo ""
          echo "=== node labels (filter role-* and node.stawi.org/*) ==="
          kubectl get nodes -o json --insecure-skip-tls-verify=true \
            | jq -r '.items[] | "\(.metadata.name)\t\(.metadata.labels | to_entries | map(select(.key | test("(role|node\\.stawi\\.org|email)"))) | from_entries | tostring)"'
          echo ""
          echo "=== pods in kube-system ==="
          kubectl get pods -n kube-system --insecure-skip-tls-verify=true 2>&1 | head -25
