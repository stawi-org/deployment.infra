# One-shot migration workflow: runs scripts/migrate-auth-to-repo.sh and
# opens a PR with the resulting encrypted auth.yaml files. After M2 lands
# and a final clean apply confirms the repo-resident auth path is healthy,
# this workflow + script are removed in PR M3 alongside the R2 auth.yaml
# cleanup.
name: migrate-auth-to-repo
on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      AWS_ACCESS_KEY_ID:         ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:     ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ACCOUNT_ID:             ${{ secrets.R2_ACCOUNT_ID }}
      SOPS_AGE_KEY:              ${{ secrets.SOPS_AGE_KEY }}
    steps:
      - uses: actions/checkout@v5

      - name: Install sops + yq
        run: |
          set -euo pipefail
          sudo curl -fsSL -o /usr/local/bin/sops \
            https://github.com/getsops/sops/releases/download/v3.11.0/sops-v3.11.0.linux.amd64
          sudo chmod +x /usr/local/bin/sops
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Run migration
        run: ./scripts/migrate-auth-to-repo.sh

      - name: Verify each produced file decrypts back to a non-empty body
        run: |
          set -euo pipefail
          shopt -s nullglob
          fail=0
          for f in tofu/shared/accounts/*/*/auth.yaml; do
            if ! sops -d "$f" | grep -q '^auth:'; then
              echo "::error::$f did not decrypt to an 'auth:' block"
              fail=1
            else
              echo "::notice::$f decrypts cleanly"
            fi
          done
          exit $fail

      - name: Open PR
        uses: peter-evans/create-pull-request@v8
        with:
          branch: bot/migrate-auth-to-repo
          base: main
          title: "M1b: encrypted auth.yaml for every provider/account (migrated from R2)"
          commit-message: |
            accounts: seed encrypted auth.yaml for every provider/account

            Generated by migrate-auth-to-repo workflow_dispatch run.
            Contabo entry was decrypted from R2's age-encrypted blob and
            re-encrypted with the repo's .sops.yaml rule; oracle entries
            were plaintext in R2 and are encrypted at rest in the repo
            for the first time.
          body: |
            ## Summary
            Auto-generated by `migrate-auth-to-repo` workflow. Seeds every
            provider/account's encrypted `auth.yaml` under
            `tofu/shared/accounts/<provider>/<account>/auth.yaml` so PR M2
            has files to flip the tofu read path to.

            ## Operational impact
            None. No tofu module or workflow reads from these new files yet —
            this PR exists purely so PR M2 has them in place when it lands.

            ## Test plan
            - [ ] CI verifies each file decrypts to an `auth:` block.
            - [ ] Spot-check: `sops -d tofu/shared/accounts/oracle/madiang100/auth.yaml`
                  locally matches the same content as
                  `s3://cluster-tofu-state/production/inventory/oracle/madiang100/auth.yaml`.
          delete-branch: true
