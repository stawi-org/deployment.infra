# One-shot migration: read every production/config/<provider>/<account>.yaml
# and rewrite into:
#   production/inventory/<provider>/<account>/auth.yaml   (encrypted for contabo)
#   production/inventory/<provider>/<account>/nodes.yaml
# Then optionally deletes production/config/.
#
# Idempotent. All secret-bearing inputs are repo secrets — no untrusted
# user input is consumed by run: blocks.
name: migrate-config-to-inventory
on:
  workflow_dispatch:
    inputs:
      delete_config:
        description: "Delete production/config/ after migrating? (true|false)"
        required: true
        type: choice
        default: "false"
        options: ["false", "true"]

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_ACCESS_KEY_ID:        ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:    ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ACCOUNT_ID:            ${{ secrets.R2_ACCOUNT_ID }}
      R2_ENDPOINT:              https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      SOPS_AGE_KEY:             ${{ secrets.SOPS_AGE_KEY }}
      SOPS_AGE_RECIPIENTS:      ${{ vars.SOPS_AGE_RECIPIENTS }}
      DELETE_CONFIG:            ${{ inputs.delete_config }}
    steps:
      - uses: actions/checkout@v5

      - name: Install deps
        run: |
          set -euo pipefail
          python3 -m pip install --user PyYAML >/dev/null
          if ! command -v sops >/dev/null; then
            curl -fsSL -o /tmp/sops https://github.com/getsops/sops/releases/download/v3.11.0/sops-v3.11.0.linux.amd64
            sudo install -m 0755 /tmp/sops /usr/local/bin/sops
            rm /tmp/sops
          fi
          sops --version --disable-version-check

      - name: Migrate
        run: |
          set -euo pipefail
          : "${SOPS_AGE_RECIPIENTS:?required}"
          src=$(mktemp -d) ; out=$(mktemp -d)
          aws s3 sync "s3://cluster-tofu-state/production/config/" "$src/" \
            --endpoint-url "$R2_ENDPOINT" --region us-east-1 \
            --exclude "*" --include "*/*.yaml" || true

          shopt -s nullglob
          for f in "$src"/*/*.yaml; do
            provider=$(basename "$(dirname "$f")")
            file=$(basename "$f" .yaml)
            case "$provider" in
              contabo) inv_provider="contabo" ;;
              oci)     inv_provider="oracle" ;;
              onprem)  inv_provider="onprem" ;;
              *) echo "::warning::skip unknown provider dir: $provider"; continue ;;
            esac
            acct_dir="$out/$inv_provider/$file"
            mkdir -p "$acct_dir"

            python3 scripts/migrate_config_doc.py "$f" "$acct_dir" "$inv_provider" "$file"

            if [[ "$inv_provider" = "contabo" ]]; then
              tmp="$acct_dir/auth.yaml.age"
              sops -e --input-type yaml --output-type yaml --encrypted-regex '.' \
                "$acct_dir/auth.yaml" > "$tmp"
              mv "$tmp" "$acct_dir/auth.yaml"
            fi

            for n in auth.yaml nodes.yaml; do
              KEY="production/inventory/$inv_provider/$file/$n"
              aws s3 cp "$acct_dir/$n" "s3://cluster-tofu-state/$KEY" \
                --endpoint-url "$R2_ENDPOINT" --region us-east-1
              echo "::notice::wrote $KEY"
            done
          done

          if [[ "$DELETE_CONFIG" = "true" ]]; then
            echo "::notice::deleting production/config/ tree"
            aws s3 rm "s3://cluster-tofu-state/production/config/" \
              --endpoint-url "$R2_ENDPOINT" --region us-east-1 --recursive
          else
            echo "::notice::DELETE_CONFIG=false; production/config/ left in place"
          fi
