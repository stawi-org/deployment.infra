# Per-node recovery: diagnose a stuck node, reapply its config, reboot
# it, or trigger a full disk-wipe reinstall. Pairs with the
# talos_apply_skip tfvars entry — once this workflow confirms a node is
# healthy again, the operator removes it from talos_apply_skip to let
# the next tofu-apply resume managing it.
#
# Inputs come from workflow_dispatch and are quoted into env vars, not
# interpolated into run: blocks, per the GH Actions injection guide.
name: node-recovery
on:
  workflow_dispatch:
    inputs:
      node_key:
        description: Inventory node_key (e.g. contabo-bwire-node-2, oci-bwire-node-1)
        required: true
        type: string
      action:
        description: What to do
        required: true
        default: diagnose
        type: choice
        options:
          - diagnose
          - reboot
          - reapply
          - reinstall

permissions:
  contents: read
  id-token: write

jobs:
  recover:
    runs-on: ubuntu-latest
    env:
      NODE_KEY:                 ${{ inputs.node_key }}
      ACTION:                   ${{ inputs.action }}
      AWS_ACCESS_KEY_ID:        ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:    ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ACCOUNT_ID:            ${{ secrets.R2_ACCOUNT_ID }}
      R2_ENDPOINT:              https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
    steps:
      - uses: actions/checkout@v5

      - name: Install talosctl + yq
        run: |
          set -euo pipefail
          TALOS_VERSION=$(jq -r '.talos_version' tofu/shared/versions.auto.tfvars.json)
          curl -fsSL "https://github.com/siderolabs/talos/releases/download/${TALOS_VERSION}/talosctl-linux-amd64" \
            -o /usr/local/bin/talosctl
          chmod +x /usr/local/bin/talosctl
          talosctl version --client
          # yq is needed by node-recovery.sh to enumerate per-account
          # tfstate paths from tofu/shared/accounts.yaml.
          YQ_VER="v4.46.1"
          curl -fsSL -o /tmp/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VER}/yq_linux_amd64"
          sudo install -m 0755 /tmp/yq /usr/local/bin/yq

      - name: Run recovery action
        run: scripts/node-recovery.sh
