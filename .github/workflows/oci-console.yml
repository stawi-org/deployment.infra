name: oci-console
on:
  workflow_dispatch: {}
permissions:
  contents: read
  id-token: write
jobs:
  console:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID:         ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:     ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ACCOUNT_ID:             ${{ secrets.R2_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5
      - run: |
          set -euo pipefail
          sudo apt-get update -qq && sudo apt-get install -y -qq pipx
          pipx install oci-cli
          sudo ln -sf "$HOME/.local/bin/oci" /usr/local/bin/oci
      - name: WIF setup
        run: |
          set -euo pipefail
          mkdir -p /tmp/inventory/oracle
          aws s3 sync "s3://cluster-tofu-state/production/inventory/oracle/" "/tmp/inventory/oracle/" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" --region us-east-1 \
            --exclude "*" --include "*/auth.yaml"
          AUTH_JSON=$(python3 scripts/build-oci-auth-json.py /tmp/inventory/oracle)
          echo "$AUTH_JSON" > /tmp/oci_auth_accounts.json
          scripts/configure-oci-wif.sh /tmp/oci_auth_accounts.json
      - name: Capture
        env:
          OCI_CLI_AUTH: security_token
          OCI_CLI_PROFILE: bwire
        run: |
          set -euo pipefail
          COMP=$(python3 -c "import yaml;d=yaml.safe_load(open('/tmp/inventory/oracle/bwire/auth.yaml'));print(d.get('compartment_ocid',d.get('auth',{}).get('compartment_ocid','')))")
          INSTANCE=$(oci compute instance list --compartment-id "$COMP" --display-name oci-bwire-node-1 --lifecycle-state RUNNING --query 'data[0].id' --raw-output)
          echo "instance=$INSTANCE"
          echo "===== launch_options ====="
          oci compute instance get --instance-id "$INSTANCE" --query 'data."launch-options"'
          echo "===== image used ====="
          IMG=$(oci compute instance get --instance-id "$INSTANCE" --query 'data."image-id"' --raw-output)
          echo "image=$IMG"
          oci compute image get --image-id "$IMG" --query 'data."launch-options"'
          oci compute image get --image-id "$IMG" --query 'data."launch-mode"' --raw-output
          echo "===== console history ====="
          HIST=$(oci compute console-history capture --instance-id "$INSTANCE" --query 'data.id' --raw-output)
          for i in $(seq 1 30); do
            ST=$(oci compute console-history get --instance-console-history-id "$HIST" --query 'data."lifecycle-state"' --raw-output)
            [[ "$ST" == "SUCCEEDED" ]] && break
            sleep 5
          done
          oci compute console-history get-content --instance-console-history-id "$HIST" --file /tmp/console.txt --length 65536
          echo "===== last 250 lines ====="
          tail -n 250 /tmp/console.txt
