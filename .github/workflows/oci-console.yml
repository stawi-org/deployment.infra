name: oci-console
on:
  workflow_dispatch: {}
permissions:
  contents: read
  id-token: write
jobs:
  console:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID:         ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:     ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ACCOUNT_ID:             ${{ secrets.R2_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5
      - name: Install OCI CLI
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq pipx
          pipx install oci-cli
          sudo ln -sf "$HOME/.local/bin/oci" /usr/local/bin/oci
          oci --version
      - name: OCI WIF setup
        run: |
          set -euo pipefail
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          mkdir -p /tmp/inventory/oracle
          aws s3 sync "s3://cluster-tofu-state/production/inventory/oracle/" "/tmp/inventory/oracle/" \
            --endpoint-url "$ENDPOINT" --region us-east-1 \
            --exclude "*" --include "*/auth.yaml"
          AUTH_JSON=$(python3 scripts/build-oci-auth-json.py /tmp/inventory/oracle)
          echo "$AUTH_JSON" > /tmp/oci_auth_accounts.json
          scripts/configure-oci-wif.sh /tmp/oci_auth_accounts.json
      - name: Find instance + capture serial console
        env:
          OCI_CLI_AUTH: security_token
          OCI_CLI_PROFILE: bwire
        run: |
          set -euo pipefail
          COMP=$(python3 -c "import yaml;d=yaml.safe_load(open('/tmp/inventory/oracle/bwire/auth.yaml'));print(d.get('compartment_ocid',d.get('auth',{}).get('compartment_ocid','')))")
          echo "compartment=$COMP"
          INSTANCE_OCID=$(oci compute instance list --compartment-id "$COMP" --display-name oci-bwire-node-1 --lifecycle-state RUNNING --query 'data[0].id' --raw-output)
          echo "instance=$INSTANCE_OCID"
          echo "===== instance launch_options ====="
          oci compute instance get --instance-id "$INSTANCE_OCID" --query 'data."launch-options"'
          echo "===== compute console-history ====="
          HIST=$(oci compute console-history capture --instance-id "$INSTANCE_OCID" --query 'data.id' --raw-output)
          echo "history=$HIST"
          for i in $(seq 1 30); do
            ST=$(oci compute console-history get --instance-console-history-id "$HIST" --query 'data."lifecycle-state"' --raw-output)
            echo "i=$i state=$ST"
            [[ "$ST" == "SUCCEEDED" ]] && break
            sleep 5
          done
          oci compute console-history get-content --instance-console-history-id "$HIST" --length 65536 > /tmp/console.txt
          echo "===== last 200 lines of serial console ====="
          tail -n 200 /tmp/console.txt
