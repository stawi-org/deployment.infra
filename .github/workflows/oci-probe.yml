name: oci-probe
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: TCP probe OCI ports
        env:
          IP: "158.180.20.216"
        run: |
          set +e
          for p in 22 80 443 50000 50001 6443; do
            echo "--- port $p ---"
            timeout 5 bash -c "exec 3<>/dev/tcp/$IP/$p" 2>&1
            echo "exit=$?"
          done
          echo "--- icmp ---"
          ping -c 3 -W 2 "$IP" 2>&1 || true
