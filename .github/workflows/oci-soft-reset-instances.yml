# Soft-reset (OCI RESET) all RUNNING compute instances per oracle account.
# Use when VMs are RUNNING but SideroLink is disconnected (e.g. after
# in-place shape_config resize hung apid / network).
name: oci-soft-reset-instances
on:
  workflow_dispatch:
    inputs:
      account:
        description: Oracle account key, or "all"
        type: string
        required: true
        default: all
      confirm:
        description: Type RESET to proceed
        type: string
        required: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: oci-soft-reset-instances
  cancel-in-progress: false

jobs:
  discover-oracle:
    if: inputs.confirm == 'RESET'
    runs-on: ubuntu-latest
    outputs:
      accounts: ${{ steps.list.outputs.accounts }}
      count: ${{ steps.list.outputs.count }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      ONLY: ${{ inputs.account }}
    steps:
      - uses: actions/checkout@v5
      - name: Enumerate oracle accounts
        id: list
        run: |
          set -euo pipefail
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          mkdir -p /tmp/oracle-inv
          aws s3 sync "s3://cluster-tofu-state/production/inventory/oracle/" /tmp/oracle-inv/ \
            --endpoint-url "$R2_ENDPOINT" --region us-east-1 \
            --exclude "*" --include "*/auth.yaml"
          pip install --quiet pyyaml
          accounts=$(python3 - <<'PY'
          import json, os, yaml
          base = "/tmp/oracle-inv"
          only = os.environ.get("ONLY", "all").strip()
          out = []
          for entry in sorted(os.listdir(base)):
              if only != "all" and entry != only:
                  continue
              auth_p = os.path.join(base, entry, "auth.yaml")
              if not os.path.exists(auth_p):
                  continue
              data = yaml.safe_load(open(auth_p)) or {}
              auth = data.get("auth", data)
              if not auth.get("region") or not auth.get("tenancy_ocid"):
                  continue
              comp = (
                  auth.get("compartment_ocid")
                  or auth.get("compartment_id")
                  or data.get("compartment_ocid")
                  or data.get("compartment_id")
                  or auth.get("tenancy_ocid")
              )
              out.append({
                  "profile": entry,
                  "region": auth["region"],
                  "tenancy_ocid": auth["tenancy_ocid"],
                  "compartment_ocid": comp,
              })
          print(json.dumps(out))
          PY
          )
          count=$(jq 'length' <<<"$accounts")
          echo "::notice::reset targets (${count}): ${accounts}"
          echo "accounts=${accounts}" >> "$GITHUB_OUTPUT"
          echo "count=${count}" >> "$GITHUB_OUTPUT"

  reset:
    needs: discover-oracle
    if: needs.discover-oracle.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        account: ${{ fromJson(needs.discover-oracle.outputs.accounts) }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      OCI_CLI_AUTH: security_token
      PROFILE: ${{ matrix.account.profile }}
      COMPARTMENT_OCID: ${{ matrix.account.compartment_ocid }}
    steps:
      - uses: actions/checkout@v5

      - name: Configure OCI WIF
        run: |
          set -euo pipefail
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          TMPDIR_AUTH=$(mktemp -d)
          aws s3 sync "s3://cluster-tofu-state/production/inventory/oracle/${PROFILE}/" \
            "${TMPDIR_AUTH}/${PROFILE}/" \
            --endpoint-url "$R2_ENDPOINT" --region us-east-1 \
            --exclude "*" --include "auth.yaml"
          pip install --quiet pyyaml
          AUTH_JSON=$(python3 scripts/build-oci-auth-json.py "${TMPDIR_AUTH}")
          echo "$AUTH_JSON" > /tmp/oci_auth_accounts.json
          scripts/configure-oci-wif.sh /tmp/oci_auth_accounts.json

      - name: Install OCI CLI
        run: pip install --quiet oci-cli && oci --version

      - name: Soft-reset RUNNING instances
        run: |
          set -euo pipefail
          mapfile -t ROWS < <(oci --profile "$PROFILE" compute instance list \
            --compartment-id "$COMPARTMENT_OCID" --all \
            | jq -r '.data[]? | select(.["lifecycle-state"]=="RUNNING") | [.id, .["display-name"]] | @tsv')
          echo "profile=${PROFILE} running=${#ROWS[@]}"
          if [[ ${#ROWS[@]} -eq 0 ]]; then
            echo "no RUNNING instances"
            exit 0
          fi
          for row in "${ROWS[@]}"; do
            id="${row%%$'\t'*}"
            name="${row#*$'\t'}"
            echo "RESET ${name} ${id}"
            oci --profile "$PROFILE" compute instance action \
              --instance-id "$id" \
              --action RESET \
              --wait-for-state RUNNING \
              --max-wait-seconds 600 \
              || echo "::warning::reset wait incomplete for ${name}"
          done
          echo "::notice::soft-reset done for ${PROFILE} (${#ROWS[@]} instances)"
