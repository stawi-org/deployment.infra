# Force-clear a wedged Omni cluster.
#
# Used when `omnictl cluster delete` hangs because one or more
# machines are unreachable: Omni's drain waits for the machines to
# acknowledge config-removal, which they never do, so the cluster
# resource stays in `tearing-down` forever and `cluster template
# sync` rejects with "resource is not in phase running". This
# workflow goes around the drain: it deletes Links + ClusterMachineRequest
# + ClusterMachine + Cluster resources directly, releasing finalizers
# so the controller can collapse state.
#
# Use ONLY when the standard delete has failed and the operator has
# decided to nuke the cluster. After this workflow runs, the cluster
# resource is gone and machines can rejoin a fresh cluster created
# by sync-cluster-template.

name: omni-force-cluster-clear
on:
  workflow_dispatch:
    inputs:
      cluster_name:
        type: string
        required: true
        default: stawi
      confirm:
        type: string
        required: true
        description: Type the cluster name to confirm

permissions:
  contents: read

env:
  OMNI_VERSION: v1.7.1

jobs:
  clear:
    runs-on: ubuntu-latest
    env:
      OMNI_ENDPOINT:            https://cp.stawi.org
      OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}
      CLUSTER_NAME:             ${{ inputs.cluster_name }}
      CONFIRM:                  ${{ inputs.confirm }}
    steps:
      - name: Confirm
        run: |
          set -euo pipefail
          if [[ "$CLUSTER_NAME" != "$CONFIRM" ]]; then
            echo "::error::confirm does not match cluster_name; aborting"
            exit 1
          fi

      - name: Install omnictl + yq
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/omnictl.real \
            "https://github.com/siderolabs/omni/releases/download/${OMNI_VERSION}/omnictl-linux-amd64"
          chmod +x /tmp/omnictl.real
          sudo install -m 0755 /tmp/omnictl.real /usr/local/bin/omnictl.real
          cat > /tmp/omnictl <<'WRAP'
          #!/usr/bin/env bash
          exec /usr/local/bin/omnictl.real --insecure-skip-tls-verify "$@"
          WRAP
          chmod +x /tmp/omnictl
          sudo install -m 0755 /tmp/omnictl /usr/local/bin/omnictl
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.6/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Force-delete cluster-scoped resources
        timeout-minutes: 25
        run: |
          set -uo pipefail
          # Official escape hatch for clusters stuck in Destroying on
          # unreachable nodes (siderolabs/omni#2465): remove disconnected
          # machines as part of cluster delete so finalizers can fire.
          echo "::group::omnictl cluster delete --destroy-disconnected-machines"
          # Background + wait so we can fall through if Omni never finishes.
          set +e
          timeout 600 omnictl cluster delete "$CLUSTER_NAME" \
            --destroy-disconnected-machines -v
          del_rc=$?
          set -e
          echo "cluster delete exit=$del_rc"
          echo "::endgroup::"

          # Fallback: per-resource strip+delete if cluster still present.
          if timeout 30 omnictl get Clusters.omni.sidero.dev "$CLUSTER_NAME" -o yaml >/dev/null 2>&1; then
            echo "::warning::cluster still present after cluster delete; falling back to per-resource strip"
            strip_and_delete() {
              local kind="$1" id="$2"
              echo "--- $kind/$id"
              if timeout 30 omnictl get "$kind" "$id" -o yaml > /tmp/r.yaml 2>/dev/null; then
                # Only touch finalizers — Omni rejects broader patches on tearingDown.
                yq -i 'del(.metadata.finalizers)' /tmp/r.yaml
                timeout 30 omnictl apply -f /tmp/r.yaml >/dev/null 2>&1 \
                  && echo "  finalizers stripped" \
                  || echo "  (apply rejected)"
              fi
              timeout 30 omnictl delete "$kind" "$id" 2>/dev/null \
                || echo "  (delete timed out or absent)"
            }
            kinds=(
              "MachineSetNodes.omni.sidero.dev"
              "ConfigPatches.omni.sidero.dev"
              "ClusterMachineConfigStatuses.omni.sidero.dev"
              "ClusterMachineStatuses.omni.sidero.dev"
              "ClusterMachineConfigPatches.omni.sidero.dev"
              "ClusterMachines.omni.sidero.dev"
              "MachineSets.omni.sidero.dev"
              "MachineLabels.omni.sidero.dev"
              "ClusterBootstrapStatuses.omni.sidero.dev"
              "ClusterSecrets.omni.sidero.dev"
              "ClusterStatuses.omni.sidero.dev"
              "Clusters.omni.sidero.dev"
            )
            for kind in "${kinds[@]}"; do
              echo "::group::$kind (cluster=$CLUSTER_NAME)"
              ids=$(timeout 60 omnictl get "$kind" -o json 2>/dev/null \
                | jq -rs --arg c "$CLUSTER_NAME" '
                    [.[] | select(
                      (.metadata.labels["omni.sidero.dev/cluster"] // "") == $c
                      or (.metadata.id // "") == $c
                      or ((.metadata.id // "") | startswith($c + "-"))
                    ) | .metadata.id] | unique | .[]
                  ' || true)
              if [[ -z "${ids// }" ]]; then
                echo "(none)"
              else
                for id in $ids; do
                  strip_and_delete "$kind" "$id"
                done
              fi
              echo "::endgroup::"
            done
            strip_and_delete "Clusters.omni.sidero.dev" "$CLUSTER_NAME"
          fi

      - name: Assert cluster gone
        run: |
          set -euo pipefail
          if timeout 30 omnictl get Clusters.omni.sidero.dev "$CLUSTER_NAME" -o yaml 2>/dev/null; then
            echo "::error::cluster $CLUSTER_NAME still present after force-clear"
            timeout 30 omnictl get Clusters.omni.sidero.dev "$CLUSTER_NAME" -o yaml || true
            exit 1
          fi
          echo "::notice::cluster $CLUSTER_NAME is gone"

      - name: Show remaining machine state
        if: always()
        run: |
          set -euo pipefail
          echo "::group::clusters"
          timeout 60 omnictl get clusters -o table || true
          echo "::endgroup::"
          echo "::group::machines"
          timeout 60 omnictl get machinestatus -o table || true
          echo "::endgroup::"
