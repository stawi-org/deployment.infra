# Deletes specific Machine resources from Omni's state, identified by
# UUID. Used to unstick machines that ended up in a half-state on
# /var/lib/omni after a backup-restore (e.g. "the machine is already
# being reset" — a flag the restore preserved indefinitely because
# the running node has long since completed the reset).
#
# After delete:
#   - The Machine resource and its dependent ClusterMachineConfig +
#     reset state are removed from Omni.
#   - The node, still running, retries siderolink-api join via the
#     kernel-cmdline jointoken; Omni mints a fresh Machine + Link.
#   - tofu-apply on layer-03 then relabels the new Machine and the
#     cluster reconciles into Ready.
#
# Trigger: workflow_dispatch only (operator decision — never auto).
# Auth: same OMNI_SERVICE_ACCOUNT_KEY used by sync-cluster-template.
name: omni-machine-delete
on:
  workflow_dispatch:
    inputs:
      machine_ids:
        description: Comma-separated Machine UUIDs to delete.
        type: string
        required: true

permissions:
  contents: read

env:
  OMNI_VERSION: v1.7.1

jobs:
  delete:
    runs-on: ubuntu-latest
    env:
      OMNI_ENDPOINT: https://cp.stawi.org
      OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}
      MACHINE_IDS: ${{ inputs.machine_ids }}
    steps:
      - name: Install omnictl + yq
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/omnictl \
            "https://github.com/siderolabs/omni/releases/download/$OMNI_VERSION/omnictl-linux-amd64"
          chmod +x /tmp/omnictl
          sudo install -m 0755 /tmp/omnictl /usr/local/bin/omnictl
          # yq used to strip finalizers before delete (avoids hang)
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.6/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          omnictl --version

      - name: Verify auth
        run: timeout 30 omnictl get user --output json | head -20

      # We try deleting the underlying Link (the Machine resource is
      # derived from it; deleting Link is the canonical "forget this
      # node" path). MachineLabels and other operator-set attributes
      # are also cleared so the node re-registers as a clean slate.
      # Per-op timeouts: without them omnictl can hang forever on
      # finalizer-stuck Links after destroy/resize (seen 2026-07).
      - name: Delete Machines and friends
        timeout-minutes: 15
        run: |
          set -uo pipefail
          IFS=',' read -ra IDS <<< "$MACHINE_IDS"
          kinds=(
            clustermachineconfigstatuses
            clustermachinestatuses
            clustermachineconfigpatches
            clustermachines
            machinesetnodes
            machinelabels
            machinestatuses
            machines
            links
          )
          for id in "${IDS[@]}"; do
            id=$(echo "$id" | tr -d ' ')
            [[ -z "$id" ]] && continue
            echo "::group::deleting resources for $id"
            for kind in "${kinds[@]}"; do
              if timeout 20 omnictl get "$kind" "$id" -o yaml >/tmp/r.yaml 2>/dev/null; then
                # Best-effort finalizer strip before delete
                if command -v yq >/dev/null 2>&1; then
                  yq -i 'del(.metadata.finalizers) | del(.metadata.version) | del(.metadata.created) | del(.metadata.updated) | del(.metadata.phase) | del(.metadata.owner)' /tmp/r.yaml 2>/dev/null || true
                  timeout 20 omnictl apply -f /tmp/r.yaml >/dev/null 2>&1 || true
                fi
                if timeout 30 omnictl delete "$kind" "$id" --force >/dev/null 2>&1 \
                  || timeout 30 omnictl delete "$kind" "$id" >/dev/null 2>&1; then
                  echo "  deleted $kind/$id"
                else
                  echo "  (delete $kind/$id skipped/timed out)"
                fi
              else
                echo "  $kind/$id not present"
              fi
            done
            echo "::endgroup::"
          done

      - name: Show remaining MachineStatus list
        run: omnictl get machinestatus --output table || true
