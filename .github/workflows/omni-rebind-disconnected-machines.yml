# Recovery: rebind live Omni machine UUIDs when cluster still references
# disconnected UUIDs for the same hostname.
#
# Prefer omni-cleanup-dead-twins for full dead-UUID purge (finalizers +
# all cluster machine kinds). This workflow labels live twins and
# purges dead cluster resources so MachineClass can allocate cleanly.
name: omni-rebind-disconnected-machines
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type REBIND to proceed
        type: string
        required: true
      dry_run:
        description: Plan only
        type: boolean
        default: true

permissions:
  contents: read

env:
  OMNI_VERSION: v1.9.3

jobs:
  rebind:
    if: inputs.confirm == 'REBIND'
    runs-on: ubuntu-latest
    env:
      OMNI_ENDPOINT: https://cp.stawi.org
      OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}
      DRY_RUN: ${{ inputs.dry_run }}
    steps:
      - name: Install omnictl + jq + yq
        run: |
          set -euo pipefail
          curl -fsSL -o /usr/local/bin/omnictl.real \
            "https://github.com/siderolabs/omni/releases/download/${OMNI_VERSION}/omnictl-linux-amd64"
          chmod +x /usr/local/bin/omnictl.real
          cat > /usr/local/bin/omnictl <<'WRAP'
          #!/bin/bash
          exec /usr/local/bin/omnictl.real --insecure-skip-tls-verify "$@"
          WRAP
          chmod +x /usr/local/bin/omnictl
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.6/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Plan and rebind
        timeout-minutes: 20
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          trap 'rm -rf "$tmp"' EXIT
          omnictl get machinestatus -o json | jq -cs 'flatten' > "$tmp/ms.json"

          dry="${DRY_RUN:-true}"
          # Live twin = any connected peer with same hostname (already
          # cluster-bound or unbound). Dead = disconnected + cluster.
          mapfile -t ACTIONS < <(jq -r '
            [ .[]
              | {
                  id: .metadata.id,
                  host: (.spec.network.hostname // ""),
                  connected: (.spec.connected // false),
                  cluster: (.spec.cluster // ""),
                  role: (.spec.role // 0)
                }
              | select(.host != "")
            ]
            | group_by(.host)
            | .[]
            | . as $g
            | ($g | map(select(.cluster == "stawi" and .connected == false))) as $dead
            | ($g | map(select(.connected == true))) as $live
            | select(($dead | length) > 0 and ($live | length) > 0)
            | $dead[] as $d
            | ($live | sort_by(.id) | .[0]) as $l
            | (if $d.role == 1 then "stawi-control-planes" else "stawi-workers" end) as $mset
            | (if $d.role == 1 then "controlplane" else "worker" end) as $role
            | "\($d.host)\t\($d.id)\t\($l.id)\t\($mset)\t\($role)"
          ' "$tmp/ms.json")

          echo "dry_run=${dry} candidates=${#ACTIONS[@]}"
          for row in "${ACTIONS[@]:-}"; do
            IFS=$'\t' read -r host old new mset role <<<"$row"
            echo "  ${host}: ${old} (${role}/dead) -> ${new} (live) on ${mset}"
          done
          if [[ ${#ACTIONS[@]} -eq 0 ]]; then
            echo "nothing to rebind"
            exit 0
          fi
          if [[ "$dry" == "true" ]]; then
            echo "dry-run only; re-run with dry_run=false"
            exit 0
          fi

          # MachineSets use automated MachineClass allocation — do NOT
          # create MachineSetNodes by hand. Purge dead twin resources
          # (with finalizer strip + timeouts) and label live twins.
          kinds=(
            clustermachineconfigstatuses
            clustermachinestatuses
            clustermachineconfigpatches
            clustermachines
            machinesetnodes
            machinelabels
            machinestatuses
            machines
            links
          )

          for row in "${ACTIONS[@]}"; do
            IFS=$'\t' read -r host old new mset role <<<"$row"
            echo "::group::purge dead $old ($host) / label live $new"

            labels_json=$(jq -n --arg id "$new" --arg role "$role" --arg host "$host" '{
              metadata: {
                namespace: "default",
                type: "MachineLabels.omni.sidero.dev",
                id: $id,
                labels: { "node.stawi.org/role": $role, "node.stawi.org/name": $host }
              },
              spec: {}
            }')
            printf '%s\n' "$labels_json" > "$tmp/labels-${new}.json"
            echo "apply labels ${new} role=${role} (${host})"
            timeout 30 omnictl apply -f "$tmp/labels-${new}.json" || true

            for kind in "${kinds[@]}"; do
              if timeout 20 omnictl get "$kind" "$old" -o yaml > "$tmp/r.yaml" 2>/dev/null; then
                # Only finalizers — broader metadata patches rejected by Omni.
                yq -i 'del(.metadata.finalizers)' "$tmp/r.yaml" 2>/dev/null || true
                timeout 20 omnictl apply -f "$tmp/r.yaml" >/dev/null 2>&1 || true
                if timeout 30 omnictl delete "$kind" "$old" --force >/dev/null 2>&1 \
                  || timeout 30 omnictl delete "$kind" "$old" >/dev/null 2>&1; then
                  echo "  deleted $kind/$old"
                else
                  echo "  (delete $kind/$old skipped)"
                fi
              fi
            done
            echo "::endgroup::"
          done
          echo "rebind complete — waiting for MachineClass auto-allocation"
          sleep 15
          echo "=== machineset status ==="
          omnictl get machinesets -o yaml 2>/dev/null | head -80 || true
          echo "=== clustermachinestatus (sample) ==="
          omnictl get clustermachinestatus -o json 2>/dev/null \
            | jq -s '[.[] | {id:.metadata.id, ready:.spec.ready, stage:.spec.stage}] | .[0:15]' || true
          echo "::notice::Next: gh workflow run reconcile-omni-machine-ids.yml -f write=true -f confirm=RECONCILE to pin live UUIDs in inventory"
          echo "::notice::If ghosts remain: gh workflow run omni-cleanup-dead-twins.yml -f dry_run=false -f confirm=CLEANUP"
