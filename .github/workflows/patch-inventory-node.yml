name: patch-inventory-node

# Read-modify-write a single field on one node entry inside an inventory
# nodes.yaml in R2 (s3://cluster-tofu-state/production/inventory/<provider>/
# <account>/nodes.yaml). Used when the existing upload-inventory workflow
# would clobber other operator-declared fields and you only want to set
# (or replace) one key on one node — e.g. setting boot_volume_size_gb on
# a single node without re-uploading the whole file.
#
# All workflow_dispatch inputs are routed through the env: block before
# being read inside run: scripts, never interpolated directly into shell
# (avoids the workflow-injection class of bug —
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/).

on:
  workflow_dispatch:
    inputs:
      provider:
        description: Provider directory (oracle|contabo|onprem)
        required: true
        type: choice
        options: [oracle, contabo, onprem]
      account:
        description: Account key (e.g. bwire)
        required: true
        type: string
      node:
        description: Node name (e.g. oci-bwire-node-1)
        required: true
        type: string
      field:
        description: Field name on the node entry (e.g. boot_volume_size_gb)
        required: true
        type: string
      value:
        description: Field value (parsed as YAML, so 140 stays an int)
        required: true
        type: string

jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_ACCESS_KEY_ID:         ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:     ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ACCOUNT_ID:             ${{ secrets.R2_ACCOUNT_ID }}
      PROVIDER:                  ${{ inputs.provider }}
      ACCOUNT:                   ${{ inputs.account }}
      NODE:                      ${{ inputs.node }}
      FIELD:                     ${{ inputs.field }}
      VALUE:                     ${{ inputs.value }}
    steps:
      - name: Install pyyaml
        run: python3 -m pip install --quiet pyyaml

      - name: Download nodes.yaml
        run: |
          set -euo pipefail
          KEY="production/inventory/${PROVIDER}/${ACCOUNT}/nodes.yaml"
          aws s3 cp --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            "s3://cluster-tofu-state/${KEY}" /tmp/nodes.yaml
          echo "::group::current nodes.yaml"
          cat /tmp/nodes.yaml
          echo "::endgroup::"

      - name: Patch field
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os, sys, yaml
          with open("/tmp/nodes.yaml") as f:
              data = yaml.safe_load(f)
          node = os.environ["NODE"]
          field = os.environ["FIELD"]
          val = yaml.safe_load(os.environ["VALUE"])
          if "nodes" not in data or node not in data["nodes"]:
              keys = list(data.get("nodes", {}).keys())
              sys.exit(f"node '{node}' not in nodes.yaml — nodes present: {keys}")
          data["nodes"][node][field] = val
          with open("/tmp/nodes.yaml", "w") as f:
              yaml.safe_dump(data, f, default_flow_style=False, sort_keys=False)
          PY
          echo "::group::patched nodes.yaml"
          cat /tmp/nodes.yaml
          echo "::endgroup::"

      - name: Upload patched nodes.yaml
        run: |
          set -euo pipefail
          KEY="production/inventory/${PROVIDER}/${ACCOUNT}/nodes.yaml"
          aws s3 cp --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            /tmp/nodes.yaml "s3://cluster-tofu-state/${KEY}"
