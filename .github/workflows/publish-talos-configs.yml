name: publish-talos-configs
# Bundles the rendered Talos machine configs from layer 03's R2 state and
# uploads them as an encrypted workflow artifact and an encrypted R2 audit
# archive. Machine configs and talosconfig contain cluster trust material, so
# the tarball is encrypted to the dispatching user's public SSH keys before
# upload.
#
# Triggered automatically after a successful tofu-apply, or manually via:
#   gh workflow run publish-talos-configs.yml --ref main
#
# Retrieve locally:
#   gh run download <run-id> -n talos-configs -D /tmp/talos
#   age -d -i ~/.ssh/id_ed25519 /tmp/talos/talos-configs.tar.gz.age > /tmp/talos/talos-configs.tar.gz
#   tar -xzf /tmp/talos/talos-configs.tar.gz -C /tmp/talos

on:
  workflow_call: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install age
        run: |
          set -euo pipefail
          AGE_VER="v1.2.1"
          curl -fsSL -o /tmp/age.tgz "https://github.com/FiloSottile/age/releases/download/${AGE_VER}/age-${AGE_VER}-linux-amd64.tar.gz"
          tar -xzf /tmp/age.tgz -C /tmp
          sudo install -m 0755 /tmp/age/age /usr/local/bin/age

      - name: Fetch dispatcher's SSH public keys from GitHub
        env:
          ACTOR: ${{ github.triggering_actor }}
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/${ACTOR}.keys" \
            | grep -E '^(ssh-ed25519|ssh-rsa)[[:space:]]' \
            > /tmp/recipients.keys || true

          if [[ ! -s /tmp/recipients.keys ]]; then
            echo "::error::${ACTOR} has no ssh-ed25519 or ssh-rsa public keys on GitHub."
            echo "::error::Add one at https://github.com/settings/keys so this workflow can encrypt the Talos config bundle to you."
            exit 1
          fi

          echo "Will encrypt to $(wc -l < /tmp/recipients.keys) public key(s) belonging to ${ACTOR}"

      - name: Fetch layer-03 state from R2
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          aws s3 cp "s3://cluster-tofu-state/production/03-talos.tfstate" /tmp/03.tfstate \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" --region us-east-1
          test -s /tmp/03.tfstate

      - name: Render bundle
        run: |
          set -euo pipefail
          OUT=/tmp/talos-configs
          mkdir -p "$OUT/controlplane" "$OUT/worker"

          # Extract every output we need in one pass.
          jq -r '.outputs.talosconfig.value' /tmp/03.tfstate > "$OUT/talosconfig"
          jq -r '.outputs.generic_worker_config.value' /tmp/03.tfstate > "$OUT/generic-worker.yaml"

          # Controlplane configs — one file per node named after the node key.
          # Iterate keys then fetch the value per key so embedded newlines in
          # the YAML don't mangle a tab-delimited stream.
          for NAME in $(jq -r '.outputs.cp_machine_configs.value | keys[]' /tmp/03.tfstate) ; do
            jq -r --arg k "$NAME" '.outputs.cp_machine_configs.value[$k]' /tmp/03.tfstate \
              > "$OUT/controlplane/${NAME}.yaml"
          done

          # Per-worker configs — same shape. Declared on-prem workers use
          # these files for stable hostnames and inventory labels.
          for NAME in $(jq -r '.outputs.worker_machine_configs.value | keys[]' /tmp/03.tfstate) ; do
            jq -r --arg k "$NAME" '.outputs.worker_machine_configs.value[$k]' /tmp/03.tfstate \
              > "$OUT/worker/${NAME}.yaml"
          done

          # Ship the schematic alongside so the user knows exactly which
          # Talos image + extensions to boot before applying the config.
          cp tofu/shared/schematic.yaml "$OUT/schematic.yaml" 2>/dev/null || \
            cp talos_config/schematic.yaml "$OUT/schematic.yaml" 2>/dev/null || true

          cat > "$OUT/README.md" <<'README'
          # talos-configs/ bundle

          Machine configs for the stawi cluster, produced by layer 03
          on the last successful tofu-apply.

          Contents:
          - `talosconfig` — root client config for `talosctl` (cluster-admin).
          - `controlplane/<node>.yaml` — per-controlplane machine config.
          - `worker/<node>.yaml` — per-worker machine config for OCI and
             declared on-prem inventory nodes. Prefer this for named on-prem
             workers so hostnames and labels stay stable when IPs change.
          - `generic-worker.yaml` — platform-neutral worker config. Use
             this for an unregistered non-cloud machine.
             No LinkConfig, no platform metadata assumed — the host
             machine sets up its own network (DHCP/SLAAC); the worker
             joins the cluster via outbound KubeSpan WireGuard.
          - `schematic.yaml` — boot image factory schematic. Feed to
             https://factory.talos.sh to get a matching ISO / disk image.

          ## Join a non-cloud machine as a worker

          1. Generate a matching Talos boot image:
                cat schematic.yaml | curl -fsSL \
                   -X POST -H 'Content-Type: application/x-yaml' \
                   --data-binary @- https://factory.talos.sh/schematics
             The response contains a schematic ID; the ISO is at
                 https://factory.talos.sh/image/<schematic-id>/<talos-version>/metal-amd64.iso

          2. Boot the machine from that ISO (USB or PXE). Let it DHCP.

          3. Find the machine's LAN IP (Talos prints it on the console).

          4. Apply the config:
                 talosctl apply-config --insecure \
                     --nodes <lan-ip> \
                     --file generic-worker.yaml

          5. Wait a minute. The node joins the cluster via KubeSpan
             WireGuard (all outbound, NAT-friendly). Confirm:
                 kubectl get nodes

          ## Notes on IPv6
          Cluster is IPv6-first: pods prefer fd00:10:244::/48, services
          prefer fd00:10:96::/112. Workers behind NAT-v4-only ISPs still
          work — KubeSpan carries all pod / service traffic over its
          WireGuard mesh regardless of the host network's stack.
          README

          tar -C /tmp -czf /tmp/talos-configs.tar.gz talos-configs
          age -R /tmp/recipients.keys -o /tmp/talos-configs.tar.gz.age /tmp/talos-configs.tar.gz
          shred -u /tmp/talos-configs.tar.gz
          find "$OUT" -type f -exec shred -u {} +
          rm -rf "$OUT"

          ls -lh /tmp/talos-configs.tar.gz.age

      - name: Upload encrypted bundle to R2 for audit
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
          RUN_ID:                ${{ github.run_id }}
          GIT_SHA:               ${{ github.sha }}
        run: |
          set -euo pipefail
          AUDIT_KEY="production/audit/talos-configs/${RUN_ID}/${GIT_SHA}/talos-configs.tar.gz.age"
          aws s3 cp /tmp/talos-configs.tar.gz.age "s3://cluster-tofu-state/${AUDIT_KEY}" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" --region us-east-1
          echo "Uploaded audit bundle to s3://cluster-tofu-state/${AUDIT_KEY}"

      - uses: actions/upload-artifact@v4
        with:
          name: talos-configs
          path: /tmp/talos-configs.tar.gz.age
          retention-days: 1
