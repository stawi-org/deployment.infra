# Regenerates Omni-aware Talos images and uploads them to R2 + per-account
# OCI Object Storage. Output is consumed by the node-* tofu modules via
# tofu/shared/inventory/talos-images.yaml.
#
# Why this exists: tofu used to drive image generation by computing a
# Talos Image Factory schematic at plan time and registering it with the
# contabo/oci providers. With Omni in front of cluster lifecycle, images
# need to be Omni-signed (so machines auto-register via SideroLink), so
# `omnictl download` is the build step now. Doing it from CI keeps tofu
# out of the image-build path entirely.
#
# Job topology:
#   build              — omnictl download → R2 upload → .oci archive →
#                        R2 upload, computes schematic_id and SHAs.
#   discover-oracle    — enumerates oracle accounts in R2 inventory and
#                        emits a matrix of {profile, region, tenancy,
#                        compartment_ocid}.
#   oci-import         — matrix per oracle account: WIF auth → download
#                        .oci from R2 → upload to per-account
#                        talos-images-<account> bucket → oci compute
#                        image import → capture OCID → emit JSON
#                        artifact.
#   assemble           — collects per-account artifacts, renders the
#                        final talos-images.yaml, opens / updates the
#                        bot/talos-images-bump PR.
#
# Auth: needs OMNI_SERVICE_ACCOUNT_KEY (operator creates a service
# account in the Omni dashboard once: Service Accounts → Create →
# role ADMIN → copy key once → store as repo secret). The Operator
# role is NOT enough — `omnictl download` calls into Omni's
# CreateSchematic / SideroLink-params path which requires Admin
# (run #25154959742 surfaced "insufficient role: Operator"). OCI
# imports reuse the existing GitHub-OIDC-to-OCI WIF flow already used
# by tofu-layer.yml.
name: regenerate-talos-images
on:
  workflow_dispatch:
    inputs:
      talos_version:
        description: Talos version to bake into the image (default v1.13.0)
        type: string
        default: v1.13.0
      force:
        description: Open a PR even if the schematic is unchanged
        type: boolean
        default: false
  # Weekly catch-up — Mondays 06:00 UTC. Talos and Omni both publish
  # patch releases at unpredictable cadence; weekly is enough to avoid
  # falling far behind without bumping VPS reinstalls every push.
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write
  pull-requests: write
  id-token: write # GitHub-OIDC → OCI workload-identity exchange.

# A second concurrent run would race on the inventory file. Cancel any
# in-flight regen so the latest one wins.
concurrency:
  group: regenerate-talos-images
  cancel-in-progress: true

env:
  # cluster-tofu-state holds tofu state + the R2 inventory tree
  # (oracle/<account>/auth.yaml etc). It stays private — readers
  # use SigV4 with the R2 access keys.
  R2_BUCKET: cluster-tofu-state
  # Public-read bucket for Talos image bytes, operator-bound to a
  # public custom domain (default pkgs.stawi.org). Path-style
  # `<account>.r2.cloudflarestorage.com` URLs require SigV4 auth
  # (Contabo / OCI image-import / on-prem cloud-init can't fetch
  # those); the custom domain serves the bucket anonymously.
  #
  # Both values are sourced from GitHub Actions repo Variables so
  # the operator can rebind to a different bucket / hostname
  # without code changes. Defaults match the operator's current
  # binding (cluster-image-registry → pkgs.stawi.org).
  R2_IMAGE_BUCKET: ${{ vars.R2_IMAGE_BUCKET || 'cluster-image-registry' }}
  IMAGES_PUBLIC_HOST: ${{ vars.IMAGES_PUBLIC_HOST || 'pkgs.stawi.org' }}
  OMNI_VERSION: v1.7.1 # Pinned to match the running Omni server.
  # AWS CLI 2.23+ added mandatory CRC checksums on multipart uploads,
  # which Cloudflare R2 (and OCI Object Storage's S3-compat) reject
  # with `MissingContentLength`. Run #25249802815 surfaced this
  # 2026-05-02. Setting both vars to `when_required` keeps the SDK
  # in the pre-2.23 behavior — checksums only when the bucket
  # explicitly opts in, no chunked-transfer-encoding for uploads.
  # Inherits into every job's env automatically.
  AWS_REQUEST_CHECKSUM_CALCULATION: when_required
  AWS_RESPONSE_CHECKSUM_VALIDATION: when_required

jobs:
  build:
    runs-on: ubuntu-latest
    # NOTE: we intentionally do NOT emit *_url outputs. Anything
    # interpolating ${R2_ACCOUNT_ID} (a registered secret) gets
    # `##[warning]Skip output ... since it may contain secret.` and
    # arrives at downstream jobs as the empty string. We pass the
    # basenames + schematic_id and let assemble-and-pr stitch the
    # URLs from the R2_ACCOUNT_ID secret it loads from `secrets`.
    outputs:
      skipped: ${{ steps.build.outputs.skipped }}
      schematic_id: ${{ steps.build.outputs.schematic_id }}
      talos_version: ${{ steps.build.outputs.talos_version }}
      generated_at: ${{ steps.build.outputs.generated_at }}
      contabo_file: ${{ steps.build.outputs.contabo_file }}
      contabo_sha256: ${{ steps.build.outputs.contabo_sha256 }}
      onprem_file: ${{ steps.build.outputs.onprem_file }}
      onprem_sha256: ${{ steps.build.outputs.onprem_sha256 }}
      oracle_qcow2_file: ${{ steps.build.outputs.oracle_qcow2_file }}
      oracle_qcow2_sha256: ${{ steps.build.outputs.oracle_qcow2_sha256 }}
      oracle_archive_object: ${{ steps.build.outputs.oracle_archive_object }}
      oracle_archive_sha256: ${{ steps.build.outputs.oracle_archive_sha256 }}
    env:
      # cpd.<zone> is gray-cloud direct (no CF in front). cp.<zone>
      # is orange-cloud — CF's free plan downgrades HTTP/2 to HTTP/1.1
      # at the origin which breaks omnictl's native gRPC client. The
      # cert is a CF Origin Cert (not publicly trusted), so the
      # omnictl wrapper installed below always passes
      # `--insecure-skip-tls-verify`. Auth still comes from
      # OMNI_SERVICE_ACCOUNT_KEY.
      OMNI_ENDPOINT: https://cpd.stawi.org
      OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}
      TALOS_VERSION: ${{ inputs.talos_version || 'v1.13.0' }}
      FORCE: ${{ inputs.force }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5

      # omnictl version pinned to match the running Omni server. The
      # download URL pattern follows sidero-labs/omni release artifacts.
      - name: Install omnictl
        run: |
          set -euo pipefail
          curl -fsSL -o /usr/local/bin/omnictl.real \
            "https://github.com/siderolabs/omni/releases/download/${OMNI_VERSION}/omnictl-linux-amd64"
          chmod +x /usr/local/bin/omnictl.real
          # Wrapper that always passes --insecure-skip-tls-verify
          # (cpd.<zone>'s cert is a CF Origin Cert — not publicly
          # trusted; auth still enforced via OMNI_SERVICE_ACCOUNT_KEY).
          cat > /usr/local/bin/omnictl <<'WRAP'
          #!/bin/bash
          exec /usr/local/bin/omnictl.real --insecure-skip-tls-verify "$@"
          WRAP
          chmod +x /usr/local/bin/omnictl
          omnictl --version

      # Smoke-test the service account credentials before we try
      # anything destructive. Failure here means OMNI_SERVICE_ACCOUNT_KEY
      # is wrong / expired.
      - name: Verify omnictl auth
        run: omnictl get user --output json | head -20

      # Guard against the "regen-images runs before omni-host has new
      # token" race. Omni rotates the SideroLink join token when it
      # starts up; images carry the token baked in at download time.
      # If this workflow fires before the new omni-host instance is
      # fully up, `omnictl download` embeds a stale token and nodes
      # won't auto-register. Wait up to 5 min for the api_endpoint to
      # match the expected cpd.stawi.org address before building.
      - name: Wait for new SideroLink token
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 300 ))
          while :; do
            api=$(omnictl get connectionparams -o json 2>/dev/null \
              | jq -r '.spec.api_endpoint // empty')
            if [[ "$api" == "https://cpd.stawi.org" ]]; then
              echo "::notice::SideroLink token ready, api_endpoint=$api"
              break
            fi
            if [[ $(date +%s) -ge $deadline ]]; then
              echo "::error::Timed out waiting for SideroLink api_endpoint to settle on cpd.stawi.org (last value: '$api')"
              exit 1
            fi
            sleep 10
          done
        env:
          OMNI_ENDPOINT: https://cpd.stawi.org
          OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}

      # Whole pipeline runs in a single bash step so we can use
      # arrays (safe quoting of customization values) without
      # round-tripping through GITHUB_OUTPUT.
      - name: Build / upload images and .oci archive
        id: build
        run: |
          set -euo pipefail
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          # ----- Hash the schematic source (file + version) -----
          src_hash=$(sha256sum tofu/shared/schematics/cluster.yaml | cut -d' ' -f1)
          schematic_id="${src_hash}-${TALOS_VERSION}"
          echo "::notice::schematic source hash = ${schematic_id}"

          # ----- Skip if unchanged and not forced -----
          # Note: the per-account OCI matrix re-runs whenever build
          # runs, so a new oracle account added between regens is only
          # picked up on the next change-driven or forced regen. Force
          # is the operator-facing escape hatch.
          stored=$(yq -r '.schematic_id // ""' tofu/shared/inventory/talos-images.yaml)
          if [[ "${stored}" == "${schematic_id}" && "${FORCE}" != "true" ]]; then
            echo "::notice::schematic unchanged (${stored}); skipping rebuild — pass force=true to override"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skipped=false" >> "$GITHUB_OUTPUT"

          # ----- Parse customization into bash arrays (safe quoting) -----
          mapfile -t extensions < <(yq -r '.customization.systemExtensions.officialExtensions // [] | .[]' \
            tofu/shared/schematics/cluster.yaml)
          mapfile -t kargs < <(yq -r '.customization.extraKernelArgs // [] | .[]' \
            tofu/shared/schematics/cluster.yaml)
          ext_args=()
          for e in "${extensions[@]}"; do ext_args+=("--extensions" "$e"); done
          karg_args=()
          for k in "${kargs[@]}"; do karg_args+=("--extra-kernel-args" "$k"); done
          echo "::notice::extensions=[${extensions[*]:-}] kargs=[${kargs[*]:-}]"

          # ----- Download images per cloud profile -----
          # Oracle is arm64 because every OCI shape we run today is
          # A1.Flex (Ampere). The shape-compat declaration in the .oci
          # archive metadata also pins A1.Flex. Adding x86 OCI nodes
          # would mean a second oracle download here AND a metadata
          # update — flag now so we don't silently break it.
          #
          # `omnictl download <name>` matches by spec.Name, spec.Profile,
          # or spec.Overlay (omnictl/download.go findImage). Profile
          # `metal` is ambiguous (ISO + raw share it), so for the raw
          # variant we hand the unique spec.Name "Generic image (amd64)"
          # — the registered names live in
          # internal/backend/runtime/omni/controllers/omni/installation_media.go.
          # ISO has the substring-match special case so plain `iso` +
          # arch filter is unique. Oracle profile is unique.
          mkdir -p /tmp/images
          download_image() {
            local image_name=$1 arch=$2
            echo "::group::download ${image_name} (${arch})"
            omnictl download "${image_name}" \
              --arch "${arch}" \
              --talos-version "${TALOS_VERSION}" \
              "${ext_args[@]}" \
              "${karg_args[@]}" \
              --output /tmp/images/
            echo "::endgroup::"
          }
          # Contabo and on-prem both use the ISO. Contabo's image
          # API rejects raw.xz with HTTP 415 even with a proper file
          # extension and Content-Type — the pre-Omni setup also
          # used ISO for Contabo (factory.talos.dev/.../metal-amd64
          # .iso). ISO boots Contabo's installer and runs Talos's
          # own installer on first boot; same end state as raw.
          download_image iso    amd64   # contabo + on-prem (shared)
          download_image oracle arm64   # oci (A1.Flex)
          ls -la /tmp/images/

          # ----- Resolve filenames produced by omnictl -----
          # Omni names files
          # `<profile>-<arch>-omni-<account>-<version>-<short_id>.<ext>`,
          # so the exact name varies per Omni install. Glob by
          # profile-arch prefix + extension and require exactly one
          # match per slot. Oracle ships qcow2-inside-xz (per
          # InstallationMedia ContentType="application/x-xz"), so we
          # decompress for the .oci archive build below.
          metal_iso_file=$(cd /tmp/images && ls metal-amd64-*.iso  2>/dev/null | head -1 || true)
          oracle_xz=$(cd      /tmp/images && ls oracle-arm64-*.xz  2>/dev/null | head -1 || true)
          for v in "$metal_iso_file" "$oracle_xz"; do
            if [[ -z "$v" ]]; then
              echo "::error::expected image file missing — omnictl output naming may have changed"
              ls -la /tmp/images/
              exit 1
            fi
          done
          # Both contabo and onprem point at the same ISO bytes.
          contabo_file="${metal_iso_file}"
          onprem_file="${metal_iso_file}"

          # Decompress oracle xz → qcow2 for the .oci archive build.
          # The .xz wrapper is Omni's transport format; OCI image
          # import wants a raw qcow2 inside the archive.
          oracle_qcow2_file="${oracle_xz%.xz}.qcow2"
          xz -dc "/tmp/images/${oracle_xz}" > "/tmp/images/${oracle_qcow2_file}"
          oracle_file="${oracle_qcow2_file}"

          # ----- Build .oci archive (qcow2 + image_metadata.json) -----
          # OCI's CreateImage / UpdateImage APIs do NOT expose
          # launchOptions in any SDK or CLI surface — the only way to
          # pin them is via image_metadata.json embedded in a `.oci`
          # archive (qcow2 + JSON, plain tar). OCI auto-detects the
          # archive on import and reads externalLaunchOptions as the
          # image's defaults — exactly what Talos arm64 needs (UEFI_64
          # + fully-paravirtualized virtio so /dev/sda is visible).
          #
          # Schema follows Talos's published template verbatim. Three
          # fields are non-obvious but load-bearing:
          #   * version: 2 (number, NOT "1.0" string) — OCI's parser
          #     rejects unknown schema versions silently and falls back
          #     to no-metadata defaults (ISCSI bootVolumeType — Talos
          #     can't find /dev/sda).
          #   * externalLaunchOptions.launchOptionsSource — without
          #     this, OCI doesn't apply the launchOptions overrides.
          #   * additionalMetadata.shapeCompatibilities — declares
          #     which shapes the metadata is valid for. Lives under
          #     additionalMetadata, not at the top level.
          oracle_archive_object="talos-${TALOS_VERSION}-${schematic_id}-oracle-arm64.oci"
          oracle_archive_path="/tmp/images/${oracle_archive_object}"
          staging=$(mktemp -d)
          cp "/tmp/images/${oracle_file}" "${staging}/image.qcow2"
          os_version="${TALOS_VERSION#v}"
          cat > "${staging}/image_metadata.json" <<META
          {
            "version": 2,
            "externalLaunchOptions": {
              "firmware": "UEFI_64",
              "networkType": "PARAVIRTUALIZED",
              "bootVolumeType": "PARAVIRTUALIZED",
              "remoteDataVolumeType": "PARAVIRTUALIZED",
              "localDataVolumeType": "PARAVIRTUALIZED",
              "launchOptionsSource": "PARAVIRTUALIZED",
              "pvAttachmentVersion": 2,
              "pvEncryptionInTransitEnabled": true,
              "consistentVolumeNamingEnabled": true
            },
            "imageCapabilityData": null,
            "imageCapsFormatVersion": null,
            "operatingSystem": "Talos",
            "operatingSystemVersion": "${os_version}",
            "additionalMetadata": {
              "shapeCompatibilities": [
                {
                  "internalShapeName": "VM.Standard.A1.Flex",
                  "ocpuConstraints": null,
                  "memoryConstraints": null
                }
              ]
            }
          }
          META
          tar -cf "${oracle_archive_path}" -C "${staging}" image.qcow2 image_metadata.json
          rm -rf "${staging}"
          echo "::notice::built $(stat -c%s "${oracle_archive_path}") byte .oci archive"

          # ----- Upload everything to R2 -----
          # Explicit content-type per file. R2 doesn't infer one from
          # the extension, so without --content-type the served object
          # has no Content-Type header and Contabo's image API rejects
          # the registration with HTTP 415 Unsupported Media Type.
          # `application/octet-stream` is the standard fallback for
          # opaque binary blobs and is what Contabo's pre-Omni
          # factory.talos.dev URLs returned.
          dest_prefix="s3://${R2_IMAGE_BUCKET}/${schematic_id}"
          content_type_for() {
            case "$1" in
              *.iso)   echo "application/x-iso-stream" ;;
              *)       echo "application/octet-stream" ;;
            esac
          }
          # contabo + onprem share the ISO, so dedupe the upload list.
          declare -A seen_files=()
          upload_files=()
          for f in "/tmp/images/${contabo_file}" "/tmp/images/${onprem_file}" "/tmp/images/${oracle_file}" "${oracle_archive_path}"; do
            if [[ -z "${seen_files[$f]:-}" ]]; then
              seen_files[$f]=1
              upload_files+=("$f")
            fi
          done
          for f in "${upload_files[@]}"; do
            name=$(basename "$f")
            aws s3 cp "$f" "${dest_prefix}/${name}" \
              --content-type "$(content_type_for "$name")" \
              --endpoint-url "${R2_ENDPOINT}"
          done
          echo "::notice::uploaded to ${dest_prefix}/"

          # ----- Mirror to OCI cluster-image-registry (dual-write to bwire) -----
          # Source of truth for cross-tenancy image consumers (the
          # CF Worker for pkgs.stawi.org, future cross-account image-
          # import paths). Reads CSK from bwire's 02-oracle-infra
          # tfstate output `omni_backup_writer_credentials` (a single
          # CSK on the existing bwire operator user; see
          # tofu/layers/02-oracle-infra/oci-operator-csk.tf).
          #
          # Skip conditions:
          #   - bwire tfstate missing (fresh repo / pre-bootstrap)
          #   - omni_backup_writer_credentials output missing (older
          #     state from before the IAM collapse landed)
          state=$(mktemp)
          trap 'rm -f "$state"' EXIT
          state_key="production/02-oracle-infra-bwire.tfstate"
          if ! aws s3api head-object --bucket "${R2_BUCKET}" \
              --key "$state_key" \
              --endpoint-url "${R2_ENDPOINT}" --region us-east-1 >/dev/null 2>&1; then
            echo "::notice::02-oracle-infra-bwire tfstate not found — skipping OCI mirror (apply that layer first)."
          else
            aws s3 cp "s3://${R2_BUCKET}/${state_key}" "$state" \
              --endpoint-url "${R2_ENDPOINT}" --region us-east-1 >/dev/null
            if [[ "$(jq -r '.outputs.omni_backup_writer_credentials.value // "null"' "$state")" == "null" ]]; then
              echo "::notice::omni_backup_writer_credentials output missing — re-run 02-oracle-infra (bwire) apply to populate."
            else
              # NOTE: omni_backup_writer_credentials.bucket points at
              # omni-backup-storage. We override it here with the
              # cluster-image-registry bucket name, since the same
              # CSK has access to both.
              oci_access_key_id=$(jq -r '.outputs.omni_backup_writer_credentials.value.access_key_id' "$state")
              oci_secret_access_key=$(jq -r '.outputs.omni_backup_writer_credentials.value.secret_access_key' "$state")
              oci_region=$(jq -r '.outputs.omni_backup_writer_credentials.value.region' "$state")
              oci_endpoint=$(jq -r '.outputs.omni_backup_writer_credentials.value.endpoint' "$state")
              oci_dest_prefix="s3://cluster-image-registry/${schematic_id}"
              for f in "${upload_files[@]}"; do
                name=$(basename "$f")
                AWS_ACCESS_KEY_ID="$oci_access_key_id" \
                AWS_SECRET_ACCESS_KEY="$oci_secret_access_key" \
                AWS_EC2_METADATA_DISABLED=true \
                  aws s3 cp "$f" "${oci_dest_prefix}/${name}" \
                    --content-type "$(content_type_for "$name")" \
                    --endpoint-url "$oci_endpoint" \
                    --region "$oci_region"
              done
              echo "::notice::Mirrored to s3://cluster-image-registry/${schematic_id}/ in bwire tenancy"
            fi
          fi

          # ----- Compute SHA-256s and emit job outputs -----
          # Pass basenames + sha256s only — assemble-and-pr stitches
          # the URLs from R2_ACCOUNT_ID. GitHub filters any output
          # value that contains a registered secret, so emitting the
          # full URL here would arrive empty downstream.
          contabo_sha=$(sha256sum "/tmp/images/${contabo_file}" | cut -d' ' -f1)
          onprem_sha=$(sha256sum  "/tmp/images/${onprem_file}"  | cut -d' ' -f1)
          oracle_sha=$(sha256sum  "/tmp/images/${oracle_file}"  | cut -d' ' -f1)
          archive_sha=$(sha256sum "${oracle_archive_path}"      | cut -d' ' -f1)
          generated_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          {
            echo "schematic_id=${schematic_id}"
            echo "talos_version=${TALOS_VERSION}"
            echo "generated_at=${generated_at}"
            echo "contabo_file=${contabo_file}"
            echo "contabo_sha256=${contabo_sha}"
            echo "onprem_file=${onprem_file}"
            echo "onprem_sha256=${onprem_sha}"
            echo "oracle_qcow2_file=${oracle_file}"
            echo "oracle_qcow2_sha256=${oracle_sha}"
            echo "oracle_archive_object=${oracle_archive_object}"
            echo "oracle_archive_sha256=${archive_sha}"
          } >> "$GITHUB_OUTPUT"

  # Enumerates oracle accounts in R2 inventory and emits a matrix that
  # the oci-import job consumes. Skipped if `build` skipped.
  discover-oracle:
    needs: build
    if: needs.build.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    outputs:
      accounts: ${{ steps.list.outputs.accounts }}
      count: ${{ steps.list.outputs.count }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5

      - name: Enumerate oracle accounts
        id: list
        run: |
          set -euo pipefail
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          mkdir -p /tmp/oracle-inv
          aws s3 sync "s3://${R2_BUCKET}/production/inventory/oracle/" /tmp/oracle-inv/ \
            --endpoint-url "$R2_ENDPOINT" --region us-east-1 \
            --exclude "*" --include "*/auth.yaml" || true
          pip install --quiet pyyaml
          python3 - <<'PY' > /tmp/accounts.json
          import json, os
          import sys, yaml
          base = "/tmp/oracle-inv"
          out = []
          skipped = []
          if os.path.isdir(base):
              for entry in sorted(os.listdir(base)):
                  auth_p = os.path.join(base, entry, "auth.yaml")
                  if not os.path.exists(auth_p):
                      skipped.append(f"{entry}: auth.yaml missing")
                      continue
                  data = yaml.safe_load(open(auth_p)) or {}
                  # auth.yaml shape (per layer 02-oracle-infra/main.tf):
                  #   { auth: { oidc_client_identifier, domain_base_url,
                  #             tenancy_ocid, region, ... },
                  #     compartment_ocid: "...",
                  #     region: "...",  (sometimes top-level too)
                  #     ... }
                  # auth credentials live under .auth (or top-level on
                  # legacy layouts); compartment_ocid lives at the
                  # top-level (NOT under .auth, NOT in nodes.yaml).
                  auth = data.get("auth", data)
                  required = ("oidc_client_identifier", "domain_base_url", "tenancy_ocid", "region")
                  missing = [k for k in required if not auth.get(k)]
                  if missing:
                      skipped.append(f"{entry}: auth missing {missing}; auth keys = {sorted(auth.keys())}")
                      continue
                  # compartment_ocid lives inside the `auth` block too
                  # (real auth.yaml: {auth: {oidc..., compartment_ocid:
                  # "ocid1..."}}). Fall back to top-level for legacy
                  # layouts.
                  comp = (
                      auth.get("compartment_ocid")
                      or auth.get("compartment_id")
                      or data.get("compartment_ocid")
                      or data.get("compartment_id")
                  )
                  if not comp:
                      skipped.append(f"{entry}: missing compartment_ocid; data keys = {sorted(data.keys())}; auth keys = {sorted(auth.keys())}")
                      continue
                  out.append({
                      "profile": entry,
                      "region": auth["region"],
                      "tenancy_ocid": auth["tenancy_ocid"],
                      "compartment_ocid": comp,
                  })
          for s in skipped:
              print(f"::warning::skipped {s}", file=sys.stderr)
          print(json.dumps(out))
          PY
          accounts=$(cat /tmp/accounts.json)
          count=$(jq 'length' /tmp/accounts.json)
          echo "::notice::oracle accounts (${count}): ${accounts}"
          echo "accounts=${accounts}" >> "$GITHUB_OUTPUT"
          echo "count=${count}" >> "$GITHUB_OUTPUT"

  # Per-oracle-account image staging + import. Matrix fan-out over the
  # accounts emitted by discover-oracle. Each leg uses GitHub-OIDC →
  # OCI workload-identity exchange to authenticate to that account's
  # tenancy, then uploads the .oci archive and registers it as a
  # custom image. The OCID is the only output other layers need.
  oci-import:
    needs: [build, discover-oracle]
    if: needs.discover-oracle.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        account: ${{ fromJson(needs.discover-oracle.outputs.accounts) }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      # configure-oci-wif.sh writes profiles with `auth =
      # security_token` (no `user` OCID). Without this env var, the
      # OCI CLI's config validator rejects the profile with
      # "Key `user` missing". OCI_CLI_AUTH overrides the default
      # api_key auth for every `oci ...` invocation in this job.
      OCI_CLI_AUTH: security_token
    steps:
      - uses: actions/checkout@v5

      - name: Configure OCI WIF for this profile
        run: |
          set -euo pipefail
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          TMPDIR_AUTH=$(mktemp -d)
          aws s3 sync "s3://${R2_BUCKET}/production/inventory/oracle/${{ matrix.account.profile }}/" \
            "${TMPDIR_AUTH}/${{ matrix.account.profile }}/" \
            --endpoint-url "$R2_ENDPOINT" --region us-east-1 \
            --exclude "*" --include "auth.yaml"
          AUTH_JSON=$(python3 scripts/build-oci-auth-json.py "${TMPDIR_AUTH}")
          echo "$AUTH_JSON" > /tmp/oci_auth_accounts.json
          scripts/configure-oci-wif.sh /tmp/oci_auth_accounts.json

      - name: Install OCI CLI
        run: |
          set -euo pipefail
          pip install --quiet oci-cli
          oci --version

      - name: Stage .oci archive in account bucket
        id: stage
        env:
          PROFILE:        ${{ matrix.account.profile }}
          REGION:         ${{ matrix.account.region }}
          COMPARTMENT:    ${{ matrix.account.compartment_ocid }}
          ARCHIVE_OBJECT: ${{ needs.build.outputs.oracle_archive_object }}
          SCHEMATIC_ID:   ${{ needs.build.outputs.schematic_id }}
          TALOS_VERSION:  ${{ needs.build.outputs.talos_version }}
          R2_ACCOUNT_ID:  ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          # Download the .oci archive built by the build job. R2's
          # path-style host requires SigV4 auth even for GETs (curl
          # would 400), so fetch via `aws s3 cp` using the same R2
          # creds we already have for upload.
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          mkdir -p /tmp/oci-stage
          archive_local="/tmp/oci-stage/${ARCHIVE_OBJECT}"
          aws s3 cp \
            "s3://${R2_IMAGE_BUCKET}/${SCHEMATIC_ID}/${ARCHIVE_OBJECT}" \
            "${archive_local}" \
            --endpoint-url "${R2_ENDPOINT}"
          echo "::notice::downloaded $(stat -c%s "${archive_local}") byte archive"

          # Resolve the OCI Object Storage namespace for this tenancy.
          # `os ns get` returns {"data":"namespacestring"}.
          namespace=$(oci --profile "${PROFILE}" os ns get --query 'data' --raw-output)
          bucket="talos-images-${PROFILE}"

          # Idempotent bucket create. ObjectRead access matches the
          # tofu module's prior shape — though import-from-object uses
          # the authenticated session, not anonymous fetch, leaving it
          # public-read is harmless (image bytes aren't sensitive).
          if ! oci --profile "${PROFILE}" os bucket get \
                --namespace-name "${namespace}" \
                --bucket-name "${bucket}" >/dev/null 2>&1; then
            echo "::notice::creating bucket ${bucket}"
            oci --profile "${PROFILE}" os bucket create \
              --compartment-id "${COMPARTMENT}" \
              --namespace-name "${namespace}" \
              --name "${bucket}" \
              --public-access-type ObjectRead >/dev/null
          fi

          # Upload — `os object put --force` overwrites if the object
          # already exists (e.g. a prior partial run). The object name
          # carries the schematic_id so a content change implies a
          # different object.
          oci --profile "${PROFILE}" os object put \
            --namespace-name "${namespace}" \
            --bucket-name "${bucket}" \
            --name "${ARCHIVE_OBJECT}" \
            --file "${archive_local}" \
            --force >/dev/null
          echo "::notice::uploaded ${ARCHIVE_OBJECT} → oci://${namespace}/${bucket}/"

          {
            echo "namespace=${namespace}"
            echo "bucket=${bucket}"
          } >> "$GITHUB_OUTPUT"

      - name: Import as custom image
        id: import
        env:
          PROFILE:         ${{ matrix.account.profile }}
          COMPARTMENT:     ${{ matrix.account.compartment_ocid }}
          NAMESPACE:       ${{ steps.stage.outputs.namespace }}
          BUCKET:          ${{ steps.stage.outputs.bucket }}
          ARCHIVE_OBJECT:  ${{ needs.build.outputs.oracle_archive_object }}
          ARCHIVE_SHA256:  ${{ needs.build.outputs.oracle_archive_sha256 }}
          SCHEMATIC_ID:    ${{ needs.build.outputs.schematic_id }}
          TALOS_VERSION:   ${{ needs.build.outputs.talos_version }}
        run: |
          set -euo pipefail

          # display_name MUST include a content fingerprint of the
          # .oci archive bytes — the schematic_id is a cache key for
          # the schematic *config*, not the served image bytes (Omni's
          # image factory injects the SideroLink join token at serve
          # time, so the same schematic_id produces different bytes
          # whenever Omni's shared join token rotates). Without the
          # archive sha here, a regen that picks up a fresh token
          # reuses the prior OCID and tofu's image_change sentinel
          # never fires. Including the first 12 chars of the archive
          # sha ensures OCID changes whenever the served bytes change.
          display_name="Talos ${TALOS_VERSION} arm64 ${SCHEMATIC_ID} ${ARCHIVE_SHA256:0:12}"

          # Re-use a prior import if the same display_name already
          # exists in the compartment. OCI's `image import` is
          # idempotent on bucket/object but creates a NEW image OCID
          # each call — checking first avoids drift across reruns.
          existing=$(oci --profile "${PROFILE}" compute image list \
            --compartment-id "${COMPARTMENT}" \
            --display-name "${display_name}" \
            --lifecycle-state AVAILABLE \
            --query 'data[0].id' --raw-output 2>/dev/null || true)
          if [[ -n "${existing}" && "${existing}" != "null" ]]; then
            echo "::notice::reusing existing image ${existing}"
            ocid="${existing}"
          else
            # `image import from-object` returns immediately with the
            # new image OCID in IMPORTING state — `--wait-for-state`
            # isn't supported on this subcommand (OCI CLI ≥ 3.x).
            # We poll `image get` until AVAILABLE ourselves.
            #
            # --launch-mode is omitted so OCI auto-detects from the
            # archive metadata (CUSTOM with the launchOptions we
            # encoded).
            echo "::notice::importing ${ARCHIVE_OBJECT} as custom image"
            tmp=$(mktemp)
            if ! oci --profile "${PROFILE}" compute image import from-object \
                  --compartment-id "${COMPARTMENT}" \
                  --namespace "${NAMESPACE}" \
                  --bucket-name "${BUCKET}" \
                  --name "${ARCHIVE_OBJECT}" \
                  --display-name "${display_name}" \
                  > "$tmp"; then
              echo "::error::oci compute image import from-object failed"
              echo "::group::oci response"
              cat "$tmp" || true
              echo "::endgroup::"
              exit 1
            fi
            ocid=$(jq -r '.data.id // empty' "$tmp")
            if [[ -z "$ocid" ]]; then
              echo "::error::oci import returned no .data.id"
              cat "$tmp" >&2
              exit 1
            fi
            echo "::notice::queued import as ${ocid}; polling for AVAILABLE"

            # Cap at 30min (60 × 30s = 1800s). Image imports for
            # ~100MB qcow2 archives typically settle in 5-10 min.
            for i in $(seq 1 60); do
              state=$(oci --profile "${PROFILE}" compute image get \
                --image-id "${ocid}" \
                --query 'data."lifecycle-state"' --raw-output 2>/dev/null || true)
              case "${state:-UNKNOWN}" in
                AVAILABLE)
                  echo "::notice::image AVAILABLE after $((i * 30))s"
                  break
                  ;;
                IMPORTING|PROVISIONING)
                  sleep 30
                  ;;
                *)
                  echo "::error::image entered unexpected state ${state} (attempt ${i})"
                  exit 1
                  ;;
              esac
              if [[ $i -eq 60 ]]; then
                echo "::error::image still ${state} after 30min"
                exit 1
              fi
            done
          fi
          echo "ocid=${ocid}" >> "$GITHUB_OUTPUT"

      - name: Emit artifact
        env:
          PROFILE:        ${{ matrix.account.profile }}
          REGION:         ${{ matrix.account.region }}
          NAMESPACE:      ${{ steps.stage.outputs.namespace }}
          BUCKET:         ${{ steps.stage.outputs.bucket }}
          OBJECT:         ${{ needs.build.outputs.oracle_archive_object }}
          OCID:           ${{ steps.import.outputs.ocid }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/out
          jq -n --arg p "$PROFILE" --arg r "$REGION" --arg n "$NAMESPACE" \
                --arg b "$BUCKET" --arg o "$OBJECT" --arg id "$OCID" '
            { profile: $p, region: $r, namespace: $n,
              bucket: $b, object: $o, ocid: $id }
          ' > "/tmp/out/${PROFILE}.json"

      - uses: actions/upload-artifact@v6
        with:
          name: oci-import-${{ matrix.account.profile }}
          path: /tmp/out/${{ matrix.account.profile }}.json
          if-no-files-found: error

  # Renders the final talos-images.yaml from job outputs + per-account
  # artifacts and opens / updates the bot/talos-images-bump PR.
  assemble-and-pr:
    # Run as long as build + discover succeeded. oci-import is a
    # fail-fast=false matrix; we tolerate per-account failures and
    # publish the inventory with whichever OCIDs successfully made it.
    # (1 failed account out of 4 should not block the other 3.) The
    # render step only emits accounts that produced artifacts; missing
    # accounts simply don't appear in the per-account map.
    needs: [build, discover-oracle, oci-import]
    if: |
      always()
      && needs.build.result == 'success'
      && needs.build.outputs.skipped != 'true'
      && needs.discover-oracle.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v6
        with:
          path: /tmp/oci-artifacts
          pattern: oci-import-*
          merge-multiple: true

      - name: Render talos-images.yaml
        env:
          SCHEMATIC_ID:           ${{ needs.build.outputs.schematic_id }}
          TALOS_VERSION:          ${{ needs.build.outputs.talos_version }}
          GENERATED_AT:           ${{ needs.build.outputs.generated_at }}
          CONTABO_FILE:           ${{ needs.build.outputs.contabo_file }}
          CONTABO_SHA256:         ${{ needs.build.outputs.contabo_sha256 }}
          ONPREM_FILE:            ${{ needs.build.outputs.onprem_file }}
          ONPREM_SHA256:          ${{ needs.build.outputs.onprem_sha256 }}
          ORACLE_QCOW2_FILE:      ${{ needs.build.outputs.oracle_qcow2_file }}
          ORACLE_QCOW2_SHA256:    ${{ needs.build.outputs.oracle_qcow2_sha256 }}
          ORACLE_ARCHIVE_OBJECT:  ${{ needs.build.outputs.oracle_archive_object }}
          ORACLE_ARCHIVE_SHA256:  ${{ needs.build.outputs.oracle_archive_sha256 }}
        run: |
          set -euo pipefail

          # IMAGES_PUBLIC_HOST resolves to a Cloudflare-attached
          # custom domain on the R2 bucket — anonymous fetch works,
          # which is what Contabo / on-prem Talos / OCI image-import
          # need. The S3-API URL (account.r2.cloudflarestorage.com)
          # would 400 anonymous requests, so we deliberately do NOT
          # use it for downstream URLs.
          base="https://${IMAGES_PUBLIC_HOST}/${SCHEMATIC_ID}"

          # Header (committed to repo as source of truth).
          {
            echo "# Talos image inventory — managed by .github/workflows/regenerate-talos-images.yml."
            echo "# DO NOT edit by hand. To regenerate: run that workflow with force=true,"
            echo "# or bump tofu/shared/schematics/cluster.yaml and merge."
            echo "schematic_id: \"${SCHEMATIC_ID}\""
            echo "talos_version: \"${TALOS_VERSION}\""
            echo "generated_at: \"${GENERATED_AT}\""
            echo "formats:"
            echo "  contabo:"
            echo "    url: \"${base}/${CONTABO_FILE}\""
            echo "    sha256: \"${CONTABO_SHA256}\""
            echo "  onprem:"
            echo "    url: \"${base}/${ONPREM_FILE}\""
            echo "    sha256: \"${ONPREM_SHA256}\""
            echo "  oracle:"
            echo "    qcow2_url: \"${base}/${ORACLE_QCOW2_FILE}\""
            echo "    qcow2_sha256: \"${ORACLE_QCOW2_SHA256}\""
            echo "    archive_url: \"${base}/${ORACLE_ARCHIVE_OBJECT}\""
            echo "    archive_sha256: \"${ORACLE_ARCHIVE_SHA256}\""
            echo "    accounts:"
          } > tofu/shared/inventory/talos-images.yaml

          # Per-account block. Sorted by profile for stable diffs.
          # nullglob makes the unmatched glob expand to nothing; without
          # it `ls /tmp/oci-artifacts/*.json` would receive the literal
          # `*.json` and list PWD instead, so a previous bug let the
          # repo's own json files leak in. Use a safe glob expansion
          # directly into the array — no `ls` involved.
          shopt -s nullglob
          artifacts=(/tmp/oci-artifacts/*.json)
          shopt -u nullglob
          IFS=$'\n' artifacts=($(printf '%s\n' "${artifacts[@]}" | sort))
          if (( ${#artifacts[@]} == 0 )); then
            echo "      {}" >> tofu/shared/inventory/talos-images.yaml
          else
            for f in "${artifacts[@]}"; do
              profile=$(jq -r '.profile' "$f")
              ocid=$(jq    -r '.ocid'    "$f")
              region=$(jq  -r '.region'  "$f")
              namespace=$(jq -r '.namespace' "$f")
              bucket=$(jq  -r '.bucket'  "$f")
              object=$(jq  -r '.object'  "$f")
              {
                echo "      ${profile}:"
                echo "        ocid: \"${ocid}\""
                echo "        region: \"${region}\""
                echo "        namespace: \"${namespace}\""
                echo "        bucket: \"${bucket}\""
                echo "        object: \"${object}\""
              } >> tofu/shared/inventory/talos-images.yaml
            done
          fi

          echo "::group::rendered inventory"
          cat tofu/shared/inventory/talos-images.yaml
          echo "::endgroup::"

      # Open a PR rather than push directly: image bumps trigger VPS
      # reinstalls when applied, so a human review beat is required.
      - name: Open / update PR
        uses: peter-evans/create-pull-request@v8
        with:
          branch: bot/talos-images-bump
          base: main
          title: "talos-images: refresh"
          commit-message: |
            talos-images: refresh from regenerate-talos-images workflow
          body: |
            Auto-generated by `regenerate-talos-images`. Verify the
            extensions / kernel args in `tofu/shared/schematics/cluster.yaml`
            still match what we want, then merge. Merging triggers the
            normal `tofu-apply` chain, which will swap each cloud's VPS
            image to the new variant on the next reinstall window.

            OCI image OCIDs are pre-imported per account; the
            node-oracle module reads them from inventory at plan time.
          delete-branch: true
