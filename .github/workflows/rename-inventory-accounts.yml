# One-shot: rename account directories under production/inventory/.
#
# Takes a JSON mapping of { "<provider>/<old_acct>": "<provider>/<new_acct>" }
# and moves every object from the old prefix to the new one, deleting
# the old. Pair with rename-inventory-keys to rewrite node_keys inside
# the files.
#
# Run this FIRST, then rename-inventory-keys. tofu then picks up the
# new account directory + new node keys on the next apply (paired with
# moved{} blocks for state remapping).
#
# The JSON input is read via env var, never interpolated into run:
# blocks — no injection risk from the workflow_dispatch input.
name: rename-inventory-accounts
on:
  workflow_dispatch:
    inputs:
      mapping_json:
        description: 'JSON: {"<provider>/<old>":"<provider>/<new>", ...}'
        required: true
        type: string

permissions:
  contents: read

jobs:
  rename:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID:        ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:    ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ACCOUNT_ID:            ${{ secrets.R2_ACCOUNT_ID }}
      R2_ENDPOINT:              https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      MAPPING_JSON:             ${{ inputs.mapping_json }}
    steps:
      - uses: actions/checkout@v5
      - name: Move account directories in R2
        run: scripts/rename-inventory-accounts.sh
