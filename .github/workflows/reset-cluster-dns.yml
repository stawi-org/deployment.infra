# One-shot recovery: delete every DNS record on the cluster's Cloudflare
# zones whose name starts with "cp", "cp-", or equals "prod". Use when
# layer 01's prior cp_dns module left records in Cloudflare that are no
# longer in any tofu state — next tofu-apply will 400 with "identical
# record already exists" on CreateRecord.
#
# After this workflow runs:
#   1. The affected records are gone from Cloudflare.
#   2. The next tofu-apply's layer 03 cluster_dns module creates fresh
#      records under its own management.
#
# Idempotent: a re-run after successful cleanup deletes nothing.
#
# No untrusted input reaches run: blocks — no injection risk.
name: reset-cluster-dns
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  prune:
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - name: Delete orphaned cluster DNS records
        run: scripts/reset-cluster-dns.sh
