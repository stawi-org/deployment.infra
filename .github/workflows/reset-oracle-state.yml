# One-shot recovery: drop stale oci_instance_ocid entries from every
# production/inventory/oracle/*/state.yaml in R2. Use when a previous
# tofu-apply destroyed an OCI instance but failed before the state-
# writer could update state.yaml, leaving the imports.tf block pointing
# at a deleted OCID. Next tofu-apply then fails plan with:
#   Cannot import non-existent remote object
# After this workflow runs the import block sees an empty for_each,
# plan succeeds, tofu creates a fresh instance, state-writer repopulates
# the OCID on apply success.
#
# No inputs — nothing user-controlled reaches run: blocks, no injection risk.
name: reset-oracle-state
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  prune:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID:        ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:    ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ACCOUNT_ID:            ${{ secrets.R2_ACCOUNT_ID }}
      R2_ENDPOINT:              https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
    steps:
      - uses: actions/checkout@v5

      - name: Install deps
        run: python3 -m pip install --user PyYAML >/dev/null

      - name: Prune OCIDs
        run: scripts/prune-stale-oci-instance-ocids.sh
