# Pushes the canonical Omni cluster template to the running Omni
# server. The template is the source of truth for cluster identity,
# k8s + Talos versions, and machine-class selectors. `omnictl cluster
# template sync` is idempotent — running on every change to the file
# produces zero-noop applies when the template is already in sync.
#
# Triggers:
#   - push to main touching tofu/shared/clusters/** (or this workflow)
#   - manual workflow_dispatch
#
# Auth: same OMNI_SERVICE_ACCOUNT_KEY used by regenerate-talos-images.
#
# Security: this workflow does NOT consume untrusted GitHub-event
# inputs (no PR titles, issue bodies, or commit messages). The only
# user-supplied input is the `dry_run` workflow_dispatch boolean,
# routed through env: into a workflow expression — no shell expansion.
name: sync-cluster-template
on:
  push:
    branches: [main]
    paths:
      - tofu/shared/clusters/**
      - .github/workflows/sync-cluster-template.yml
      # cover .yaml.tmpl too — already matched by the ** glob, listed
      # explicitly here as a reader signal that templates flow
      # through the same sync.
  workflow_dispatch:
    inputs:
      dry_run:
        description: Validate + diff only; do not apply
        type: boolean
        default: false

permissions:
  contents: read

# Two concurrent template syncs would race on the cluster spec.
# Cancel any in-flight run so the latest template wins.
concurrency:
  group: sync-cluster-template
  cancel-in-progress: true

env:
  OMNI_VERSION: v1.7.1 # Pinned to match the omnictl used in regenerate-talos-images.

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      # cpd.<zone> is gray-cloud direct (no CF in front). cp.<zone>
      # is orange-cloud — CF's free plan downgrades HTTP/2 to HTTP/1.1
      # at the origin which breaks omnictl's native gRPC client. The
      # cert is a CF Origin Cert (not publicly trusted), so omnictl
      # invocations all pass `--insecure-skip-tls-verify`. Auth still
      # comes from OMNI_SERVICE_ACCOUNT_KEY.
      OMNI_ENDPOINT: https://cpd.stawi.org
      OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}
      DRY_RUN: ${{ inputs.dry_run }}
    steps:
      - uses: actions/checkout@v5

      - name: Install omnictl
        run: |
          set -euo pipefail
          curl -fsSL -o /usr/local/bin/omnictl.real \
            "https://github.com/siderolabs/omni/releases/download/${OMNI_VERSION}/omnictl-linux-amd64"
          chmod +x /usr/local/bin/omnictl.real
          # Wrapper that always passes --insecure-skip-tls-verify.
          # cpd.<zone> serves a CF Origin Cert that's only trusted by
          # CF's edge — clients (including omnictl) reject it by
          # default. Auth is still enforced via
          # OMNI_SERVICE_ACCOUNT_KEY.
          cat > /usr/local/bin/omnictl <<'WRAP'
          #!/bin/bash
          exec /usr/local/bin/omnictl.real --insecure-skip-tls-verify "$@"
          WRAP
          chmod +x /usr/local/bin/omnictl
          omnictl --version

      # Smoke-test the service account key. Any failure here means
      # OMNI_SERVICE_ACCOUNT_KEY is wrong / expired (operator must
      # rotate via Omni dashboard).
      - name: Verify omnictl auth
        run: omnictl get user --output json | head -20

      # Apply MachineClass resources first. Cluster templates can
      # only carry Cluster / ControlPlane / Workers / ConfigPatch
      # kinds — top-level resources like MachineClass go through
      # `omnictl apply`. Doing this BEFORE the template sync
      # guarantees the cluster's machine-set references resolve.
      - name: Apply machine classes
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          omnictl apply -f tofu/shared/clusters/machine-classes.yaml

      # Render + apply the EtcdBackupS3Configs resource. Same global-
      # resource pattern as MachineClass: it's not a Cluster template
      # field, so it's applied separately via `omnictl apply`. Skipped
      # silently when OMNI_ETCD_BACKUP_S3_ACCESS_KEY_ID isn't set (e.g.
      # on a fork without the secret) so dry-runs and forks don't try
      # to authenticate against a real OCI bucket.
      #
      # The access-key-id + secret reach this step via env (no
      # untrusted GitHub event payload involved). envsubst inlines
      # them into the rendered YAML, which is piped straight into
      # `omnictl apply -f -` — the rendered file never lands on the
      # runner's filesystem, so the secret doesn't appear in any
      # post-step artefact.
      - name: Apply EtcdBackupS3Configs
        if: env.DRY_RUN != 'true' && env.OMNI_ETCD_BACKUP_S3_ACCESS_KEY_ID != ''
        env:
          OMNI_ETCD_BACKUP_S3_BUCKET: ${{ vars.OMNI_ETCD_BACKUP_S3_BUCKET }}
          OMNI_ETCD_BACKUP_S3_REGION: ${{ vars.OMNI_ETCD_BACKUP_S3_REGION }}
          OMNI_ETCD_BACKUP_S3_ENDPOINT: ${{ vars.OMNI_ETCD_BACKUP_S3_ENDPOINT }}
          OMNI_ETCD_BACKUP_S3_ACCESS_KEY_ID: ${{ secrets.OMNI_ETCD_BACKUP_S3_ACCESS_KEY_ID }}
          OMNI_ETCD_BACKUP_S3_SECRET_ACCESS_KEY: ${{ secrets.OMNI_ETCD_BACKUP_S3_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          envsubst < tofu/shared/clusters/etcd-backup-s3-configs.yaml.tmpl \
            | omnictl apply -f -

      # Validate before sync — catches schema typos that would
      # otherwise fail mid-apply with partial state changes.
      - name: Validate template
        run: |
          set -euo pipefail
          omnictl cluster template validate \
            -f tofu/shared/clusters/main.yaml

      # Show the diff before applying. Useful in CI logs even on
      # auto-apply runs — gives operators a quick "what changed" view.
      - name: Diff template
        run: |
          set -euo pipefail
          omnictl cluster template diff \
            -f tofu/shared/clusters/main.yaml || true

      - name: Sync template
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          omnictl cluster template sync \
            -f tofu/shared/clusters/main.yaml \
            --verbose

      # Surface the cluster's reconciliation status so the action
      # log shows whether the cluster has converged. Non-fatal —
      # sync is the source-of-truth, status is observability. The
      # `cluster template status` subcommand watches indefinitely for
      # the cluster to reach Ready; with 0 machines registered that
      # never happens, so cap the watch at a single status snapshot.
      - name: Cluster status
        if: env.DRY_RUN != 'true'
        continue-on-error: true
        run: |
          set +e
          echo "::group::cluster status (one-shot, 30s cap)"
          timeout 30 omnictl cluster template status \
            -f tofu/shared/clusters/main.yaml
          echo "::endgroup::"
          echo "::group::machine inventory (cluster=stawi)"
          omnictl get machinestatus -l "omni.sidero.dev/cluster=stawi" -o table
          echo "::endgroup::"
