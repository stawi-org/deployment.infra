# Pushes the canonical Omni cluster template to the running Omni
# server. The template is the source of truth for cluster identity,
# k8s + Talos versions, and machine-class selectors. `omnictl cluster
# template sync` is idempotent — running on every change to the file
# produces zero-noop applies when the template is already in sync.
#
# Triggers:
#   - push to main touching tofu/shared/clusters/** (or this workflow)
#   - manual workflow_dispatch
#
# Auth: same OMNI_SERVICE_ACCOUNT_KEY used by regenerate-talos-images.
#
# Security: this workflow does NOT consume untrusted GitHub-event
# inputs (no PR titles, issue bodies, or commit messages). The only
# user-supplied input is the `dry_run` workflow_dispatch boolean,
# routed through env: into a workflow expression — no shell expansion.
name: sync-cluster-template
on:
  push:
    branches: [main]
    paths:
      - tofu/shared/clusters/**
      - .github/workflows/sync-cluster-template.yml
      # cover .yaml.tmpl too — already matched by the ** glob, listed
      # explicitly here as a reader signal that templates flow
      # through the same sync.
  workflow_dispatch:
    inputs:
      dry_run:
        description: Validate + diff only; do not apply
        type: boolean
        default: false
  # Re-render the cluster template whenever tofu-apply completes —
  # that's the moment R2 inventory's provider_data.status flips to
  # "running" for newly provisioned nodes. MachineSet sizes are
  # rendered from that field, so each apply should pull a fresh
  # render. The job-level `if:` further filters this to main-branch
  # tofu-apply runs that actually succeeded.
  workflow_run:
    workflows: [tofu-apply]
    types: [completed]

permissions:
  contents: read

# Two concurrent template syncs would race on the cluster spec.
# Cancel any in-flight run so the latest template wins.
concurrency:
  group: sync-cluster-template
  cancel-in-progress: true

env:
  OMNI_VERSION: v1.7.1 # Pinned to match the omnictl used in regenerate-talos-images.

jobs:
  sync:
    runs-on: ubuntu-latest
    # When dispatched via workflow_run, only react to main-branch
    # tofu-apply runs that actually succeeded — otherwise a failed
    # tofu-apply (or a PR-stage one) would still re-sync. Push and
    # workflow_dispatch firings always run.
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    env:
      # cpd.<zone> is gray-cloud direct (no CF in front). cp.<zone>
      # is orange-cloud — CF's free plan downgrades HTTP/2 to HTTP/1.1
      # at the origin which breaks omnictl's native gRPC client. The
      # cert is a CF Origin Cert (not publicly trusted), so omnictl
      # invocations all pass `--insecure-skip-tls-verify`. Auth still
      # comes from OMNI_SERVICE_ACCOUNT_KEY.
      OMNI_ENDPOINT: https://cp.stawi.org
      OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}
      DRY_RUN: ${{ inputs.dry_run }}
    steps:
      - uses: actions/checkout@v5

      - name: Install omnictl
        run: |
          set -euo pipefail
          curl -fsSL -o /usr/local/bin/omnictl.real \
            "https://github.com/siderolabs/omni/releases/download/${OMNI_VERSION}/omnictl-linux-amd64"
          chmod +x /usr/local/bin/omnictl.real
          # Wrapper that always passes --insecure-skip-tls-verify.
          # cpd.<zone> serves a CF Origin Cert that's only trusted by
          # CF's edge — clients (including omnictl) reject it by
          # default. Auth is still enforced via
          # OMNI_SERVICE_ACCOUNT_KEY.
          cat > /usr/local/bin/omnictl <<'WRAP'
          #!/bin/bash
          exec /usr/local/bin/omnictl.real --insecure-skip-tls-verify "$@"
          WRAP
          chmod +x /usr/local/bin/omnictl
          omnictl --version

      # Smoke-test the service account key. Any failure here means
      # OMNI_SERVICE_ACCOUNT_KEY is wrong / expired (operator must
      # rotate via Omni dashboard).
      - name: Verify omnictl auth
        run: omnictl get user --output json | head -20

      # Apply MachineClass resources first. Cluster templates can
      # only carry Cluster / ControlPlane / Workers / ConfigPatch
      # kinds — top-level resources like MachineClass go through
      # `omnictl apply`. Doing this BEFORE the template sync
      # guarantees the cluster's machine-set references resolve.
      - name: Apply machine classes
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          omnictl apply -f tofu/shared/clusters/machine-classes.yaml

      # Sweep stale, disconnected machines that have been disconnected
      # for >5 min AND aren't bound to any cluster. Stuck Machine
      # resources block fresh registrations of the same physical node
      # (Talos re-registers with same UUID; Omni keeps the stale
      # entry as `disconnected` instead of refreshing). Delete them
      # so the next Talos boot creates a clean registration.
      - name: Sweep stale disconnected unbound machines
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          # omnictl emits NDJSON (one object per line); slurp into an
          # array, then filter. Match anything disconnected AND not
          # cluster-bound — broad enough to catch all stuck stale
          # entries regardless of label-format quirks.
          stale=$(omnictl get machinestatus -o json 2>/dev/null \
            | jq -rs '.[] | select(
                (.spec.connected == false)
                and ((.spec.cluster // "") == "")
              ) | .metadata.id' \
            || true)
          if [[ -z "$stale" ]]; then
            echo "::notice::No stale disconnected unbound machines."
            exit 0
          fi
          echo "::notice::Stale unbound machines to delete:"
          for id in $stale; do echo "  $id"; done
          for id in $stale; do
            echo "::notice::deleting stale machine $id"
            omnictl delete machine "$id" || echo "::warning::failed to delete $id (may already be gone)"
          done

      # Bootstrap-bind unbound machines by reading the R2 inventory.
      #
      # Why this exists: when a machine first registers via SideroLink,
      # layer-03's `sync-machine-labels.sh` reconciler hasn't run yet
      # (it runs on tofu-apply). Without a role label the machine
      # doesn't match any MachineClass selector, doesn't bind to the
      # cluster, doesn't get config — and never reports its hostname
      # to Omni so the reconciler couldn't match it anyway. Circular.
      #
      # Strategy: read the per-account inventory files at
      #   s3://cluster-tofu-state/production/<provider>/<account>/nodes.yaml
      # which are written by every prior tofu-apply. Each entry has
      # both the operator-declared `role` AND the observed
      # `provider_data.{ipv4, ipv6, contabo_instance_id}`. We build
      # a (hostname-or-ipv4) → role map, then look up each unbound
      # machine's MachineStatus.spec.network.{hostname,addresses} in
      # the map and apply the right label.
      #
      # If a machine can't be resolved (fresh registration whose
      # IPv4 isn't yet observed in inventory, or a name we don't
      # know), fall back to role=worker — safer default than
      # mis-labelling as controlplane and conflicting with the real
      # CP. The layer-03 reconciler will correct the label on the
      # next tofu-apply once the machine has phoned home.
      - name: Bootstrap-bind unbound machines by inventory
        if: env.DRY_RUN != 'true'
        env:
          AWS_ACCESS_KEY_ID:        ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:    ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
          R2_ACCOUNT_ID:            ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          trap 'rm -rf "$tmp"' EXIT

          # Pull every nodes.yaml under production/<provider>/<account>/.
          # Cheaper than listing — we know the path shape from
          # tofu/modules/node-state/main.tf.
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws s3 sync \
            --endpoint-url "$R2_ENDPOINT" \
            --region us-east-1 \
            --exclude "*" \
            --include "*/nodes.yaml" \
            --no-progress \
            "s3://cluster-tofu-state/production/" "$tmp/inventory/" >/dev/null

          # Build a unified map {ipv4|hostname → {name, role}}.
          # `hostname` matches OCI's auto-set hostname (Talos's OCI
          # platform driver); `ipv4` matches Contabo's, since Talos's
          # Contabo bare-metal config doesn't get a friendly hostname
          # until our HostnameConfig patch lands.
          map_file="$tmp/lookup.json"
          : > "$map_file.work"
          while IFS= read -r f; do
            yq -o=json . "$f" \
              | jq -r '
                  .nodes // {} | to_entries[] |
                  . as $entry |
                  ($entry.value.provider_data.ipv4 // "") as $ipv4 |
                  ($entry.value.provider_data.hostname // $entry.key) as $host |
                  {
                    name: $entry.key,
                    role: ($entry.value.role // "worker"),
                    ipv4: $ipv4,
                    host: $host
                  }
                ' \
              >> "$map_file.work"
          done < <(find "$tmp/inventory" -name nodes.yaml)
          # Squash to a JSON array.
          jq -s '.' "$map_file.work" > "$map_file"
          echo "::notice::built inventory lookup with $(jq 'length' "$map_file") node(s)"

          # Fetch unbound machinestatuses.
          all=$(omnictl get machinestatus -o json 2>/dev/null \
            | jq -cs '[ .[] | select(.spec.cluster == "" or .spec.cluster == null) ]' \
            || echo '[]')
          count=$(jq -r 'length' <<<"$all")
          if [[ "$count" -eq 0 ]]; then
            echo "::notice::No unbound machines — nothing to bootstrap-bind."
            exit 0
          fi
          echo "::notice::Found $count unbound machine(s):"
          jq -r '.[] | "  id=\(.metadata.id) host=\(.spec.network.hostname // "?") addrs=\(.spec.network.addresses // [] | join(","))"' <<<"$all"

          apply_label() {
            local id="$1" role="$2" reason="$3"
            cat > "$tmp/${id}.yaml" <<MANIFEST
          metadata:
            namespace: default
            type: MachineLabels.omni.sidero.dev
            id: ${id}
            labels:
              node.antinvestor.io/role: ${role}
          spec: {}
          MANIFEST
            echo "::notice::labelling machine ${id} as role=${role} (${reason})"
            omnictl apply -f "$tmp/${id}.yaml"
          }

          # For each unbound machine, look up its hostname / any of
          # its CIDR-stripped addresses in the inventory map. If
          # found, apply role from inventory; otherwise default
          # to role=worker (safe — never mis-labels as cp).
          #
          # JQ-trap note: do NOT use `[.ipv4] | inside($alist)`. JQ's
          # `inside` reduces to `$alist | contains([.ipv4])`, and
          # `contains` for string array elements uses substring-
          # contains semantics — so an empty `.ipv4` matches every
          # machine ([""] is "contained" in any non-empty string).
          # The earlier inventory entries that happened to lack
          # `provider_data.ipv4` (Contabo nodes.yaml just-uploaded
          # without provider_data; OCI account inventories never
          # populated by node-state) silently captured every
          # machine's match. Fix: explicit non-empty check + index.
          #
          # JQ-trap #2: inside `($alist | index(.ipv4))`, the `.` in
          # the index argument refers to the *current input of the
          # pipe* — i.e. `$alist`, not the parent select() context.
          # That makes `.ipv4` resolve as `$alist.ipv4` and errors
          # with "Cannot index array with string ipv4". Bind the
          # entry's ipv4 into a let-variable before piping so the
          # value survives the pipe boundary.
          while IFS= read -r m; do
            mid=$(jq -r '.metadata.id' <<<"$m")
            mhost=$(jq -r '.spec.network.hostname // ""' <<<"$m")
            maddrs=$(jq -r '.spec.network.addresses // [] | map(split("/")[0]) | join(" ")' <<<"$m")

            role=$(jq -r --arg h "$mhost" --arg addrs "$maddrs" '
              ($addrs | split(" ")) as $alist |
              [.[] | select(
                (.host != "" and .host == $h)
                or (.ipv4 != "" and (.ipv4 as $i | $alist | index($i)))
              )] | (.[0].role // "")
            ' "$map_file")
            inv_name=$(jq -r --arg h "$mhost" --arg addrs "$maddrs" '
              ($addrs | split(" ")) as $alist |
              [.[] | select(
                (.host != "" and .host == $h)
                or (.ipv4 != "" and (.ipv4 as $i | $alist | index($i)))
              )] | (.[0].name // "")
            ' "$map_file")

            if [[ -n "$role" ]]; then
              apply_label "$mid" "$role" "matched inventory: ${inv_name}"
            else
              apply_label "$mid" "worker" "no inventory match (host=${mhost:-?} addrs=${maddrs:-?}) — defaulting to worker"
            fi
          done < <(jq -c '.[]' <<<"$all")

      # Render + apply the EtcdBackupS3Configs resource. Global Omni
      # resource (same kind as MachineClass) — not a Cluster template
      # field, so it goes through `omnictl apply` separately.
      #
      # Credentials come from the 02-oci-storage tfstate's
      # `omni_backup_writer_credentials` output (single Customer
      # Secret Key on the existing operator user, tofu-managed in
      # tofu/layers/02-oci-storage/oci-operator-csk.tf). Reading the
      # tfstate JSON directly (rather than `tofu output -json`)
      # avoids needing a tofu init in this workflow — we only need
      # five string fields and the state file is plain JSON.
      #
      # Skip conditions:
      #   - DRY_RUN=true: validate-only run.
      #   - tfstate missing: 02-oci-storage hasn't applied
      #     yet (fresh repo / forks / pre-bootstrap). Apply that
      #     layer first, then re-trigger this workflow.
      #   - omni_backup_writer_credentials output missing: the
      #     IAM resources aren't in tfstate yet (older state from
      #     before this PR landed). Same fix — apply 02-oci-
      #     storage to populate.
      #
      # Rendered YAML never touches disk: envsubst pipes straight
      # into `omnictl apply -f -`, so the access-key-id / secret
      # don't appear in any post-step artefact.
      - name: Apply EtcdBackupS3Configs
        if: env.DRY_RUN != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          STATE_KEY="production/02-oci-storage.tfstate"
          if ! aws s3api head-object \
              --bucket cluster-tofu-state \
              --key "$STATE_KEY" \
              --endpoint-url "$ENDPOINT" \
              --region us-east-1 >/dev/null 2>&1; then
            echo "::notice::02-oci-storage tfstate not found at s3://cluster-tofu-state/$STATE_KEY — skipping EtcdBackupS3Configs apply (apply 02-oci-storage first)."
            exit 0
          fi
          state=$(mktemp)
          rendered=$(mktemp -p "${RUNNER_TEMP:-/tmp}" etcd-backup-XXXXXX.yaml)
          trap 'rm -f "$state" "$rendered"' EXIT
          aws s3 cp "s3://cluster-tofu-state/$STATE_KEY" "$state" \
            --endpoint-url "$ENDPOINT" \
            --region us-east-1 >/dev/null
          # Output absent / null (e.g. var.account_key was a non-bwire
          # cell when this state was last applied) → skip.
          if [[ "$(jq -r '.outputs.omni_backup_writer_credentials.value // "null"' "$state")" == "null" ]]; then
            echo "::notice::omni_backup_writer_credentials output missing from oci-storage tfstate — re-run 02-oci-storage apply to populate, then re-trigger this workflow."
            exit 0
          fi
          export OMNI_ETCD_BACKUP_S3_BUCKET=$(jq -r '.outputs.omni_backup_writer_credentials.value.bucket' "$state")
          export OMNI_ETCD_BACKUP_S3_REGION=$(jq -r '.outputs.omni_backup_writer_credentials.value.region' "$state")
          export OMNI_ETCD_BACKUP_S3_ENDPOINT=$(jq -r '.outputs.omni_backup_writer_credentials.value.endpoint' "$state")
          export OMNI_ETCD_BACKUP_S3_ACCESS_KEY_ID=$(jq -r '.outputs.omni_backup_writer_credentials.value.access_key_id' "$state")
          export OMNI_ETCD_BACKUP_S3_SECRET_ACCESS_KEY=$(jq -r '.outputs.omni_backup_writer_credentials.value.secret_access_key' "$state")
          # `omnictl apply -f -` (stdin) is rejected by v1.7.x with
          # "failed to discover yaml files from '-': stat -: no such
          # file or directory" — the CLI walks the path argument as
          # a filesystem entry, no special-case for stdin. Render to
          # the tempfile created above (cleaned up via the trap so
          # the access-key-id never reaches the workspace, where
          # actions/upload-artifact could pick it up).
          envsubst < tofu/shared/clusters/etcd-backup-s3-configs.yaml.tmpl > "$rendered"
          omnictl apply -f "$rendered"

      # Render ControlPlane / Workers `size:` from R2 inventory so
      # MachineSet sizes track the provisioned-and-running node count
      # without an operator template bump. Counts only nodes whose
      # provider_data.status is "running" — declared-but-not-yet-
      # provisioned entries (e.g. an OCI cell stuck in
      # Out-of-Capacity, or onprem placeholders) are excluded so the
      # MachineSet never sits ScalingUp waiting for a VM that doesn't
      # exist. The placeholder integers in main.yaml stay as
      # validation-only stand-ins; this step overwrites them on every
      # run. Downstream Validate/Diff/Sync steps use the rendered
      # tempfile, not the on-disk template.
      - name: Render machine-set sizes from inventory
        env:
          AWS_ACCESS_KEY_ID:        ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:    ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
          R2_ACCOUNT_ID:            ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          inv="${RUNNER_TEMP}/inventory-render"
          aws s3 sync \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --region us-east-1 \
            --exclude "*" \
            --include "*/nodes.yaml" \
            --no-progress \
            "s3://cluster-tofu-state/production/inventory/" "$inv/" >/dev/null

          # Count nodes per role where provider_data.status == "running".
          # yq+jq pipeline: emit JSON of .nodes, filter by role + status,
          # take the length. Empty file / missing .nodes → 0.
          count_role () {
            local role="$1" total=0 n
            while IFS= read -r f; do
              n=$(yq -o=json '.nodes // {}' "$f" \
                | jq --arg role "$role" '
                    [ to_entries[]
                      | select(.value.role == $role
                                and (.value.provider_data.status // "") == "running") ]
                    | length')
              total=$(( total + n ))
            done < <(find "$inv" -name nodes.yaml)
            echo "$total"
          }
          CP_COUNT=$(count_role controlplane)
          WORKER_COUNT=$(count_role worker)

          # Guard against rendering cp=0 — that would orphan every
          # workload and is almost certainly a transient inventory
          # glitch rather than an intended state.
          if (( CP_COUNT < 1 )); then
            echo "::error::Refusing to render with controlplane size=0 — inventory currently shows no role=controlplane node with provider_data.status=running. Aborting sync to avoid orphaning the cluster."
            exit 1
          fi

          rendered="${RUNNER_TEMP}/main.rendered.yaml"
          cp tofu/shared/clusters/main.yaml "$rendered"
          # `select(...)` on a multi-doc stream returns the matching
          # document; assignment then rewrites only that document.
          yq -i "(select(.kind == \"ControlPlane\").machineClass.size) = $CP_COUNT" "$rendered"
          yq -i "(select(.kind == \"Workers\").machineClass.size) = $WORKER_COUNT" "$rendered"

          echo "::notice::rendered sizes — cp=$CP_COUNT workers=$WORKER_COUNT"
          echo "--- diff against on-disk template ---"
          diff -u tofu/shared/clusters/main.yaml "$rendered" || true
          echo "RENDERED_TEMPLATE=$rendered" >> "$GITHUB_ENV"

      # Validate before sync — catches schema typos that would
      # otherwise fail mid-apply with partial state changes.
      - name: Validate template
        run: |
          set -euo pipefail
          omnictl cluster template validate \
            -f "$RENDERED_TEMPLATE"

      # Show the diff before applying. Useful in CI logs even on
      # auto-apply runs — gives operators a quick "what changed" view.
      - name: Diff template
        run: |
          set -euo pipefail
          omnictl cluster template diff \
            -f "$RENDERED_TEMPLATE" || true

      - name: Sync template
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          omnictl cluster template sync \
            -f "$RENDERED_TEMPLATE" \
            --verbose

      # Per-node Talos patches (LinkConfig + HostnameConfig +
      # nodeLabels/Annotations). Re-introduced 2026-05-05 with the
      # IPv6-gateway bug from the 2026-05-04 retirement fixed by
      # construction (gateways read from contabo_instance.ip_config
      # rather than derived from the prefix).
      #
      # Runs AFTER Sync template so the cluster-wide LinkAliasConfig
      # (wan0 alias) is already in Omni state when per-node
      # LinkConfig references wan0.
      #
      # Inputs:
      #   - R2: production/per-node-patches/<talos-version>/<node>.yaml,
      #     written by layer 03's per-node-patches.tf.
      #   - tofu state: layer-03's all_nodes_from_state, surfaced as
      #     a NODES_JSON file with each node's ipv4 (used for the
      #     hostname-then-ipv4 machine-id match).
      #
      # The envelope (ConfigPatches.omni.sidero.dev wrapper with
      # machine-id label) is built at apply time — machine-ids
      # aren't known at tofu plan time.
      - name: Apply per-node patches
        if: env.DRY_RUN != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          OMNI_CLUSTER: stawi
        run: |
          set -euo pipefail
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          STATE_KEY="production/03-talos.tfstate"
          if ! aws s3api head-object \
              --bucket cluster-tofu-state \
              --key "$STATE_KEY" \
              --endpoint-url "$ENDPOINT" \
              --region us-east-1 >/dev/null 2>&1; then
            echo "::notice::03-talos tfstate not found — apply that layer first to populate per-node patches in R2."
            exit 0
          fi
          state=$(mktemp)
          nodes_json=$(mktemp -p "${RUNNER_TEMP:-/tmp}" nodes-XXXXXX.json)
          trap 'rm -f "$state" "$nodes_json"' EXIT
          aws s3 cp "s3://cluster-tofu-state/$STATE_KEY" "$state" \
            --endpoint-url "$ENDPOINT" \
            --region us-east-1 >/dev/null
          # Extract node-name → ipv4 from the layer-03 tfstate's
          # local_sensitive_file.node_labels_json content. That
          # resource carries the per-node envelope used by
          # sync-machine-labels.sh; we only need the ipv4 sub-field.
          jq -r '
            .resources[]
            | select(.type == "local_sensitive_file" and .name == "node_labels_json")
            | .instances[0].attributes.content
          ' "$state" \
          | jq -c 'with_entries(.value |= { ipv4: .ipv4 })' \
          > "$nodes_json"
          if [[ "$(jq -r 'length' "$nodes_json")" -eq 0 ]]; then
            echo "::notice::no nodes in layer-03 state — skipping per-node apply"
            exit 0
          fi
          # Talos version comes from versions.auto.tfvars.json
          # (committed) — same source layer-03 reads.
          TALOS_VERSION=$(jq -r '.talos_version' tofu/shared/versions.auto.tfvars.json)
          R2_PREFIX="production/per-node-patches/${TALOS_VERSION}"
          export NODES_JSON="$nodes_json"
          bash tofu/layers/03-talos/scripts/apply-per-node-patches.sh "$R2_PREFIX"

      # Sweep orphan per-node patches: any stawi-<node>-link patch in
      # Omni state whose <node> isn't in the current tofu node set.
      # Replaces the previous unconditional cleanup of all
      # stawi-*-link patches (from 2026-05-04's retirement) — that
      # cleanup would now nuke what we just applied. The targeted
      # sweep handles node-removal cleanly without breaking the
      # apply-then-sweep ordering.
      - name: Sweep orphan per-node patches
        if: env.DRY_RUN != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          STATE_KEY="production/03-talos.tfstate"
          if ! aws s3api head-object \
              --bucket cluster-tofu-state \
              --key "$STATE_KEY" \
              --endpoint-url "$ENDPOINT" \
              --region us-east-1 >/dev/null 2>&1; then
            echo "::notice::03-talos tfstate missing — skipping orphan sweep"
            exit 0
          fi
          state=$(mktemp)
          trap 'rm -f "$state"' EXIT
          aws s3 cp "s3://cluster-tofu-state/$STATE_KEY" "$state" \
            --endpoint-url "$ENDPOINT" \
            --region us-east-1 >/dev/null
          # Build the set of node names currently in tofu state.
          mapfile -t live_nodes < <(jq -r '
            .resources[]
            | select(.type == "local_sensitive_file" and .name == "node_labels_json")
            | .instances[0].attributes.content
          ' "$state" | jq -r 'keys[]')
          live_set=$(printf '%s\n' "${live_nodes[@]+"${live_nodes[@]}"}" | sort -u)
          # List all stawi-<node>-link patches in Omni and delete
          # those whose <node> isn't in live_set.
          for id in $(omnictl get configpatches -o jsonpath='{.metadata.id}' 2>/dev/null \
                       | tr ' ' '\n' \
                       | grep -E '^stawi-.+-link$' \
                       || true); do
            node="${id#stawi-}"
            node="${node%-link}"
            if ! grep -qx "$node" <<<"$live_set"; then
              echo "::notice::orphan per-node patch detected: $id (node $node not in tofu state)"
              omnictl delete configpatches "$id" || echo "::warning::failed to delete $id"
            fi
          done

      # Block on the cluster reaching Ready so the workflow doesn't
      # report success while the cluster is still half-converged.
      # Polls ClusterStatus every 15s; succeeds the moment all four
      # readiness flags flip true; fails the workflow after the cap
      # so an operator-triggered sync that wedges the cluster turns
      # the GitHub Actions check red instead of green-with-issues.
      #
      # ClusterStatus.spec readiness fields (siderolabs/omni client/
      # pkg/omni/resources/omni/cluster_status.go):
      #   .ready                       — top-level convergence.
      #   .kubernetesapiready          — kube-apiserver reachable
      #                                  via the cluster LB.
      #   .controlplaneready           — every CP MachineSetMember
      #                                  shows Ready.
      #   .machines.{healthy,total}    — Omni's per-machine health
      #                                  rollup; healthy=total = all
      #                                  Talos services Running OK +
      #                                  K8s NodeReady.
      #
      # 8-min cap: a 5-machine cluster going from RUNNING→Ready
      # after a force-clear takes 4-6 min in steady state (etcd
      # bootstrap + kube-apiserver static pod start + flannel CNI
      # ready + node registration). 8 min absorbs slow Contabo VPS
      # boots without burying real failures. Bump if your topology
      # genuinely needs longer.
      - name: Wait for cluster Ready
        if: env.DRY_RUN != 'true'
        timeout-minutes: 9
        run: |
          set -uo pipefail
          deadline=$(( $(date +%s) + 8 * 60 ))
          attempt=0
          while (( $(date +%s) < deadline )); do
            attempt=$((attempt + 1))
            status_yaml=$(omnictl get clusterstatus stawi -o yaml 2>/dev/null || true)
            if [[ -z "$status_yaml" ]]; then
              echo "[$(date +%T)] attempt $attempt: ClusterStatus not yet present, retrying"
              sleep 15
              continue
            fi
            ready=$(echo "$status_yaml" | yq -r '.spec.ready // false')
            api=$(echo "$status_yaml" | yq -r '.spec.kubernetesapiready // false')
            cp=$(echo "$status_yaml" | yq -r '.spec.controlplaneready // false')
            healthy=$(echo "$status_yaml" | yq -r '.spec.machines.healthy // 0')
            total=$(echo "$status_yaml" | yq -r '.spec.machines.total // 0')
            echo "[$(date +%T)] attempt $attempt: ready=$ready apiready=$api cpready=$cp healthy=$healthy/$total"
            if [[ "$ready" == "true" && "$api" == "true" && "$cp" == "true" \
                && -n "$healthy" && -n "$total" && "$healthy" == "$total" \
                && "$total" != "0" ]]; then
              echo "::notice::Cluster Ready ($healthy/$total machines healthy)"
              exit 0
            fi
            sleep 15
          done
          echo "::error::Cluster did not reach Ready within 8 minutes."
          echo "Last ClusterStatus snapshot:"
          echo "$status_yaml" | head -40
          exit 1
      # Surface the cluster's reconciliation status so the action
      # log shows whether the cluster has converged. Non-fatal —
      # sync is the source-of-truth, status is observability. The
      # `cluster template status` subcommand watches indefinitely for
      # the cluster to reach Ready; with 0 machines registered that
      # never happens, so cap the watch at a single status snapshot.
      - name: Cluster status
        if: env.DRY_RUN != 'true'
        continue-on-error: true
        run: |
          set +e
          echo "::group::cluster status (one-shot, 30s cap)"
          timeout 30 omnictl cluster template status \
            -f tofu/shared/clusters/main.yaml
          echo "::endgroup::"
          echo "::group::machine inventory (cluster=stawi)"
          omnictl get machinestatus -l "omni.sidero.dev/cluster=stawi" -o table
          echo "::endgroup::"
          echo "::group::ALL machinestatus (no filter, full YAML)"
          omnictl get machinestatus -o yaml || true
          echo "::endgroup::"
          echo "::group::ALL machine resources (no filter, full YAML)"
          omnictl get machine -o yaml || true
          echo "::endgroup::"
          echo "::group::Talos clusters"
          omnictl get clusters -o yaml || true
          echo "::endgroup::"
          # ClusterMachineConfigStatuses carries per-machine config-apply
          # errors (the "Config Apply Failed" detail in `cluster
          # template status` is summarized FROM this resource). When
          # a node rejects an Omni-pushed config, this is the only
          # place the actual error string surfaces. Omni's full
          # resource type is ClusterMachineConfigStatuses.omni.sidero.dev
          # (siderolabs/omni client/pkg/omni/resources/omni/
          # cluster_machine_config_status.go).
          echo "::group::ClusterMachineConfigStatuses (per-machine config apply errors)"
          omnictl get clustermachineconfigstatuses -o yaml || true
          echo "::endgroup::"
          # ClusterMachineConfigPatches: the merged effective patch
          # set Omni computed for each machine (from cluster-template
          # patches + per-machine ConfigPatches.target_label_selectors).
          # Useful to confirm our stawi-<node>-link patches are
          # actually flowing into the per-machine merged config.
          echo "::group::ClusterMachineConfigPatches"
          omnictl get clustermachineconfigpatches -o yaml || true
          echo "::endgroup::"
          # LoadBalancerStatus: ControlPlaneStatus depends on this.
          # When `cluster template status` shows "Load Balancer Not
          # Ready", the actual probe error / target state lives here.
          echo "::group::LoadBalancerStatus"
          omnictl get loadbalancerstatus -o yaml 2>/dev/null \
            || omnictl get loadbalancerstatuses -o yaml 2>/dev/null \
            || echo "(neither loadbalancerstatus nor loadbalancerstatuses registered — check ControlPlaneStatus)"
          echo "::endgroup::"
          # ControlPlaneStatus: aggregates LB + per-CP-machine
          # readiness; surfaces the precise component(s) holding
          # `cluster template status` Not Ready.
          echo "::group::ControlPlaneStatus"
          omnictl get controlplanestatus -o yaml 2>/dev/null || true
          echo "::endgroup::"
          # Kubernetes Node states from inside the cluster — workers
          # being Ready while CP shows Not Ready in Omni view points
          # at K8s-Node-level health (CNI / kubelet) rather than
          # apiserver reachability. Pull a kubeconfig via omnictl and
          # snapshot kubectl get nodes -o wide.
          echo "::group::kubectl get nodes (via omnictl-issued kubeconfig)"
          KUBECONFIG_TMP=$(mktemp)
          if omnictl --cluster stawi cluster kubeconfig --force \
              > "$KUBECONFIG_TMP" 2>/dev/null; then
            curl -fsSL -o /usr/local/bin/kubectl \
              "https://dl.k8s.io/release/v1.35.2/bin/linux/amd64/kubectl"
            chmod +x /usr/local/bin/kubectl
            kubectl --kubeconfig "$KUBECONFIG_TMP" --insecure-skip-tls-verify \
              get nodes -o wide || true
            kubectl --kubeconfig "$KUBECONFIG_TMP" --insecure-skip-tls-verify \
              get nodes -o jsonpath='{range .items[*]}{.metadata.name}{":\n"}{range .status.conditions[*]}  {.type}={.status} {.reason}{": "}{.message}{"\n"}{end}{"\n"}{end}' \
              || true
          else
            echo "(failed to fetch kubeconfig via omnictl)"
          fi
          rm -f "$KUBECONFIG_TMP"
          echo "::endgroup::"
          # ConfigPatches: current state, includes our per-node
          # stawi-<node>-link patches plus cluster-template patches.
          # Useful to spot-check binding via target_label_selectors.
          echo "::group::ConfigPatches"
          omnictl get configpatches -o yaml || true
          echo "::endgroup::"
