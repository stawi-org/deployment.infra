# Syncs Omni-aware Talos images to R2 + every oracle tenancy's compute
# image catalog + every GCP project's custom image catalog. Output
# (production/inventory/talos-images.yaml in R2) is consumed by the
# node-* tofu modules via the layer pre-plan `aws s3 sync` step that
# materialises the inventory dir locally.
#
# "Sync" not "regenerate": the build step is a no-op when the schematic
# hasn't changed (the same .oci / GCP image bytes stay cached in R2).
# The per-account work is what fires on a new oracle/GCP account —
# each OCI tenancy gets its own custom-image OCID (tenancy-scoped; no
# cross-tenancy sharing) and each GCP project gets its own GCE custom
# image self_link (project-scoped).
#
# Why this exists: tofu used to drive image generation by computing a
# Talos Image Factory schematic at plan time and registering it with the
# contabo/oci providers. With Omni in front of cluster lifecycle, images
# need to be Omni-signed (so machines auto-register via SideroLink), so
# `omnictl download` is the build step now. Doing it from CI keeps tofu
# out of the image-build path entirely.
#
# Job topology:
#   build              — omnictl download (ISO, oracle arm64, gcp amd64)
#                        to R2 plus .oci archive to R2, computes
#                        schematic_id and SHAs. No-op when the cached
#                        object already matches.
#   discover-oracle    — enumerates oracle accounts in R2 inventory and
#                        emits a matrix of {profile, region, tenancy,
#                        compartment_ocid}.
#   oci-import         — matrix per oracle account: WIF auth, download
#                        .oci from R2, upload to per-account
#                        talos-images-<account> bucket, oci compute
#                        image import, capture OCID, emit JSON artifact.
#                        Reuses the existing image if its display_name
#                        (schematic + archive sha) already exists — only
#                        new tenancies or new bytes do real work.
#   discover-gcp       — enumerates gcp: accounts from accounts.yaml +
#                        repo SOPS auth (stage-gcp-auth-from-repo) and
#                        emits a matrix of {account, project_id, region,
#                        workload_identity_provider, service_account_email}.
#   gcp-import         — matrix per GCP account: GitHub-OIDC → GCP WIF,
#                        download GCP image from R2, stage to
#                        stawi-talos-images-<account> GCS bucket,
#                        gcloud compute images create (family stawi-talos),
#                        emit JSON artifact with self_link. Reuses the
#                        image when name (schematic + sha) already exists.
#   assemble-and-upload — collects per-account artifacts, renders the
#                        final talos-images.yaml, uploads it to R2 at
#                        production/inventory/talos-images.yaml. No PR.
#
# Auth: needs OMNI_SERVICE_ACCOUNT_KEY (operator creates a service
# account in the Omni dashboard once: Service Accounts → Create →
# role ADMIN → copy key once → store as repo secret). The Operator
# role is NOT enough — `omnictl download` calls into Omni's
# CreateSchematic / SideroLink-params path which requires Admin
# (run #25154959742 surfaced "insufficient role: Operator"). OCI
# imports reuse the existing GitHub-OIDC-to-OCI WIF flow already used
# by tofu-layer.yml. GCP imports use google-github-actions/auth@v2
# against per-account workload_identity_provider + service_account_email
# from SOPS-encrypted tofu/shared/accounts/gcp/<acct>/auth.yaml.
name: sync-talos-images
on:
  workflow_dispatch:
    inputs:
      talos_version:
        description: Talos version to bake into the image (default v1.13.0)
        type: string
        default: v1.13.0
      force:
        description: Force rebuild even if the schematic is unchanged
        type: boolean
        default: false
  # Called by cluster-provision (mode=full|images).
  workflow_call:
    inputs:
      talos_version:
        type: string
        required: false
        default: ""
      force:
        type: boolean
        required: false
        default: false
  # Weekly catch-up — Mondays 06:00 UTC. Talos and Omni both publish
  # patch releases at unpredictable cadence; weekly is enough to avoid
  # falling far behind without bumping VPS reinstalls every push.
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  id-token: write # GitHub-OIDC → OCI workload-identity exchange.

# A second concurrent run would race on the inventory file. Cancel any
# in-flight regen so the latest one wins.
concurrency:
  group: sync-talos-images
  cancel-in-progress: true

env:
  # cluster-tofu-state holds tofu state + the R2 inventory tree
  # (oracle/<account>/auth.yaml etc). It stays private — readers
  # use SigV4 with the R2 access keys.
  R2_BUCKET: cluster-tofu-state
  # Public-read bucket for Talos image bytes, operator-bound to a
  # public custom domain (default pkgs.stawi.org). Path-style
  # `<account>.r2.cloudflarestorage.com` URLs require SigV4 auth
  # (Contabo / OCI image-import / on-prem cloud-init can't fetch
  # those); the custom domain serves the bucket anonymously.
  #
  # Both values are sourced from GitHub Actions repo Variables so
  # the operator can rebind to a different bucket / hostname
  # without code changes. Defaults match the operator's current
  # binding (cluster-image-registry → pkgs.stawi.org).
  R2_IMAGE_BUCKET: ${{ vars.R2_IMAGE_BUCKET || 'cluster-image-registry' }}
  IMAGES_PUBLIC_HOST: ${{ vars.IMAGES_PUBLIC_HOST || 'pkgs.stawi.org' }}
  OMNI_VERSION: v1.9.3 # Pinned to match the running Omni server.
  # AWS CLI 2.23+ added mandatory CRC checksums on multipart uploads,
  # which Cloudflare R2 (and OCI Object Storage's S3-compat) reject
  # with `MissingContentLength`. Run #25249802815 surfaced this
  # 2026-05-02. Setting both vars to `when_required` keeps the SDK
  # in the pre-2.23 behavior — checksums only when the bucket
  # explicitly opts in, no chunked-transfer-encoding for uploads.
  # Inherits into every job's env automatically.
  AWS_REQUEST_CHECKSUM_CALCULATION: when_required
  AWS_RESPONSE_CHECKSUM_VALIDATION: when_required

jobs:
  build:
    runs-on: ubuntu-latest
    # NOTE: we intentionally do NOT emit *_url outputs. Anything
    # interpolating ${R2_ACCOUNT_ID} (a registered secret) gets
    # `##[warning]Skip output ... since it may contain secret.` and
    # arrives at downstream jobs as the empty string. We pass the
    # basenames + schematic_id and let assemble-and-upload stitch the
    # URLs from the R2_ACCOUNT_ID secret it loads from `secrets`.
    outputs:
      skipped: ${{ steps.build.outputs.skipped }}
      schematic_id: ${{ steps.build.outputs.schematic_id }}
      talos_version: ${{ steps.build.outputs.talos_version }}
      generated_at: ${{ steps.build.outputs.generated_at }}
      contabo_file: ${{ steps.build.outputs.contabo_file }}
      contabo_sha256: ${{ steps.build.outputs.contabo_sha256 }}
      onprem_file: ${{ steps.build.outputs.onprem_file }}
      onprem_sha256: ${{ steps.build.outputs.onprem_sha256 }}
      oracle_qcow2_file: ${{ steps.build.outputs.oracle_qcow2_file }}
      oracle_qcow2_sha256: ${{ steps.build.outputs.oracle_qcow2_sha256 }}
      oracle_archive_object: ${{ steps.build.outputs.oracle_archive_object }}
      oracle_archive_sha256: ${{ steps.build.outputs.oracle_archive_sha256 }}
      gcp_file: ${{ steps.build.outputs.gcp_file }}
      gcp_sha256: ${{ steps.build.outputs.gcp_sha256 }}
    env:
      # cpd.<zone> is gray-cloud direct (no CF in front). cp.<zone>
      # is orange-cloud — CF's free plan downgrades HTTP/2 to HTTP/1.1
      # at the origin which breaks omnictl's native gRPC client. The
      # cert is a CF Origin Cert (not publicly trusted), so the
      # omnictl wrapper installed below always passes
      # `--insecure-skip-tls-verify`. Auth still comes from
      # OMNI_SERVICE_ACCOUNT_KEY.
      OMNI_ENDPOINT: https://cp.stawi.org
      OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}
      # workflow_call may pass empty talos_version → fall back to pin.
      TALOS_VERSION: ${{ inputs.talos_version != '' && inputs.talos_version || 'v1.13.0' }}
      FORCE: ${{ inputs.force }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5

      # omnictl version pinned to match the running Omni server. The
      # download URL pattern follows sidero-labs/omni release artifacts.
      - name: Install omnictl
        run: |
          set -euo pipefail
          curl -fsSL -o /usr/local/bin/omnictl.real \
            "https://github.com/siderolabs/omni/releases/download/${OMNI_VERSION}/omnictl-linux-amd64"
          chmod +x /usr/local/bin/omnictl.real
          # Wrapper that always passes --insecure-skip-tls-verify
          # (cpd.<zone>'s cert is a CF Origin Cert — not publicly
          # trusted; auth still enforced via OMNI_SERVICE_ACCOUNT_KEY).
          cat > /usr/local/bin/omnictl <<'WRAP'
          #!/bin/bash
          exec /usr/local/bin/omnictl.real --insecure-skip-tls-verify "$@"
          WRAP
          chmod +x /usr/local/bin/omnictl
          omnictl --version

      # Smoke-test the service account credentials before we try
      # anything destructive. Failure here means OMNI_SERVICE_ACCOUNT_KEY
      # is wrong / expired.
      - name: Verify omnictl auth
        run: omnictl get user --output json | head -20

      # Guard against the "regen-images runs before omni-host has new
      # token" race. Omni rotates the SideroLink join token when it
      # starts up; images carry the token baked in at download time.
      # If this workflow fires before the new omni-host instance is
      # fully up, `omnictl download` embeds a stale token and nodes
      # won't auto-register. Wait up to 5 min for the api_endpoint to
      # match the expected cpd.stawi.org address before building.
      - name: Wait for omnictl connection-params resource
        # Confirms that omnictl can reach Omni AND the
        # ConnectionParamsController has reconciled (phase=running),
        # which means the SideroLink join token is published. The
        # specific field name for the API URL inside spec varies
        # across Omni versions; keying off metadata.phase=running is
        # version-stable. The omnictl call is wrapped in `|| true`
        # so a transient failure under `set -euo pipefail` doesn't
        # kill the loop in 20s — empty output naturally re-loops.
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 300 ))
          attempt=0
          while :; do
            attempt=$((attempt + 1))
            raw=$( { omnictl get connectionparams -o json 2>&1 || true; } )
            phase=$(printf '%s' "$raw" | jq -r '.metadata.phase // empty' 2>/dev/null || true)
            echo "::notice::attempt=$attempt phase='$phase' raw_head='$(printf '%s' "$raw" | head -c 300 | tr '\n' ' ')'"
            if [[ "$phase" == "running" ]]; then
              echo "::notice::ConnectionParams reconciled (phase=running) on attempt $attempt"
              break
            fi
            if [[ $(date +%s) -ge $deadline ]]; then
              echo "::error::Timed out after $attempt attempts. Last phase='$phase'. Last omnictl output: $raw"
              exit 1
            fi
            sleep 10
          done
        env:
          OMNI_ENDPOINT: https://cp.stawi.org
          OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}

      # Whole pipeline runs in a single bash step so we can use
      # arrays (safe quoting of customization values) without
      # round-tripping through GITHUB_OUTPUT.
      - name: Build / upload images and .oci archive
        id: build
        run: |
          set -euo pipefail
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          # ----- Hash the schematic source (file + version) -----
          src_hash=$(sha256sum tofu/shared/schematics/cluster.yaml | cut -d' ' -f1)
          schematic_id="${src_hash}-${TALOS_VERSION}"
          echo "::notice::schematic source hash = ${schematic_id}"

          # ----- Skip if unchanged and not forced -----
          # Reads the schematic_id from the R2-hosted inventory copy
          # (post-M2: talos-images.yaml lives in R2, not the repo).
          # First-time bootstraps (no prior object) treat stored as
          # empty and proceed with the full sync.
          : "${R2_ACCOUNT_ID:?required for R2 endpoint URL}"
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          if aws s3 cp \
              s3://cluster-tofu-state/production/inventory/talos-images.yaml \
              /tmp/stored-talos-images.yaml \
              --endpoint-url "$R2_ENDPOINT" --region us-east-1 2>/dev/null; then
            stored=$(yq -r '.schematic_id // ""' /tmp/stored-talos-images.yaml)
          else
            stored=""
          fi
          # NOTE: we no longer short-circuit the whole workflow when the
          # schematic is unchanged. New oracle accounts still need a
          # per-tenancy custom-image import even if the .oci bytes are
          # already cached in R2. Only the omnictl download / rebuild
          # steps below become no-ops when FORCE is false and bytes
          # already exist under the schematic key (handled by aws s3
          # upload skips further down). Always set skipped=false so
          # discover-oracle + oci-import always run.
          if [[ "${stored}" == "${schematic_id}" && "${FORCE}" != "true" ]]; then
            echo "::notice::schematic unchanged (${stored}); will reuse R2-cached archive for per-account import"
          fi
          echo "skipped=false" >> "$GITHUB_OUTPUT"

          # ----- Parse customization into bash arrays (safe quoting) -----
          mapfile -t extensions < <(yq -r '.customization.systemExtensions.officialExtensions // [] | .[]' \
            tofu/shared/schematics/cluster.yaml)
          mapfile -t kargs < <(yq -r '.customization.extraKernelArgs // [] | .[]' \
            tofu/shared/schematics/cluster.yaml)
          ext_args=()
          for e in "${extensions[@]}"; do ext_args+=("--extensions" "$e"); done
          karg_args=()
          for k in "${kargs[@]}"; do karg_args+=("--extra-kernel-args" "$k"); done
          echo "::notice::extensions=[${extensions[*]:-}] kargs=[${kargs[*]:-}]"

          # ----- Download images per cloud profile -----
          # Oracle is arm64 because every OCI shape we run today is
          # A1.Flex (Ampere). The shape-compat declaration in the .oci
          # archive metadata also pins A1.Flex. Adding x86 OCI nodes
          # would mean a second oracle download here AND a metadata
          # update — flag now so we don't silently break it.
          #
          # `omnictl download <name>` matches by spec.Name, spec.Profile,
          # or spec.Overlay (omnictl/download.go findImage). Profile
          # `metal` is ambiguous (ISO + raw share it), so for the raw
          # variant we hand the unique spec.Name "Generic image (amd64)"
          # — the registered names live in
          # internal/backend/runtime/omni/controllers/omni/installation_media.go.
          # ISO has the substring-match special case so plain `iso` +
          # arch filter is unique. Oracle profile is unique.
          mkdir -p /tmp/images
          download_image() {
            local image_name=$1 arch=$2
            echo "::group::download ${image_name} (${arch})"
            omnictl download "${image_name}" \
              --arch "${arch}" \
              --talos-version "${TALOS_VERSION}" \
              "${ext_args[@]}" \
              "${karg_args[@]}" \
              --output /tmp/images/
            echo "::endgroup::"
          }
          # Contabo and on-prem both use the ISO. Contabo's image
          # API rejects raw.xz with HTTP 415 even with a proper file
          # extension and Content-Type — the pre-Omni setup also
          # used ISO for Contabo (factory.talos.dev/.../metal-amd64
          # .iso). ISO boots Contabo's installer and runs Talos's
          # own installer on first boot; same end state as raw.
          download_image iso    amd64   # contabo + on-prem (shared)
          download_image oracle arm64   # oci (A1.Flex)
          # GCP GCE workers are e2-medium (x86_64). Omni InstallationMedia
          # profile is expected to be `gcp` (platform name, same class as
          # `oracle` / `aws` / `vmware` per `omnictl download --help`).
          # Full display name is often "Google Cloud"; if CI later fails
          # with "no matching image", try `gce` or `"Google Cloud"` and
          # confirm with `omnictl get installationmedia -o yaml`.
          # Typical on-disk name: gcp-amd64-*.raw.tar.gz (GCE import
          # accepts .raw.tar.gz via --source-uri).
          download_image gcp    amd64   # gce (e2 Spot workers)
          ls -la /tmp/images/

          # ----- Resolve filenames produced by omnictl -----
          # Omni names files
          # `<profile>-<arch>-omni-<account>-<version>-<short_id>.<ext>`,
          # so the exact name varies per Omni install. Glob by
          # profile-arch prefix + extension and require exactly one
          # match per slot. Oracle ships qcow2-inside-xz (per
          # InstallationMedia ContentType="application/x-xz"), so we
          # decompress for the .oci archive build below. GCP ships a
          # raw disk tarball suitable for `gcloud compute images create
          # --source-uri`.
          metal_iso_file=$(cd /tmp/images && ls metal-amd64-*.iso  2>/dev/null | head -1 || true)
          oracle_xz=$(cd      /tmp/images && ls oracle-arm64-*.xz  2>/dev/null | head -1 || true)
          gcp_file=$(cd        /tmp/images && ls gcp-amd64-*       2>/dev/null | head -1 || true)
          if [[ -z "${gcp_file}" ]]; then
            # Broader fallback if Omni renames the profile prefix.
            gcp_file=$(cd /tmp/images && ls *gcp*amd64* 2>/dev/null | head -1 || true)
          fi
          for v in "$metal_iso_file" "$oracle_xz" "$gcp_file"; do
            if [[ -z "$v" ]]; then
              echo "::error::expected image file missing — omnictl output naming may have changed"
              echo "::error::expected metal-amd64-*.iso, oracle-arm64-*.xz, gcp-amd64-* (Omni profile 'gcp')"
              ls -la /tmp/images/
              exit 1
            fi
          done
          # Both contabo and onprem point at the same ISO bytes.
          contabo_file="${metal_iso_file}"
          onprem_file="${metal_iso_file}"

          # Decompress oracle xz → qcow2 for the .oci archive build.
          # The .xz wrapper is Omni's transport format; OCI image
          # import wants a raw qcow2 inside the archive.
          oracle_qcow2_file="${oracle_xz%.xz}.qcow2"
          xz -dc "/tmp/images/${oracle_xz}" > "/tmp/images/${oracle_qcow2_file}"
          oracle_file="${oracle_qcow2_file}"

          # ----- Build .oci archive (qcow2 + image_metadata.json) -----
          # OCI's CreateImage / UpdateImage APIs do NOT expose
          # launchOptions in any SDK or CLI surface — the only way to
          # pin them is via image_metadata.json embedded in a `.oci`
          # archive (qcow2 + JSON, plain tar). OCI auto-detects the
          # archive on import and reads externalLaunchOptions as the
          # image's defaults — exactly what Talos arm64 needs (UEFI_64
          # + fully-paravirtualized virtio so /dev/sda is visible).
          #
          # Schema follows Talos's published template verbatim. Three
          # fields are non-obvious but load-bearing:
          #   * version: 2 (number, NOT "1.0" string) — OCI's parser
          #     rejects unknown schema versions silently and falls back
          #     to no-metadata defaults (ISCSI bootVolumeType — Talos
          #     can't find /dev/sda).
          #   * externalLaunchOptions.launchOptionsSource — without
          #     this, OCI doesn't apply the launchOptions overrides.
          #   * additionalMetadata.shapeCompatibilities — declares
          #     which shapes the metadata is valid for. Lives under
          #     additionalMetadata, not at the top level.
          oracle_archive_object="talos-${TALOS_VERSION}-${schematic_id}-oracle-arm64.oci"
          oracle_archive_path="/tmp/images/${oracle_archive_object}"
          staging=$(mktemp -d)
          cp "/tmp/images/${oracle_file}" "${staging}/image.qcow2"
          os_version="${TALOS_VERSION#v}"
          cat > "${staging}/image_metadata.json" <<META
          {
            "version": 2,
            "externalLaunchOptions": {
              "firmware": "UEFI_64",
              "networkType": "PARAVIRTUALIZED",
              "bootVolumeType": "PARAVIRTUALIZED",
              "remoteDataVolumeType": "PARAVIRTUALIZED",
              "localDataVolumeType": "PARAVIRTUALIZED",
              "launchOptionsSource": "PARAVIRTUALIZED",
              "pvAttachmentVersion": 2,
              "pvEncryptionInTransitEnabled": true,
              "consistentVolumeNamingEnabled": true
            },
            "imageCapabilityData": null,
            "imageCapsFormatVersion": null,
            "operatingSystem": "Talos",
            "operatingSystemVersion": "${os_version}",
            "additionalMetadata": {
              "shapeCompatibilities": [
                {
                  "internalShapeName": "VM.Standard.A1.Flex",
                  "ocpuConstraints": null,
                  "memoryConstraints": null
                }
              ]
            }
          }
          META
          tar -cf "${oracle_archive_path}" -C "${staging}" image.qcow2 image_metadata.json
          rm -rf "${staging}"
          echo "::notice::built $(stat -c%s "${oracle_archive_path}") byte .oci archive"

          # ----- Upload everything to R2 -----
          # Explicit content-type per file. R2 doesn't infer one from
          # the extension, so without --content-type the served object
          # has no Content-Type header and Contabo's image API rejects
          # the registration with HTTP 415 Unsupported Media Type.
          # `application/octet-stream` is the standard fallback for
          # opaque binary blobs and is what Contabo's pre-Omni
          # factory.talos.dev URLs returned.
          dest_prefix="s3://${R2_IMAGE_BUCKET}/${schematic_id}"
          content_type_for() {
            case "$1" in
              *.iso)   echo "application/x-iso-stream" ;;
              *)       echo "application/octet-stream" ;;
            esac
          }
          # contabo + onprem share the ISO, so dedupe the upload list.
          declare -A seen_files=()
          upload_files=()
          for f in "/tmp/images/${contabo_file}" "/tmp/images/${onprem_file}" "/tmp/images/${oracle_file}" "${oracle_archive_path}" "/tmp/images/${gcp_file}"; do
            if [[ -z "${seen_files[$f]:-}" ]]; then
              seen_files[$f]=1
              upload_files+=("$f")
            fi
          done
          for f in "${upload_files[@]}"; do
            name=$(basename "$f")
            aws s3 cp "$f" "${dest_prefix}/${name}" \
              --content-type "$(content_type_for "$name")" \
              --endpoint-url "${R2_ENDPOINT}"
          done
          echo "::notice::uploaded to ${dest_prefix}/"

          # ----- Mirror to OCI cluster-image-registry (dual-write to bwire) -----
          # Source of truth for cross-tenancy image consumers (the
          # CF Worker for pkgs.stawi.org, future cross-account image-
          # import paths). Reads CSK from 02-oci-storage
          # tfstate output `omni_backup_writer_credentials` (a single
          # CSK on the existing bwire operator user; see
          # tofu/layers/02-oci-storage/oci-operator-csk.tf).
          #
          # Skip conditions:
          #   - bwire tfstate missing (fresh repo / pre-bootstrap)
          #   - omni_backup_writer_credentials output missing (older
          #     state from before the IAM collapse landed)
          state=$(mktemp)
          trap 'rm -f "$state"' EXIT
          state_key="production/02-oci-storage.tfstate"
          if ! aws s3api head-object --bucket "${R2_BUCKET}" \
              --key "$state_key" \
              --endpoint-url "${R2_ENDPOINT}" --region us-east-1 >/dev/null 2>&1; then
            echo "::notice::02-oci-storage tfstate not found — skipping OCI mirror (apply that layer first)."
          else
            aws s3 cp "s3://${R2_BUCKET}/${state_key}" "$state" \
              --endpoint-url "${R2_ENDPOINT}" --region us-east-1 >/dev/null
            if [[ "$(jq -r '.outputs.omni_backup_writer_credentials.value // "null"' "$state")" == "null" ]]; then
              echo "::notice::omni_backup_writer_credentials output missing — re-run 02-oci-storage apply to populate."
            else
              # NOTE: omni_backup_writer_credentials.bucket points at
              # omni-backup-storage. We override it here with the
              # cluster-image-registry bucket name, since the same
              # CSK has access to both.
              oci_access_key_id=$(jq -r '.outputs.omni_backup_writer_credentials.value.access_key_id' "$state")
              oci_secret_access_key=$(jq -r '.outputs.omni_backup_writer_credentials.value.secret_access_key' "$state")
              oci_region=$(jq -r '.outputs.omni_backup_writer_credentials.value.region' "$state")
              oci_endpoint=$(jq -r '.outputs.omni_backup_writer_credentials.value.endpoint' "$state")
              oci_dest_prefix="s3://cluster-image-registry/${schematic_id}"
              for f in "${upload_files[@]}"; do
                name=$(basename "$f")
                AWS_ACCESS_KEY_ID="$oci_access_key_id" \
                AWS_SECRET_ACCESS_KEY="$oci_secret_access_key" \
                AWS_EC2_METADATA_DISABLED=true \
                  aws s3 cp "$f" "${oci_dest_prefix}/${name}" \
                    --content-type "$(content_type_for "$name")" \
                    --endpoint-url "$oci_endpoint" \
                    --region "$oci_region"
              done
              echo "::notice::Mirrored to s3://cluster-image-registry/${schematic_id}/ in bwire tenancy"
            fi
          fi

          # ----- Prune older schematic_id prefixes (keep current + 1) -----
          # Each rebuild writes images under a fresh schematic_id top-
          # level prefix. Without pruning, every regen leaves the old
          # qcow2 + .oci archive sitting in R2 forever (each set is
          # ~500MB-1GB across formats). Keep the current schematic_id
          # and the SINGLE most-recently-modified prior — enough to
          # roll back if a new image breaks boot, without unbounded
          # accumulation. Per-account OCI talos-images-<account>
          # buckets are pruned in the oci-import job where they're
          # written.
          prune_image_bucket() {
            local bucket="$1"
            local endpoint="$2"
            local region="${3:-us-east-1}"
            local current="${4:-$schematic_id}"

            # CommonPrefixes with delimiter=/ enumerates the top-level
            # schematic_id "directories" without paginating their
            # contents.
            local prefixes
            mapfile -t prefixes < <(
              aws s3api list-objects-v2 \
                --bucket "$bucket" --delimiter / \
                --endpoint-url "$endpoint" --region "$region" \
                --query 'CommonPrefixes[].Prefix' --output text 2>/dev/null \
                | tr '\t' '\n' | sed 's:/$::' | grep -v '^$' | sort -u
            )
            [[ ${#prefixes[@]} -eq 0 ]] && return 0

            # Annotate each prefix with the LastModified of its newest
            # object so we prune the OLDEST prior, not arbitrary.
            local annotated=()
            for p in "${prefixes[@]}"; do
              local lm
              lm=$(aws s3api list-objects-v2 \
                --bucket "$bucket" --prefix "${p}/" \
                --endpoint-url "$endpoint" --region "$region" \
                --query 'sort_by(Contents,&LastModified)[-1].LastModified' \
                --output text 2>/dev/null)
              [[ -z "$lm" || "$lm" == "None" ]] && continue
              annotated+=("${lm}|${p}")
            done

            # Sort newest-first; keep the current schematic_id always
            # plus the single newest prior. Delete everything else.
            local kept=("$current")
            local sorted
            sorted=$(printf '%s\n' "${annotated[@]}" | sort -r)
            while IFS= read -r line; do
              [[ -z "$line" ]] && continue
              local prefix="${line#*|}"
              [[ "$prefix" == "$current" ]] && continue
              if [[ ${#kept[@]} -lt 2 ]]; then
                kept+=("$prefix")
                continue
              fi
              echo "::notice::pruning s3://${bucket}/${prefix}/"
              aws s3 rm "s3://${bucket}/${prefix}/" \
                --recursive \
                --endpoint-url "$endpoint" --region "$region" >/dev/null 2>&1 || \
                echo "::warning::prune failed for ${prefix}"
            done <<<"$sorted"
            echo "::notice::${bucket}: kept schematic_ids ${kept[*]}"
          }

          prune_image_bucket "${R2_IMAGE_BUCKET}" "${R2_ENDPOINT}"
          if [[ -n "${oci_endpoint:-}" ]]; then
            AWS_ACCESS_KEY_ID="$oci_access_key_id" \
            AWS_SECRET_ACCESS_KEY="$oci_secret_access_key" \
            AWS_EC2_METADATA_DISABLED=true \
              prune_image_bucket "cluster-image-registry" "$oci_endpoint" "$oci_region"
          fi

          # ----- Compute SHA-256s and emit job outputs -----
          # Pass basenames + sha256s only — assemble-and-upload stitches
          # the URLs from R2_ACCOUNT_ID. GitHub filters any output
          # value that contains a registered secret, so emitting the
          # full URL here would arrive empty downstream.
          contabo_sha=$(sha256sum "/tmp/images/${contabo_file}" | cut -d' ' -f1)
          onprem_sha=$(sha256sum  "/tmp/images/${onprem_file}"  | cut -d' ' -f1)
          oracle_sha=$(sha256sum  "/tmp/images/${oracle_file}"  | cut -d' ' -f1)
          archive_sha=$(sha256sum "${oracle_archive_path}"      | cut -d' ' -f1)
          gcp_sha=$(sha256sum     "/tmp/images/${gcp_file}"     | cut -d' ' -f1)
          generated_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          {
            echo "schematic_id=${schematic_id}"
            echo "talos_version=${TALOS_VERSION}"
            echo "generated_at=${generated_at}"
            echo "contabo_file=${contabo_file}"
            echo "contabo_sha256=${contabo_sha}"
            echo "onprem_file=${onprem_file}"
            echo "onprem_sha256=${onprem_sha}"
            echo "oracle_qcow2_file=${oracle_file}"
            echo "oracle_qcow2_sha256=${oracle_sha}"
            echo "oracle_archive_object=${oracle_archive_object}"
            echo "oracle_archive_sha256=${archive_sha}"
            echo "gcp_file=${gcp_file}"
            echo "gcp_sha256=${gcp_sha}"
          } >> "$GITHUB_OUTPUT"

  # Enumerates oracle accounts in R2 inventory and emits a matrix that
  # the oci-import job consumes. Skipped if `build` skipped.
  discover-oracle:
    needs: build
    if: needs.build.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    outputs:
      accounts: ${{ steps.list.outputs.accounts }}
      count: ${{ steps.list.outputs.count }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5

      - name: Enumerate oracle accounts
        id: list
        run: |
          set -euo pipefail
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          mkdir -p /tmp/oracle-inv
          aws s3 sync "s3://${R2_BUCKET}/production/inventory/oracle/" /tmp/oracle-inv/ \
            --endpoint-url "$R2_ENDPOINT" --region us-east-1 \
            --exclude "*" --include "*/auth.yaml" || true
          pip install --quiet pyyaml
          python3 - <<'PY' > /tmp/accounts.json
          import json, os
          import sys, yaml
          base = "/tmp/oracle-inv"
          out = []
          skipped = []
          if os.path.isdir(base):
              for entry in sorted(os.listdir(base)):
                  auth_p = os.path.join(base, entry, "auth.yaml")
                  if not os.path.exists(auth_p):
                      skipped.append(f"{entry}: auth.yaml missing")
                      continue
                  data = yaml.safe_load(open(auth_p)) or {}
                  # auth.yaml shape (per layer 02-oracle-infra/main.tf):
                  #   { auth: { oidc_client_identifier, domain_base_url,
                  #             tenancy_ocid, region, ... },
                  #     compartment_ocid: "...",
                  #     region: "...",  (sometimes top-level too)
                  #     ... }
                  # auth credentials live under .auth (or top-level on
                  # legacy layouts); compartment_ocid lives at the
                  # top-level (NOT under .auth, NOT in nodes.yaml).
                  auth = data.get("auth", data)
                  required = ("oidc_client_identifier", "domain_base_url", "tenancy_ocid", "region")
                  missing = [k for k in required if not auth.get(k)]
                  if missing:
                      skipped.append(f"{entry}: auth missing {missing}; auth keys = {sorted(auth.keys())}")
                      continue
                  # compartment_ocid lives inside the `auth` block too
                  # (real auth.yaml: {auth: {oidc..., compartment_ocid:
                  # "ocid1..."}}). Fall back to top-level for legacy
                  # layouts.
                  comp = (
                      auth.get("compartment_ocid")
                      or auth.get("compartment_id")
                      or data.get("compartment_ocid")
                      or data.get("compartment_id")
                  )
                  if not comp:
                      skipped.append(f"{entry}: missing compartment_ocid; data keys = {sorted(data.keys())}; auth keys = {sorted(auth.keys())}")
                      continue
                  out.append({
                      "profile": entry,
                      "region": auth["region"],
                      "tenancy_ocid": auth["tenancy_ocid"],
                      "compartment_ocid": comp,
                  })
          for s in skipped:
              print(f"::warning::skipped {s}", file=sys.stderr)
          print(json.dumps(out))
          PY
          accounts=$(cat /tmp/accounts.json)
          count=$(jq 'length' /tmp/accounts.json)
          echo "::notice::oracle accounts (${count}): ${accounts}"
          echo "accounts=${accounts}" >> "$GITHUB_OUTPUT"
          echo "count=${count}" >> "$GITHUB_OUTPUT"

  # Per-oracle-account image staging + import. Matrix fan-out over the
  # accounts emitted by discover-oracle. Each leg uses GitHub-OIDC →
  # OCI workload-identity exchange to authenticate to that account's
  # tenancy, then uploads the .oci archive and registers it as a
  # custom image. The OCID is the only output other layers need.
  oci-import:
    needs: [build, discover-oracle]
    if: needs.discover-oracle.outputs.count != '0'
    runs-on: ubuntu-latest
    # One empty/broken tenancy must not fail the whole workflow —
    # assemble-and-upload publishes whatever OCIDs succeeded, and
    # cluster-provision's infra job must still run.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        account: ${{ fromJson(needs.discover-oracle.outputs.accounts) }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      # configure-oci-wif.sh writes profiles with `auth =
      # security_token` (no `user` OCID). Without this env var, the
      # OCI CLI's config validator rejects the profile with
      # "Key `user` missing". OCI_CLI_AUTH overrides the default
      # api_key auth for every `oci ...` invocation in this job.
      OCI_CLI_AUTH: security_token
    steps:
      - uses: actions/checkout@v5

      - name: Configure OCI WIF for this profile
        run: |
          set -euo pipefail
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          TMPDIR_AUTH=$(mktemp -d)
          aws s3 sync "s3://${R2_BUCKET}/production/inventory/oracle/${{ matrix.account.profile }}/" \
            "${TMPDIR_AUTH}/${{ matrix.account.profile }}/" \
            --endpoint-url "$R2_ENDPOINT" --region us-east-1 \
            --exclude "*" --include "auth.yaml"
          AUTH_JSON=$(python3 scripts/build-oci-auth-json.py "${TMPDIR_AUTH}")
          echo "$AUTH_JSON" > /tmp/oci_auth_accounts.json
          scripts/configure-oci-wif.sh /tmp/oci_auth_accounts.json

      - name: Install OCI CLI
        run: |
          set -euo pipefail
          pip install --quiet oci-cli
          oci --version

      - name: Stage .oci archive in account bucket
        id: stage
        env:
          PROFILE:        ${{ matrix.account.profile }}
          REGION:         ${{ matrix.account.region }}
          COMPARTMENT:    ${{ matrix.account.compartment_ocid }}
          ARCHIVE_OBJECT: ${{ needs.build.outputs.oracle_archive_object }}
          SCHEMATIC_ID:   ${{ needs.build.outputs.schematic_id }}
          TALOS_VERSION:  ${{ needs.build.outputs.talos_version }}
          R2_ACCOUNT_ID:  ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          # Download the .oci archive built by the build job. R2's
          # path-style host requires SigV4 auth even for GETs (curl
          # would 400), so fetch via `aws s3 cp` using the same R2
          # creds we already have for upload.
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          mkdir -p /tmp/oci-stage
          archive_local="/tmp/oci-stage/${ARCHIVE_OBJECT}"
          aws s3 cp \
            "s3://${R2_IMAGE_BUCKET}/${SCHEMATIC_ID}/${ARCHIVE_OBJECT}" \
            "${archive_local}" \
            --endpoint-url "${R2_ENDPOINT}"
          echo "::notice::downloaded $(stat -c%s "${archive_local}") byte archive"

          # Resolve the OCI Object Storage namespace for this tenancy.
          # `os ns get` returns {"data":"namespacestring"}.
          namespace=$(oci --profile "${PROFILE}" os ns get --query 'data' --raw-output)
          bucket="talos-images-${PROFILE}"

          # Idempotent bucket create. ObjectRead access matches the
          # tofu module's prior shape — though import-from-object uses
          # the authenticated session, not anonymous fetch, leaving it
          # public-read is harmless (image bytes aren't sensitive).
          if ! oci --profile "${PROFILE}" os bucket get \
                --namespace-name "${namespace}" \
                --bucket-name "${bucket}" >/dev/null 2>&1; then
            echo "::notice::creating bucket ${bucket}"
            oci --profile "${PROFILE}" os bucket create \
              --compartment-id "${COMPARTMENT}" \
              --namespace-name "${namespace}" \
              --name "${bucket}" \
              --public-access-type ObjectRead >/dev/null
          fi

          # Upload — `os object put --force` overwrites if the object
          # already exists (e.g. a prior partial run). The object name
          # carries the schematic_id so a content change implies a
          # different object.
          oci --profile "${PROFILE}" os object put \
            --namespace-name "${namespace}" \
            --bucket-name "${bucket}" \
            --name "${ARCHIVE_OBJECT}" \
            --file "${archive_local}" \
            --force >/dev/null
          echo "::notice::uploaded ${ARCHIVE_OBJECT} → oci://${namespace}/${bucket}/"

          {
            echo "namespace=${namespace}"
            echo "bucket=${bucket}"
          } >> "$GITHUB_OUTPUT"

      - name: Preflight custom-image-count service limit
        # Some Always Free tenancies ship with custom-image-count=0
        # (hard service limit — not "quota full"). Import cannot succeed
        # until an operator raises the limit in the OCI Console
        # (Governance → Limits → custom-image-count → Request).
        env:
          PROFILE:     ${{ matrix.account.profile }}
          COMPARTMENT: ${{ matrix.account.compartment_ocid }}
        run: |
          set -euo pipefail
          avail=$(oci --profile "${PROFILE}" limits resource-availability get \
            --compartment-id "${COMPARTMENT}" \
            --service-name compute \
            --limit-name custom-image-count \
            --query 'data.available' --raw-output 2>/dev/null || echo "unknown")
          limit=$(oci --profile "${PROFILE}" limits value list \
            --compartment-id "${COMPARTMENT}" \
            --service-name compute \
            --name custom-image-count --all \
            --query 'data[0].value' --raw-output 2>/dev/null || echo "unknown")
          used=$(oci --profile "${PROFILE}" limits resource-availability get \
            --compartment-id "${COMPARTMENT}" \
            --service-name compute \
            --limit-name custom-image-count \
            --query 'data.used' --raw-output 2>/dev/null || echo "unknown")
          echo "::notice::${PROFILE}: custom-image-count limit=${limit} used=${used} available=${avail}"
          if [[ "${limit}" == "0" ]]; then
            echo "::error::${PROFILE}: service limit custom-image-count=0 — cannot import Talos custom images. Raise the limit in OCI Console (home region) to ≥2, then re-run sync-talos-images."
            exit 1
          fi
          if [[ "${avail}" == "0" && "${used}" != "0" ]]; then
            echo "::warning::${PROFILE}: custom-image-count available=0 (used=${used}); prune step will free slots before import"
          fi

      - name: Prune old custom Talos images
        # OCI free tenancies often have a tight custom-image-count quota
        # (QuotaExceeded on create_image when full). Always prune down to
        # KEEP images *before* import so the new image has a free slot.
        # KEEP=1 leaves one prior for short rollback; the new import is
        # the second. Soft-fail on individual delete (image in use by a
        # live instance); next sync retries after the instance moves on.
        env:
          PROFILE:     ${{ matrix.account.profile }}
          COMPARTMENT: ${{ matrix.account.compartment_ocid }}
          KEEP:        "1"
        run: |
          set -euo pipefail
          # List compartment-owned Talos custom images, oldest-first.
          # Delete all but KEEP most-recent (KEEP=0 deletes all).
          oci --profile "${PROFILE}" compute image list \
            --compartment-id "${COMPARTMENT}" \
            --all \
            --output json 2>/dev/null \
            | jq -r --arg comp "${COMPARTMENT}" --argjson keep "${KEEP}" '
                .data
                | map(select(."compartment-id" == $comp
                           and (."display-name" | test("^Talos ";"i"))))
                | sort_by(."time-created")
                | if $keep == 0 then . else .[0:-$keep] end
                | .[]
                | "\(."time-created")\t\(.id)\t\(."display-name")"' \
            > /tmp/prune-candidates || true
          if [[ ! -s /tmp/prune-candidates ]]; then
            echo "::notice::no old talos images to prune (under KEEP=${KEEP})"
          else
            echo "::notice::pruning $(wc -l < /tmp/prune-candidates) old image(s); keeping ${KEEP} most recent"
            while IFS=$'\t' read -r ts ocid name; do
              echo "::notice::deleting ${ts} ${name} (${ocid})"
              oci --profile "${PROFILE}" compute image delete \
                --image-id "${ocid}" --force >/dev/null 2>&1 \
                || echo "::warning::failed to delete ${ocid} (may have a dependent instance)"
            done < /tmp/prune-candidates
          fi
          # Free-tier safety: if still ≥2 Talos images remain (in-use ones
          # blocked delete), force-delete the oldest remaining so import
          # has a slot. Preferable to hard-fail QuotaExceeded.
          # Free-tier quota safety net: custom-image-count includes *all*
          # compartment-owned custom images (not only Talos). Ambetera hit
          # QuotaExceeded with zero Talos images remaining because other
          # custom images filled the quota. Delete oldest compartment-owned
          # custom images until total custom count is ≤ KEEP.
          for _ in $(seq 1 40); do
            mapfile -t leftover < <(oci --profile "${PROFILE}" compute image list \
              --compartment-id "${COMPARTMENT}" --all --output json 2>/dev/null \
              | jq -r --arg comp "${COMPARTMENT}" '
                  .data
                  | map(select(
                      ."compartment-id" == $comp
                      and (."base-image-id" != null or ."create-image-allowed" == true)
                      and (."lifecycle-state" == "AVAILABLE"
                           or ."lifecycle-state" == "IMPORTING"
                           or ."lifecycle-state" == "PROVISIONING"
                           or ."lifecycle-state" == "DISABLED")
                    ))
                  | sort_by(."time-created")
                  | .[] | "\(.id)\t\(."display-name")\t\(."lifecycle-state")"' || true)
            count=${#leftover[@]}
            echo "::notice::compartment custom images remaining: ${count}"
            if (( count <= KEEP )); then
              break
            fi
            IFS=$'\t' read -r victim vname vstate <<<"${leftover[0]}"
            echo "::notice::quota safety: deleting leftover custom image ${vname} state=${vstate} (${victim})"
            oci --profile "${PROFILE}" compute image delete \
              --image-id "${victim}" --force >/dev/null 2>&1 \
              || { echo "::warning::could not delete ${victim}"; break; }
            sleep 2
          done

      - name: Import as custom image
        id: import
        env:
          PROFILE:         ${{ matrix.account.profile }}
          COMPARTMENT:     ${{ matrix.account.compartment_ocid }}
          NAMESPACE:       ${{ steps.stage.outputs.namespace }}
          BUCKET:          ${{ steps.stage.outputs.bucket }}
          ARCHIVE_OBJECT:  ${{ needs.build.outputs.oracle_archive_object }}
          ARCHIVE_SHA256:  ${{ needs.build.outputs.oracle_archive_sha256 }}
          SCHEMATIC_ID:    ${{ needs.build.outputs.schematic_id }}
          TALOS_VERSION:   ${{ needs.build.outputs.talos_version }}
        run: |
          set -euo pipefail

          # display_name MUST include a content fingerprint of the
          # .oci archive bytes — the schematic_id is a cache key for
          # the schematic *config*, not the served image bytes (Omni's
          # image factory injects the SideroLink join token at serve
          # time, so the same schematic_id produces different bytes
          # whenever Omni's shared join token rotates). Without the
          # archive sha here, a regen that picks up a fresh token
          # reuses the prior OCID and tofu's image_change sentinel
          # never fires. Including the first 12 chars of the archive
          # sha ensures OCID changes whenever the served bytes change.
          display_name="Talos ${TALOS_VERSION} arm64 ${SCHEMATIC_ID} ${ARCHIVE_SHA256:0:12}"

          # Re-use a prior import if the same display_name already
          # exists in the compartment. OCI's `image import` is
          # idempotent on bucket/object but creates a NEW image OCID
          # each call — checking first avoids drift across reruns.
          existing=$(oci --profile "${PROFILE}" compute image list \
            --compartment-id "${COMPARTMENT}" \
            --display-name "${display_name}" \
            --lifecycle-state AVAILABLE \
            --query 'data[0].id' --raw-output 2>/dev/null || true)
          if [[ -n "${existing}" && "${existing}" != "null" ]]; then
            echo "::notice::reusing existing image ${existing}"
            ocid="${existing}"
          else
            # `image import from-object` returns immediately with the
            # new image OCID in IMPORTING state — `--wait-for-state`
            # isn't supported on this subcommand (OCI CLI ≥ 3.x).
            # We poll `image get` until AVAILABLE ourselves.
            #
            # --launch-mode is omitted so OCI auto-detects from the
            # archive metadata (CUSTOM with the launchOptions we
            # encoded).
            echo "::notice::importing ${ARCHIVE_OBJECT} as custom image"
            tmp=$(mktemp)
            if ! oci --profile "${PROFILE}" compute image import from-object \
                  --compartment-id "${COMPARTMENT}" \
                  --namespace "${NAMESPACE}" \
                  --bucket-name "${BUCKET}" \
                  --name "${ARCHIVE_OBJECT}" \
                  --display-name "${display_name}" \
                  > "$tmp"; then
              echo "::error::oci compute image import from-object failed"
              echo "::group::oci response"
              cat "$tmp" || true
              echo "::endgroup::"
              exit 1
            fi
            ocid=$(jq -r '.data.id // empty' "$tmp")
            if [[ -z "$ocid" ]]; then
              echo "::error::oci import returned no .data.id"
              cat "$tmp" >&2
              exit 1
            fi
            echo "::notice::queued import as ${ocid}; polling for AVAILABLE"

            # Cap at 30min (60 × 30s = 1800s). Image imports for
            # ~100MB qcow2 archives typically settle in 5-10 min.
            for i in $(seq 1 60); do
              state=$(oci --profile "${PROFILE}" compute image get \
                --image-id "${ocid}" \
                --query 'data."lifecycle-state"' --raw-output 2>/dev/null || true)
              case "${state:-UNKNOWN}" in
                AVAILABLE)
                  echo "::notice::image AVAILABLE after $((i * 30))s"
                  break
                  ;;
                IMPORTING|PROVISIONING)
                  sleep 30
                  ;;
                *)
                  echo "::error::image entered unexpected state ${state} (attempt ${i})"
                  exit 1
                  ;;
              esac
              if [[ $i -eq 60 ]]; then
                echo "::error::image still ${state} after 30min"
                exit 1
              fi
            done
          fi
          echo "ocid=${ocid}" >> "$GITHUB_OUTPUT"

      - name: Emit artifact
        env:
          PROFILE:        ${{ matrix.account.profile }}
          REGION:         ${{ matrix.account.region }}
          NAMESPACE:      ${{ steps.stage.outputs.namespace }}
          BUCKET:         ${{ steps.stage.outputs.bucket }}
          OBJECT:         ${{ needs.build.outputs.oracle_archive_object }}
          OCID:           ${{ steps.import.outputs.ocid }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/out
          jq -n --arg p "$PROFILE" --arg r "$REGION" --arg n "$NAMESPACE" \
                --arg b "$BUCKET" --arg o "$OBJECT" --arg id "$OCID" '
            { profile: $p, region: $r, namespace: $n,
              bucket: $b, object: $o, ocid: $id }
          ' > "/tmp/out/${PROFILE}.json"

      - uses: actions/upload-artifact@v6
        with:
          name: oci-import-${{ matrix.account.profile }}
          path: /tmp/out/${{ matrix.account.profile }}.json
          if-no-files-found: error

  # Enumerates GCP accounts from tofu/shared/accounts.yaml (source of
  # truth for which projects exist) + staged SOPS auth from the repo.
  # Emits a matrix for gcp-import. Empty gcp: [] → count=0 → import
  # matrix skipped cleanly.
  discover-gcp:
    needs: build
    if: needs.build.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    outputs:
      accounts: ${{ steps.list.outputs.accounts }}
      count: ${{ steps.list.outputs.count }}
    env:
      SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
    steps:
      - uses: actions/checkout@v5

      - name: Enumerate GCP accounts
        id: list
        run: |
          set -euo pipefail
          if ! command -v sops >/dev/null 2>&1; then
            sudo curl -fsSL -o /usr/local/bin/sops \
              https://github.com/getsops/sops/releases/download/v3.11.0/sops-v3.11.0.linux.amd64
            sudo chmod +x /usr/local/bin/sops
          fi
          pip install --quiet pyyaml
          # Stage decryptable auth under /tmp/gcp-auth/<account>/auth.yaml.
          # With gcp: [] and no auth files this stages zero entries.
          scripts/stage-gcp-auth-from-repo.sh /tmp/gcp-auth .
          python3 - <<'PY' > /tmp/gcp-accounts.json
          import json, os, sys, yaml

          with open("tofu/shared/accounts.yaml") as f:
              roster = yaml.safe_load(f) or {}
          wanted = list(roster.get("gcp") or [])

          auth_base = "/tmp/gcp-auth"
          out = []
          skipped = []
          required = (
              "project_id",
              "region",
              "workload_identity_provider",
              "service_account_email",
          )
          for entry in wanted:
              auth_p = os.path.join(auth_base, entry, "auth.yaml")
              if not os.path.exists(auth_p):
                  skipped.append(f"{entry}: auth.yaml missing after stage")
                  continue
              data = yaml.safe_load(open(auth_p)) or {}
              auth = data.get("auth", data)
              missing = [k for k in required if not auth.get(k)]
              if missing:
                  skipped.append(
                      f"{entry}: auth missing {missing}; "
                      f"auth keys = {sorted(auth.keys())}"
                  )
                  continue
              out.append({
                  "account": entry,
                  "project_id": auth["project_id"],
                  "region": auth["region"],
                  "workload_identity_provider": auth["workload_identity_provider"],
                  "service_account_email": auth["service_account_email"],
              })
          for s in skipped:
              print(f"::warning::skipped {s}", file=sys.stderr)
          print(json.dumps(out))
          PY
          accounts=$(cat /tmp/gcp-accounts.json)
          count=$(jq 'length' /tmp/gcp-accounts.json)
          echo "::notice::gcp accounts (${count}): ${accounts}"
          echo "accounts=${accounts}" >> "$GITHUB_OUTPUT"
          echo "count=${count}" >> "$GITHUB_OUTPUT"

  # Per-GCP-account image staging + import. Matrix fan-out over the
  # accounts emitted by discover-gcp. Each leg uses GitHub-OIDC → GCP
  # WIF, stages the Omni GCP image into a per-account GCS bucket, and
  # registers a custom GCE image. self_link is the only field
  # gcp-account-infra needs from talos-images.yaml.
  gcp-import:
    needs: [build, discover-gcp]
    if: needs.discover-gcp.outputs.count != '0'
    runs-on: ubuntu-latest
    # One empty/broken project must not fail the whole workflow —
    # assemble-and-upload publishes whatever self_links succeeded.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        account: ${{ fromJson(needs.discover-gcp.outputs.accounts) }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ matrix.account.workload_identity_provider }}
          service_account: ${{ matrix.account.service_account_email }}
          project_id: ${{ matrix.account.project_id }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Stage GCP image in project bucket + create compute image
        id: import
        env:
          ACCOUNT:        ${{ matrix.account.account }}
          PROJECT_ID:     ${{ matrix.account.project_id }}
          REGION:         ${{ matrix.account.region }}
          GCP_FILE:       ${{ needs.build.outputs.gcp_file }}
          GCP_SHA256:     ${{ needs.build.outputs.gcp_sha256 }}
          SCHEMATIC_ID:   ${{ needs.build.outputs.schematic_id }}
          TALOS_VERSION:  ${{ needs.build.outputs.talos_version }}
          R2_ACCOUNT_ID:  ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          mkdir -p /tmp/gcp-stage
          local_image="/tmp/gcp-stage/${GCP_FILE}"
          aws s3 cp \
            "s3://${R2_IMAGE_BUCKET}/${SCHEMATIC_ID}/${GCP_FILE}" \
            "${local_image}" \
            --endpoint-url "${R2_ENDPOINT}"
          echo "::notice::downloaded $(stat -c%s "${local_image}") byte GCP image"

          # Per-account bucket keeps image bytes project-local for
          # gcloud compute images create --source-uri. Name mirrors
          # OCI's talos-images-<account> pattern.
          bucket="stawi-talos-images-${ACCOUNT}"
          # GCS bucket names are global; if the preferred name is taken
          # outside this project, fall back to a project-scoped name.
          if ! gcloud storage buckets describe "gs://${bucket}" --project="${PROJECT_ID}" >/dev/null 2>&1; then
            echo "::notice::creating GCS bucket gs://${bucket} in ${REGION}"
            if ! gcloud storage buckets create "gs://${bucket}" \
                  --project="${PROJECT_ID}" \
                  --location="${REGION}" \
                  --uniform-bucket-level-access 2>/tmp/gcs-create.err; then
              bucket="stawi-talos-images"
              if ! gcloud storage buckets describe "gs://${bucket}" --project="${PROJECT_ID}" >/dev/null 2>&1; then
                echo "::notice::fallback: creating gs://${bucket} in ${REGION}"
                gcloud storage buckets create "gs://${bucket}" \
                  --project="${PROJECT_ID}" \
                  --location="${REGION}" \
                  --uniform-bucket-level-access
              fi
            fi
          fi

          # Object name carries schematic + content fingerprint so a
          # token/schematic change implies a different object (and a
          # different GCE image name below).
          object="${SCHEMATIC_ID}/${GCP_SHA256:0:12}-${GCP_FILE}"
          gcs_uri="gs://${bucket}/${object}"
          if gcloud storage objects describe "${gcs_uri}" --project="${PROJECT_ID}" >/dev/null 2>&1; then
            echo "::notice::reusing existing GCS object ${gcs_uri}"
          else
            echo "::notice::uploading ${GCP_FILE} → ${gcs_uri}"
            gcloud storage cp "${local_image}" "${gcs_uri}" --project="${PROJECT_ID}"
          fi

          # GCE image name rules: lowercase letters, digits, hyphens;
          # must start with a letter; ≤63 chars.
          # Include talos version + schematic + archive sha so a token
          # rotation (same schematic, new bytes) produces a new image
          # and tofu's image_change sentinel fires.
          raw_name="talos-${TALOS_VERSION//./-}-${SCHEMATIC_ID:0:12}-${GCP_SHA256:0:12}"
          image_name=$(printf '%s' "${raw_name}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]/-/g; s/-+/-/g; s/^-//; s/-$//')
          image_name="${image_name:0:63}"
          # Trim trailing hyphen if truncation left one.
          image_name="${image_name%-}"

          family="stawi-talos"
          if gcloud compute images describe "${image_name}" \
                --project="${PROJECT_ID}" >/dev/null 2>&1; then
            echo "::notice::reusing existing GCE image ${image_name}"
          else
            echo "::notice::creating GCE image ${image_name} from ${gcs_uri}"
            # .raw.tar.gz (Omni/Talos GCP media) imports via --source-uri.
            # GVNIC + multi-queue SCSI match Talos GCE recommendations.
            gcloud compute images create "${image_name}" \
              --project="${PROJECT_ID}" \
              --source-uri="${gcs_uri}" \
              --family="${family}" \
              --guest-os-features=GVNIC,VIRTIO_SCSI_MULTIQUEUE \
              --architecture=X86_64
          fi

          self_link=$(gcloud compute images describe "${image_name}" \
            --project="${PROJECT_ID}" \
            --format='value(selfLink)')
          if [[ -z "${self_link}" ]]; then
            echo "::error::empty selfLink for image ${image_name}"
            exit 1
          fi
          echo "::notice::image self_link=${self_link}"

          # Prune old custom images in family stawi-talos: keep the
          # image we just imported/reused + one previous (KEEP=1 other).
          # Stale GCE images bill for storage and clutter the catalog;
          # OCI has an analogous prune before import.
          KEEP_OTHERS=1
          mapfile -t family_images < <(gcloud compute images list \
            --project="${PROJECT_ID}" \
            --filter="family=${family}" \
            --sort-by="~creationTimestamp" \
            --format='value(name)' 2>/dev/null || true)
          if (( ${#family_images[@]} > KEEP_OTHERS + 1 )); then
            # First entry is newest; always keep image_name + KEEP_OTHERS others.
            declare -A keep
            keep["${image_name}"]=1
            kept_others=0
            for n in "${family_images[@]}"; do
              [[ -n "${keep[$n]:-}" ]] && continue
              if (( kept_others < KEEP_OTHERS )); then
                keep["$n"]=1
                kept_others=$((kept_others + 1))
              fi
            done
            for n in "${family_images[@]}"; do
              [[ -n "${keep[$n]:-}" ]] && continue
              echo "::notice::pruning stale GCE image ${n}"
              gcloud compute images delete "${n}" \
                --project="${PROJECT_ID}" --quiet \
                || echo "::warning::failed to delete image ${n}"
            done
          else
            echo "::notice::no GCE image prune needed (count=${#family_images[@]})"
          fi

          {
            echo "self_link=${self_link}"
            echo "image_name=${image_name}"
            echo "family=${family}"
            echo "bucket=${bucket}"
            echo "object=${object}"
          } >> "$GITHUB_OUTPUT"

      - name: Emit artifact
        env:
          ACCOUNT:      ${{ matrix.account.account }}
          SELF_LINK:    ${{ steps.import.outputs.self_link }}
          FAMILY:       ${{ steps.import.outputs.family }}
          SCHEMATIC_ID: ${{ needs.build.outputs.schematic_id }}
          GCP_SHA256:   ${{ needs.build.outputs.gcp_sha256 }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/out
          jq -n \
            --arg a "$ACCOUNT" \
            --arg s "$SELF_LINK" \
            --arg f "$FAMILY" \
            --arg sid "$SCHEMATIC_ID" \
            --arg sha "$GCP_SHA256" '
            { account: $a, self_link: $s, family: $f,
              schematic_id: $sid, sha256: $sha }
          ' > "/tmp/out/${ACCOUNT}.json"

      - uses: actions/upload-artifact@v6
        with:
          name: gcp-import-${{ matrix.account.account }}
          path: /tmp/out/${{ matrix.account.account }}.json
          if-no-files-found: error

  # Renders the final talos-images.yaml from job outputs + per-account
  # artifacts and uploads it to R2 (production/inventory/talos-images.yaml).
  # No PR is opened: existing OCI instances ignore source_details drift
  # (per fix #aa721d1), Contabo's ensure_image is the only thing that
  # would react to a URL change and that path is bypassed when the
  # cluster is rebuilt fresh — see [[contabo_image_url_reinstall]] memory.
  assemble-and-upload:
    # Run as long as build + discover succeeded. oci-import / gcp-import
    # are fail-fast=false matrices; we tolerate per-account failures and
    # publish the inventory with whichever OCIDs / self_links made it.
    # (1 failed account out of N should not block the others.) The
    # render step only emits accounts that produced artifacts; missing
    # accounts simply don't appear in the per-account map.
    # Empty gcp: [] leaves discover-gcp success with count=0 and
    # gcp-import skipped — assemble still runs and writes accounts: {}.
    needs: [build, discover-oracle, oci-import, discover-gcp, gcp-import]
    if: |
      always()
      && needs.build.result == 'success'
      && needs.build.outputs.skipped != 'true'
      && needs.discover-oracle.result == 'success'
      && (needs.discover-gcp.result == 'success' || needs.discover-gcp.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v6
        # Tolerate zero oracle legs (all matrix cells failed) so assemble
        # still publishes contabo/onprem/gcp sections.
        continue-on-error: true
        with:
          path: /tmp/oci-artifacts
          pattern: oci-import-*
          merge-multiple: true

      # Skip entirely when gcp: [] (count=0) — download-artifact fails
      # hard when a pattern matches nothing. continue-on-error covers
      # the case where every gcp-import matrix cell failed.
      - uses: actions/download-artifact@v6
        if: needs.discover-gcp.result == 'success' && needs.discover-gcp.outputs.count != '0'
        continue-on-error: true
        with:
          path: /tmp/gcp-artifacts
          pattern: gcp-import-*
          merge-multiple: true

      - name: Render talos-images.yaml
        env:
          SCHEMATIC_ID:           ${{ needs.build.outputs.schematic_id }}
          TALOS_VERSION:          ${{ needs.build.outputs.talos_version }}
          GENERATED_AT:           ${{ needs.build.outputs.generated_at }}
          CONTABO_FILE:           ${{ needs.build.outputs.contabo_file }}
          CONTABO_SHA256:         ${{ needs.build.outputs.contabo_sha256 }}
          ONPREM_FILE:            ${{ needs.build.outputs.onprem_file }}
          ONPREM_SHA256:          ${{ needs.build.outputs.onprem_sha256 }}
          ORACLE_QCOW2_FILE:      ${{ needs.build.outputs.oracle_qcow2_file }}
          ORACLE_QCOW2_SHA256:    ${{ needs.build.outputs.oracle_qcow2_sha256 }}
          ORACLE_ARCHIVE_OBJECT:  ${{ needs.build.outputs.oracle_archive_object }}
          ORACLE_ARCHIVE_SHA256:  ${{ needs.build.outputs.oracle_archive_sha256 }}
          GCP_FILE:               ${{ needs.build.outputs.gcp_file }}
          GCP_SHA256:             ${{ needs.build.outputs.gcp_sha256 }}
        run: |
          set -euo pipefail

          # IMAGES_PUBLIC_HOST resolves to a Cloudflare-attached
          # custom domain on the R2 bucket — anonymous fetch works,
          # which is what Contabo / on-prem Talos / OCI image-import
          # need. The S3-API URL (account.r2.cloudflarestorage.com)
          # would 400 anonymous requests, so we deliberately do NOT
          # use it for downstream URLs.
          base="https://${IMAGES_PUBLIC_HOST}/${SCHEMATIC_ID}"

          # Header (committed to repo as source of truth).
          {
            echo "# Talos image inventory — managed by .github/workflows/sync-talos-images.yml."
            echo "# DO NOT edit by hand. To resync: run that workflow with force=true,"
            echo "# or bump tofu/shared/schematics/cluster.yaml and merge."
            echo "schematic_id: \"${SCHEMATIC_ID}\""
            echo "talos_version: \"${TALOS_VERSION}\""
            echo "generated_at: \"${GENERATED_AT}\""
            echo "formats:"
            echo "  contabo:"
            echo "    url: \"${base}/${CONTABO_FILE}\""
            echo "    sha256: \"${CONTABO_SHA256}\""
            echo "  onprem:"
            echo "    url: \"${base}/${ONPREM_FILE}\""
            echo "    sha256: \"${ONPREM_SHA256}\""
            echo "  oracle:"
            echo "    qcow2_url: \"${base}/${ORACLE_QCOW2_FILE}\""
            echo "    qcow2_sha256: \"${ORACLE_QCOW2_SHA256}\""
            echo "    archive_url: \"${base}/${ORACLE_ARCHIVE_OBJECT}\""
            echo "    archive_sha256: \"${ORACLE_ARCHIVE_SHA256}\""
            echo "    accounts:"
          } > /tmp/talos-images.yaml

          # Per-account block. Sorted by profile for stable diffs.
          # nullglob makes the unmatched glob expand to nothing; without
          # it `ls /tmp/oci-artifacts/*.json` would receive the literal
          # `*.json` and list PWD instead, so a previous bug let the
          # repo's own json files leak in. Use a safe glob expansion
          # directly into the array — no `ls` involved.
          shopt -s nullglob
          artifacts=(/tmp/oci-artifacts/*.json)
          shopt -u nullglob
          IFS=$'\n' artifacts=($(printf '%s\n' "${artifacts[@]}" | sort))
          if (( ${#artifacts[@]} == 0 )); then
            echo "      {}" >> /tmp/talos-images.yaml
          else
            for f in "${artifacts[@]}"; do
              profile=$(jq -r '.profile' "$f")
              ocid=$(jq    -r '.ocid'    "$f")
              region=$(jq  -r '.region'  "$f")
              namespace=$(jq -r '.namespace' "$f")
              bucket=$(jq  -r '.bucket'  "$f")
              object=$(jq  -r '.object'  "$f")
              {
                echo "      ${profile}:"
                echo "        ocid: \"${ocid}\""
                echo "        region: \"${region}\""
                echo "        namespace: \"${namespace}\""
                echo "        bucket: \"${bucket}\""
                echo "        object: \"${object}\""
              } >> /tmp/talos-images.yaml
            done
          fi

          # GCP format block: shared R2 url/sha + per-project self_links.
          # Empty accounts map is required so consumers can safely
          # try(local.talos_images.formats.gcp.accounts[...]) when
          # gcp: [] or no import artifacts landed.
          {
            echo "  gcp:"
            if [[ -n "${GCP_FILE}" ]]; then
              echo "    url: \"${base}/${GCP_FILE}\""
              echo "    sha256: \"${GCP_SHA256}\""
            fi
            echo "    accounts:"
          } >> /tmp/talos-images.yaml

          shopt -s nullglob
          gcp_artifacts=(/tmp/gcp-artifacts/*.json)
          shopt -u nullglob
          IFS=$'\n' gcp_artifacts=($(printf '%s\n' "${gcp_artifacts[@]}" | sort))
          if (( ${#gcp_artifacts[@]} == 0 )); then
            echo "      {}" >> /tmp/talos-images.yaml
          else
            for f in "${gcp_artifacts[@]}"; do
              acct=$(jq -r '.account' "$f")
              self_link=$(jq -r '.self_link' "$f")
              schematic_id=$(jq -r '.schematic_id' "$f")
              sha256=$(jq -r '.sha256' "$f")
              family=$(jq -r '.family // "stawi-talos"' "$f")
              {
                echo "      ${acct}:"
                echo "        self_link: \"${self_link}\""
                echo "        schematic_id: \"${schematic_id}\""
                echo "        sha256: \"${sha256}\""
                echo "        family: \"${family}\""
              } >> /tmp/talos-images.yaml
            done
          fi

          echo "::group::rendered inventory"
          cat /tmp/talos-images.yaml
          echo "::endgroup::"

      # Upload directly to R2 — no PR. The R2-resident copy is what
      # the node-state-staging step in tofu-layer.yml pulls down at
      # plan time. Audit trail lives in this workflow's run history
      # and R2 object versioning.
      - name: Upload talos-images.yaml to R2
        env:
          AWS_ACCESS_KEY_ID:         ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:     ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
          R2_ACCOUNT_ID:             ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          aws s3 cp /tmp/talos-images.yaml \
            s3://cluster-tofu-state/production/inventory/talos-images.yaml \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --region us-east-1
          echo "::notice::uploaded production/inventory/talos-images.yaml"
