# One-shot manual diagnostic — fetches talosconfig from layer 00 state in
# R2 and runs talosctl service / dmesg / health against the Contabo CPs.
# Use when wait_apiserver fails or apiserver isn't reachable. No untrusted
# input is consumed; all values come from R2/secrets controlled by repo
# admins, so no command-injection surface.
name: talos-diagnose
on:
  workflow_dispatch: {}

jobs:
  diagnose:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Install tools
        run: |
          set -euo pipefail
          if ! command -v jq      >/dev/null; then sudo apt-get install -y jq; fi
          if ! command -v sops    >/dev/null; then
            curl -fsSL -o /tmp/sops https://github.com/getsops/sops/releases/download/v3.11.0/sops-v3.11.0.linux.amd64
            sudo install -m 0755 /tmp/sops /usr/local/bin/sops; rm /tmp/sops
          fi
          if ! command -v talosctl >/dev/null; then
            # Read the cluster's Talos version from the central source
            # of truth (tofu/shared/versions.auto.tfvars.json) so this
            # runner-side install always matches what's deployed.
            TALOS_VERSION=$(jq -r '.talos_version' tofu/shared/versions.auto.tfvars.json)
            curl -fsSL -o /tmp/talosctl "https://github.com/siderolabs/talos/releases/download/${TALOS_VERSION}/talosctl-linux-amd64"
            sudo install -m 0755 /tmp/talosctl /usr/local/bin/talosctl; rm /tmp/talosctl
          fi
          talosctl version --client
          sops --version --disable-version-check

      - name: Fetch layer 00 tfstate from R2 + extract talosconfig
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
          SOPS_AGE_KEY:          ${{ secrets.SOPS_AGE_KEY }}
        run: |
          set -euo pipefail
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws s3 cp "s3://cluster-tofu-state/production/00-talos-secrets.tfstate" /tmp/00.tfstate \
            --endpoint-url "$ENDPOINT" --region us-east-1
          jq -r '.outputs.client_configuration.value' /tmp/00.tfstate > /tmp/client_config.json
          CA=$(jq -r '.ca_certificate' /tmp/client_config.json)
          CRT=$(jq -r '.client_certificate' /tmp/client_config.json)
          KEY=$(jq -r '.client_key' /tmp/client_config.json)
          cat > /tmp/talosconfig <<YAML
          context: stawi
          contexts:
            stawi:
              endpoints:
                - 164.68.121.237
                - 164.68.107.115
              ca: ${CA}
              crt: ${CRT}
              key: ${KEY}
          YAML
          chmod 0600 /tmp/talosconfig

      - name: Talos network + services + dmesg
        env:
          TALOSCONFIG: /tmp/talosconfig
        run: |
          set +e
          for IP in 164.68.121.237 164.68.107.115; do
            echo "::group::node $IP"
            echo "--- service kube-apiserver ---"
            talosctl --talosconfig "$TALOSCONFIG" -e "$IP" -n "$IP" service kube-apiserver 2>&1 | head -40
            echo "--- service kubelet ---"
            talosctl --talosconfig "$TALOSCONFIG" -e "$IP" -n "$IP" service kubelet 2>&1 | head -20
            echo "--- get linkstatuses ---"
            talosctl --talosconfig "$TALOSCONFIG" -e "$IP" -n "$IP" get linkstatuses 2>&1 | head -20
            echo "--- get addresses ---"
            talosctl --talosconfig "$TALOSCONFIG" -e "$IP" -n "$IP" get addresses 2>&1 | head -20
            echo "--- get routes ---"
            talosctl --talosconfig "$TALOSCONFIG" -e "$IP" -n "$IP" get routes 2>&1 | head -30
            echo "--- get resolverstatus ---"
            talosctl --talosconfig "$TALOSCONFIG" -e "$IP" -n "$IP" get resolverstatuses 2>&1 | head
            echo "--- get nfttable (firewall) ---"
            talosctl --talosconfig "$TALOSCONFIG" -e "$IP" -n "$IP" get nftableschain 2>&1 | head -30
            echo "--- dmesg (apiserver/etcd/cni/err lines) ---"
            talosctl --talosconfig "$TALOSCONFIG" -e "$IP" -n "$IP" dmesg 2>&1 | grep -i "apiserver\|etcd\|cni\|route\|err" | tail -30
            echo "::endgroup::"
          done
          echo "::group::cluster health"
          talosctl --talosconfig "$TALOSCONFIG" -e 164.68.121.237 -n 164.68.121.237,164.68.107.115 health --wait-timeout 30s 2>&1 | head -40
          echo "::endgroup::"
