# .github/workflows/tofu-apply.yml
name: tofu-apply
on:
  workflow_dispatch: {}
  # Reusable from cluster-reinstall.yml and cluster-reset.yml so the
  # reconstruction flows can carry the apply through the same job
  # graph instead of dispatching a separate tofu-apply run.
  workflow_call: {}

permissions:
  contents: read
  id-token: write
  pull-requests: write

# Concurrency is event-aware:
#   - workflow_dispatch (operator runs tofu-apply directly): grab the
#     real `tofu-apply-production` slot so two parallel dispatches
#     can't apply at the same time.
#   - workflow_call (parent reusable-workflow caller — cluster-reset,
#     cluster-reinstall): the parent already holds `tofu-apply-production`.
#     Use a unique per-run group so the child doesn't deadlock against
#     its parent. Without this, the apply job silently never starts
#     and the parent reports conclusion=failure with no apply log.
concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && 'tofu-apply-production' || format('tofu-apply-child-{0}', github.run_id) }}
  cancel-in-progress: false

jobs:
  secrets:
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 00-talos-secrets
      mode: apply
      environment: production
    secrets: inherit

  contabo-infra:
    needs: secrets
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 01-contabo-infra
      mode: apply
      environment: production
    secrets: inherit

  # Oracle has per-account state files (production/02-oracle-infra-<acct>.tfstate).
  # Run each account as its own matrix cell with fail-fast=false so a single
  # account's apply failure (OCI Out-of-Host-Capacity, missing IAM policy,
  # tenancy-level outage) can't cancel siblings or block downstream layers
  # whose nodes live in healthy accounts. The set of accounts comes from
  # tofu/shared/accounts.yaml — single source of truth.
  read-oracle-accounts:
    needs: secrets
    runs-on: ubuntu-latest
    outputs:
      accounts: ${{ steps.read.outputs.accounts }}
    steps:
      - uses: actions/checkout@v5
      - id: read
        run: |
          set -euo pipefail
          # yq's @json output already collapses to one line per node; pipe
          # through jq -c for safety (compact, no trailing newline).
          accounts=$(yq -o=json '.oracle' tofu/shared/accounts.yaml | jq -c .)
          echo "accounts=$accounts" >> "$GITHUB_OUTPUT"
          echo "::notice::oracle accounts: $accounts"

  oracle-infra:
    needs: read-oracle-accounts
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        account: ${{ fromJson(needs.read-oracle-accounts.outputs.accounts) }}
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 02-oracle-infra
      account: ${{ matrix.account }}
      mode: apply
      environment: production
    secrets: inherit

  onprem-infra:
    needs: secrets
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 02-onprem-infra
      mode: apply
      environment: production
    secrets: inherit

  talos:
    needs: [contabo-infra, oracle-infra, onprem-infra]
    # Worker-account isolation: a failed oracle matrix cell (e.g. OOC,
    # missing IAM policy in one tenancy) marks the oracle-infra parent
    # job as failed, which by default would block layer 03. Override
    # with always() so talos proceeds as long as the connectivity-
    # backbone layers (contabo CPs, onprem) succeeded; oracle workers
    # whose state never landed simply won't appear in the merged nodes
    # map and are skipped by the talos apply naturally.
    if: always() && needs.contabo-infra.result == 'success' && needs.onprem-infra.result == 'success'
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 03-talos
      mode: apply
      environment: production
    secrets: inherit

  flux:
    needs: talos
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 04-flux
      mode: apply
      environment: production
    secrets: inherit

  # Downloadable machine-config bundle encrypted to the dispatching user's
  # GitHub SSH keys. Lets operators onboard non-cloud machines as workers.
  machine-configs:
    needs: talos
    permissions:
      contents: read
    uses: ./.github/workflows/publish-talos-configs.yml
    secrets: inherit
