# .github/workflows/tofu-apply.yml
name: tofu-apply
on:
  workflow_dispatch:
    inputs:
      contabo_pre_apply_state_rm:
        description: "Whitespace-separated resource addresses to `tofu state rm` before plan/apply on the 01-contabo-infra layer. Recovery / cross-layer move use only."
        required: false
        type: string
        default: ""
  # Reusable from cluster-reinstall.yml and cluster-reset.yml so the
  # reconstruction flows can carry the apply through the same job
  # graph instead of dispatching a separate tofu-apply run.
  workflow_call:
    inputs:
      contabo_pre_apply_state_rm:
        required: false
        type: string
        default: ""

permissions:
  contents: read
  id-token: write
  pull-requests: write

# Concurrency is event-aware:
#   - workflow_dispatch (operator runs tofu-apply directly): grab the
#     real `tofu-apply-production` slot so two parallel dispatches
#     can't apply at the same time.
#   - workflow_call (parent reusable-workflow caller — cluster-reset,
#     cluster-reinstall): the parent already holds `tofu-apply-production`.
#     Use a unique per-run group so the child doesn't deadlock against
#     its parent. Without this, the apply job silently never starts
#     and the parent reports conclusion=failure with no apply log.
concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && 'tofu-apply-production' || format('tofu-apply-child-{0}', github.run_id) }}
  cancel-in-progress: false

jobs:
  secrets:
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 00-talos-secrets
      mode: apply
      environment: production
    secrets: inherit

  # NOTE: layer 00-omni-server (the Omni-host VPS itself) has its own
  # workflow — .github/workflows/tofu-omni-host.yml — triggered by
  # paths/dispatch on tofu/modules/omni-host-{oci,contabo}/**, tofu/shared/templates/omni-host/**, + tofu/layers/
  # 00-omni-server/**. Separated 2026-05-02 so a node-only PR can
  # never reinstall the host (which burns the Let's Encrypt
  # 5-certs-per-168h quota and rotates the SideroLink join token).
  # Operators trigger an omni-host apply manually (or by editing
  # files under those paths); this workflow assumes the omni-host is
  # already healthy when talos-layer's omnictl ops run.

  # Infra layers (contabo, oracle, onprem, gcp) keep one tfstate per
  # account. Run each account as its own matrix cell with fail-fast=false
  # so a single account's apply failure (Contabo OAuth blip, OCI Out-of-
  # Host-Capacity, missing IAM policy, tenancy outage, R2 sync hiccup,
  # decryption issue, GCP quota) can't cancel siblings or block
  # downstream layers whose nodes live in healthy accounts. The set of
  # accounts comes from tofu/shared/accounts.yaml — single source of
  # truth. GCP uses count!=0 so an empty gcp: [] roster skips cleanly.
  read-contabo-accounts:
    needs: secrets
    runs-on: ubuntu-latest
    outputs:
      accounts: ${{ steps.read.outputs.accounts }}
    steps:
      - uses: actions/checkout@v5
      - id: read
        run: |
          set -euo pipefail
          accounts=$(yq -o=json '.contabo' tofu/shared/accounts.yaml | jq -c .)
          echo "accounts=$accounts" >> "$GITHUB_OUTPUT"
          echo "::notice::contabo accounts: $accounts"

  contabo-infra:
    needs: read-contabo-accounts
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        account: ${{ fromJson(needs.read-contabo-accounts.outputs.accounts) }}
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 01-contabo-infra
      account: ${{ matrix.account }}
      mode: apply
      environment: production
      pre_apply_state_rm: ${{ inputs.contabo_pre_apply_state_rm }}
    secrets: inherit

  read-oracle-accounts:
    needs: secrets
    runs-on: ubuntu-latest
    outputs:
      accounts: ${{ steps.read.outputs.accounts }}
    steps:
      - uses: actions/checkout@v5
      - id: read
        run: |
          set -euo pipefail
          # yq's @json output already collapses to one line per node; pipe
          # through jq -c for safety (compact, no trailing newline).
          accounts=$(yq -o=json '.oracle' tofu/shared/accounts.yaml | jq -c .)
          echo "accounts=$accounts" >> "$GITHUB_OUTPUT"
          echo "::notice::oracle accounts: $accounts"

  oracle-infra:
    needs: read-oracle-accounts
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        account: ${{ fromJson(needs.read-oracle-accounts.outputs.accounts) }}
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 02-oracle-infra
      account: ${{ matrix.account }}
      mode: apply
      environment: production
    secrets: inherit

  read-onprem-accounts:
    needs: secrets
    runs-on: ubuntu-latest
    outputs:
      accounts: ${{ steps.read.outputs.accounts }}
    steps:
      - uses: actions/checkout@v5
      - id: read
        run: |
          set -euo pipefail
          accounts=$(yq -o=json '.onprem' tofu/shared/accounts.yaml | jq -c .)
          echo "accounts=$accounts" >> "$GITHUB_OUTPUT"
          echo "::notice::onprem accounts: $accounts"

  onprem-infra:
    needs: read-onprem-accounts
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        account: ${{ fromJson(needs.read-onprem-accounts.outputs.accounts) }}
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 02-onprem-infra
      account: ${{ matrix.account }}
      mode: apply
      environment: production
    secrets: inherit

  read-gcp-accounts:
    needs: secrets
    runs-on: ubuntu-latest
    outputs:
      accounts: ${{ steps.read.outputs.accounts }}
      count: ${{ steps.read.outputs.count }}
    steps:
      - uses: actions/checkout@v5
      - id: read
        run: |
          set -euo pipefail
          accounts=$(yq -o=json '.gcp // []' tofu/shared/accounts.yaml | jq -c .)
          count=$(jq 'length' <<<"$accounts")
          echo "accounts=$accounts" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "::notice::gcp accounts ($count): $accounts"

  gcp-infra:
    needs: read-gcp-accounts
    if: needs.read-gcp-accounts.outputs.count != '0'
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        account: ${{ fromJson(needs.read-gcp-accounts.outputs.accounts) }}
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 02-gcp-infra
      account: ${{ matrix.account }}
      mode: apply
      environment: production
    secrets: inherit

  # bwire-only OCI storage layer (buckets + operator CSK). Independent
  # of the per-account oracle matrix — only needs secrets + bwire auth
  # in R2. Running parallel with contabo/oracle/onprem/gcp removes the
  # false serial wait on the slowest OCI account cell.
  oci-storage:
    needs: secrets
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 02-oci-storage
      mode: apply
      environment: production
    secrets: inherit

  talos:
    # talos layer runs omnictl against cpd.stawi.org for machine-labels
    # + per-node patch render. omni-host lifecycle is owned by
    # tofu-omni-host.yml — this workflow assumes the host is already up.
    needs: [contabo-infra, oracle-infra, onprem-infra, gcp-infra, oci-storage]
    # Per-account isolation: fail-fast=false matrices report aggregate
    # success only when every cell wins. We proceed unless cancelled so
    # healthy accounts still label/sync; cluster-health catches quorum
    # loss. When gcp: [] the gcp-infra job is skipped (result=skipped,
    # != cancelled) so talos still runs under always().
    if: always() && needs.contabo-infra.result != 'cancelled' && needs.oracle-infra.result != 'cancelled' && needs.onprem-infra.result != 'cancelled' && needs.gcp-infra.result != 'cancelled' && needs.oci-storage.result != 'cancelled'
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 03-talos
      mode: apply
      environment: production
    secrets: inherit

  dns:
    # DNS reads infra remote states (node IPs), not 03-talos state.
    # Run in parallel with talos once infra matrices finish.
    needs: [contabo-infra, oracle-infra, onprem-infra, gcp-infra]
    if: always() && needs.contabo-infra.result != 'cancelled' && needs.oracle-infra.result != 'cancelled' && needs.onprem-infra.result != 'cancelled' && needs.gcp-infra.result != 'cancelled'
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 04-dns
      mode: apply
      environment: production
    secrets: inherit

  # 04-flux is gated off. The 03-talos kubeconfig / talosconfig
  # outputs that this layer consumed are gone now that Omni owns
  # cluster lifecycle. Task 8 part 2 of the Omni-takeover plan re-
  # introduces Flux as an Omni cluster extension; until then keep the
  # job stub for graph validity but skip it.
  flux:
    if: false
    needs: talos
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 04-flux
      mode: apply
      environment: production
    secrets: inherit
