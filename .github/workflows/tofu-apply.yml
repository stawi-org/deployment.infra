# .github/workflows/tofu-apply.yml
name: tofu-apply
on:
  workflow_dispatch: {}
  # Reusable from cluster-reinstall.yml and cluster-reset.yml so the
  # reconstruction flows can carry the apply through the same job
  # graph instead of dispatching a separate tofu-apply run.
  workflow_call: {}

permissions:
  contents: read
  id-token: write
  pull-requests: write

# Concurrency is event-aware:
#   - workflow_dispatch (operator runs tofu-apply directly): grab the
#     real `tofu-apply-production` slot so two parallel dispatches
#     can't apply at the same time.
#   - workflow_call (parent reusable-workflow caller — cluster-reset,
#     cluster-reinstall): the parent already holds `tofu-apply-production`.
#     Use a unique per-run group so the child doesn't deadlock against
#     its parent. Without this, the apply job silently never starts
#     and the parent reports conclusion=failure with no apply log.
concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && 'tofu-apply-production' || format('tofu-apply-child-{0}', github.run_id) }}
  cancel-in-progress: false

jobs:
  secrets:
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 00-talos-secrets
      mode: apply
      environment: production
    secrets: inherit

  # All three infra layers (contabo, oracle, onprem) keep one tfstate per
  # account. Run each account as its own matrix cell with fail-fast=false
  # so a single account's apply failure (Contabo OAuth blip, OCI Out-of-
  # Host-Capacity, missing IAM policy, tenancy outage, R2 sync hiccup,
  # decryption issue) can't cancel siblings or block downstream layers
  # whose nodes live in healthy accounts. The set of accounts comes from
  # tofu/shared/accounts.yaml — single source of truth.
  read-contabo-accounts:
    needs: secrets
    runs-on: ubuntu-latest
    outputs:
      accounts: ${{ steps.read.outputs.accounts }}
    steps:
      - uses: actions/checkout@v5
      - id: read
        run: |
          set -euo pipefail
          accounts=$(yq -o=json '.contabo' tofu/shared/accounts.yaml | jq -c .)
          echo "accounts=$accounts" >> "$GITHUB_OUTPUT"
          echo "::notice::contabo accounts: $accounts"

  contabo-infra:
    needs: read-contabo-accounts
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        account: ${{ fromJson(needs.read-contabo-accounts.outputs.accounts) }}
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 01-contabo-infra
      account: ${{ matrix.account }}
      mode: apply
      environment: production
    secrets: inherit

  read-oracle-accounts:
    needs: secrets
    runs-on: ubuntu-latest
    outputs:
      accounts: ${{ steps.read.outputs.accounts }}
    steps:
      - uses: actions/checkout@v5
      - id: read
        run: |
          set -euo pipefail
          # yq's @json output already collapses to one line per node; pipe
          # through jq -c for safety (compact, no trailing newline).
          accounts=$(yq -o=json '.oracle' tofu/shared/accounts.yaml | jq -c .)
          echo "accounts=$accounts" >> "$GITHUB_OUTPUT"
          echo "::notice::oracle accounts: $accounts"

  oracle-infra:
    needs: read-oracle-accounts
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        account: ${{ fromJson(needs.read-oracle-accounts.outputs.accounts) }}
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 02-oracle-infra
      account: ${{ matrix.account }}
      mode: apply
      environment: production
    secrets: inherit

  read-onprem-accounts:
    needs: secrets
    runs-on: ubuntu-latest
    outputs:
      accounts: ${{ steps.read.outputs.accounts }}
    steps:
      - uses: actions/checkout@v5
      - id: read
        run: |
          set -euo pipefail
          accounts=$(yq -o=json '.onprem' tofu/shared/accounts.yaml | jq -c .)
          echo "accounts=$accounts" >> "$GITHUB_OUTPUT"
          echo "::notice::onprem accounts: $accounts"

  onprem-infra:
    needs: read-onprem-accounts
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        account: ${{ fromJson(needs.read-onprem-accounts.outputs.accounts) }}
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 02-onprem-infra
      account: ${{ matrix.account }}
      mode: apply
      environment: production
    secrets: inherit

  talos:
    needs: [contabo-infra, oracle-infra, onprem-infra]
    # Per-account isolation across all three providers: each infra layer
    # is now a fail-fast=false matrix, so `needs.X.result == 'success'`
    # would block talos unless EVERY cell succeeded. That's the wrong
    # semantic for our goal — we want talos to proceed when at least
    # one cell completed without an explicit cancel.
    #
    # contabo: provides CPs and quorum, so we still need at least one
    #   cell to have produced a state file. The aggregate matrix result
    #   is 'success' only when every cell wins, but != 'cancelled'
    #   trips when at least one cell ran and the matrix wasn't manually
    #   cancelled. The downstream cluster-health check catches an
    #   actual quorum loss if the surviving CPs aren't enough.
    # oracle / onprem: workers (and occasional CPs); per-cell failures
    #   simply remove that account's nodes from the merged map and
    #   talos skips them naturally. Same != 'cancelled' gate.
    if: always() && needs.contabo-infra.result != 'cancelled' && needs.oracle-infra.result != 'cancelled' && needs.onprem-infra.result != 'cancelled'
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 03-talos
      mode: apply
      environment: production
    secrets: inherit

  flux:
    needs: talos
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 04-flux
      mode: apply
      environment: production
    secrets: inherit

  # Downloadable machine-config bundle encrypted to the dispatching user's
  # GitHub SSH keys. Lets operators onboard non-cloud machines as workers.
  machine-configs:
    needs: talos
    permissions:
      contents: read
    uses: ./.github/workflows/publish-talos-configs.yml
    secrets: inherit
