# .github/workflows/tofu-apply.yml
name: tofu-apply
on:
  workflow_dispatch: {}
  # Reusable from cluster-reinstall.yml and cluster-reset.yml so the
  # reconstruction flows can carry the apply through the same job
  # graph instead of dispatching a separate tofu-apply run.
  workflow_call: {}

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: tofu-apply-production
  cancel-in-progress: false

jobs:
  secrets:
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 00-talos-secrets
      mode: apply
      environment: production
    secrets: inherit

  contabo-infra:
    needs: secrets
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 01-contabo-infra
      mode: apply
      environment: production
    secrets: inherit

  oracle-infra:
    needs: secrets
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 02-oracle-infra
      mode: apply
      environment: production
    secrets: inherit

  onprem-infra:
    needs: secrets
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 02-onprem-infra
      mode: apply
      environment: production
    secrets: inherit

  talos:
    needs: [contabo-infra, oracle-infra, onprem-infra]
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 03-talos
      mode: apply
      environment: production
    secrets: inherit

  flux:
    needs: talos
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 04-flux
      mode: apply
      environment: production
    secrets: inherit

  # Downloadable machine-config bundle encrypted to the dispatching user's
  # GitHub SSH keys. Lets operators onboard non-cloud machines as workers.
  machine-configs:
    needs: talos
    permissions:
      contents: read
    uses: ./.github/workflows/publish-talos-configs.yml
    secrets: inherit
