# .github/workflows/tofu-layer.yml
name: tofu-layer
on:
  workflow_call:
    inputs:
      layer:          { required: true, type: string }
      mode:           { required: true, type: string, description: "plan | apply" }
      environment:    { required: false, type: string, default: "" }
    secrets:
      R2_ACCOUNT_ID:            { required: true }
      R2_ACCESS_KEY_ID:         { required: true }
      R2_SECRET_ACCESS_KEY:     { required: true }
      CONTABO_CLIENT_ID:        { required: false }
      CONTABO_CLIENT_SECRET:    { required: false }
      CONTABO_API_USER:         { required: false }
      CONTABO_API_PASSWORD:     { required: false }
      CLOUDFLARE_API_TOKEN:     { required: false }
      FLUX_GITHUB_APP_ID:               { required: false }
      FLUX_GITHUB_APP_INSTALLATION_ID:  { required: false }
      FLUX_GITHUB_APP_PRIVATE_KEY:      { required: false }
      SOPS_AGE_KEY:                     { required: false }
      ETCD_BACKUP_R2_ACCESS_KEY_ID:     { required: false }
      ETCD_BACKUP_R2_SECRET_ACCESS_KEY: { required: false }
      # OCI accounts now come exclusively from production/config/ under R2.
      # The workflow syncs the provider/account YAML files and aggregates them.
      # Repository variable:
      #   OCI_RETAINED_PROFILES   — comma-separated profile names kept provider-only
      #                            for one apply while their resources are destroyed.

jobs:
  run:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write   # for OIDC to OCI
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: "1.10.0"

      - name: Sync R2 inventory to /tmp/inventory/ (node-state module reads from here)
        if: inputs.layer == '01-contabo-infra' || inputs.layer == '02-oracle-infra' || inputs.layer == '02-onprem-infra' || inputs.layer == '03-talos'
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/inventory
          aws s3 sync "s3://cluster-tofu-state/production/inventory/" /tmp/inventory/ \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --region us-east-1 \
            --delete

      # Only layer 03 needs talosctl for the null_resource.reboot_cp provisioner.
      - name: Install talosctl
        if: inputs.layer == '03-talos'
        run: |
          set -euo pipefail
          TALOS_VERSION="v1.12.6"
          ASSET_URL="https://github.com/siderolabs/talos/releases/download/${TALOS_VERSION}/talosctl-linux-amd64"
          curl -fsSL -o /tmp/talosctl "${ASSET_URL}"
          chmod +x /tmp/talosctl
          sudo install -m 0755 /tmp/talosctl /usr/local/bin/talosctl
          rm /tmp/talosctl
          talosctl version --client

      - name: Install OCI CLI
        if: inputs.layer == '02-oracle-infra'
        # The tofu `external` data source in modules/oracle-account-
        # infra/image.tf shells out to scripts/oci-image-create-or-
        # find.sh, which calls `oci compute image create` directly
        # (the only path that lets us declare --launch-mode CUSTOM +
        # the full Talos-prescribed --launch-options at CreateImage
        # time — the tofu oci_core_image resource's launch_options
        # field is Computed-only).
        #
        # Install with sudo so the binary lands on /usr/local/bin —
        # tofu spawns the external data source in a subshell whose
        # PATH doesn't inherit ~/.local/bin reliably across runners.
        run: |
          set -euo pipefail
          sudo python3 -m pip install --upgrade pip
          sudo python3 -m pip install oci-cli
          which oci && oci --version

      - name: OCI workload-identity federation
        if: inputs.layer == '02-oracle-infra'
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          TMPDIR_AUTH=$(mktemp -d)
          aws s3 sync "s3://cluster-tofu-state/production/inventory/oracle/" "${TMPDIR_AUTH}/" \
            --endpoint-url "$ENDPOINT" --region us-east-1 \
            --exclude "*" --include "*/auth.yaml" || true
          AUTH_JSON=$(python3 scripts/build-oci-auth-json.py "${TMPDIR_AUTH}")
          if [[ "$AUTH_JSON" == "[]" ]]; then
            echo "::notice::no OCI auth profiles in R2 inventory — skipping WIF setup"
          else
            echo "$AUTH_JSON" > /tmp/oci_auth_accounts.json
            scripts/configure-oci-wif.sh /tmp/oci_auth_accounts.json
          fi

      - name: Download Talos OCI qcow2 for staging
        if: inputs.layer == '02-oracle-infra'
        # OCI CreateImage won't fetch external HTTPS URIs, so we pull
        # the factory qcow2 once to the runner; tofu uploads it into a
        # per-account public-read bucket and scripts/oci-image-create-
        # or-find.sh creates the image from that URL with the explicit
        # --launch-mode CUSTOM + --launch-options Talos arm64 needs.
        # No image_metadata.json wrapping — the CLI passes launch
        # options directly at CreateImage time.
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(/tmp/inventory/oracle/*/auth.yaml)
          if (( ${#files[@]} == 0 )); then
            echo "::notice::no oracle accounts in inventory; skipping OCI image stage"
            exit 0
          fi
          TALOS_VERSION=$(awk -F'"' '/^talos_version[[:space:]]*=/ {print $2; exit}' tofu/shared/versions.auto.tfvars)
          if [[ -z "$TALOS_VERSION" ]]; then
            echo "::error::could not read talos_version from tofu/shared/versions.auto.tfvars"
            exit 1
          fi
          SCHEMATIC_ID=$(curl -fsSL -X POST https://factory.talos.dev/schematics \
            -H "Content-Type: application/yaml" \
            --data-binary @tofu/shared/schematic.yaml | jq -r '.id')
          if [[ -z "$SCHEMATIC_ID" || "$SCHEMATIC_ID" == "null" ]]; then
            echo "::error::failed to resolve Talos schematic id"
            exit 1
          fi
          mkdir -p /tmp/talos-oci
          QCOW2="/tmp/talos-oci/talos-${TALOS_VERSION}-${SCHEMATIC_ID}-oracle-arm64.qcow2"
          echo "schematic_id=$SCHEMATIC_ID talos_version=$TALOS_VERSION"
          echo "target=$QCOW2"
          if [[ ! -s "$QCOW2" ]]; then
            curl -fsSL -o "$QCOW2" \
              "https://factory.talos.dev/image/${SCHEMATIC_ID}/${TALOS_VERSION}/oracle-arm64.qcow2"
            echo "downloaded $(stat -c%s "$QCOW2") byte qcow2"
          else
            echo "already present, reusing"
          fi
          echo "TF_VAR_talos_qcow2_local_path=$QCOW2" >> "$GITHUB_ENV"

      - name: Clear stale state lock
        if: inputs.mode == 'plan' || inputs.mode == 'apply'
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          LOCK_KEY="production/${{ inputs.layer }}.tfstate.tflock"
          # R2 requires a real AWS region name in the CLI even though R2 ignores it.
          aws s3 rm "s3://cluster-tofu-state/${LOCK_KEY}" \
            --endpoint-url "https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com" \
            --region us-east-1 \
            2>&1 | grep -v "NoSuchKey\|^$" || true

      - name: Init
        working-directory: tofu/layers/${{ inputs.layer }}
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          tofu init \
            -backend-config="endpoints={s3=\"https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com\"}"

      - name: Validate
        working-directory: tofu/layers/${{ inputs.layer }}
        run: tofu validate

      - name: Plan
        if: inputs.mode == 'plan' || inputs.mode == 'apply'
        working-directory: tofu/layers/${{ inputs.layer }}
        env:
          AWS_ACCESS_KEY_ID:           ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:       ${{ secrets.R2_SECRET_ACCESS_KEY }}
          TF_VAR_r2_account_id:        ${{ secrets.R2_ACCOUNT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_github_app_id:              ${{ secrets.FLUX_GITHUB_APP_ID }}
          TF_VAR_github_app_installation_id: ${{ secrets.FLUX_GITHUB_APP_INSTALLATION_ID }}
          TF_VAR_github_app_private_key:     ${{ secrets.FLUX_GITHUB_APP_PRIVATE_KEY }}
          TF_VAR_sops_age_key:               ${{ secrets.SOPS_AGE_KEY }}
          TF_VAR_etcd_backup_r2_access_key_id:     ${{ secrets.ETCD_BACKUP_R2_ACCESS_KEY_ID }}
          TF_VAR_etcd_backup_r2_secret_access_key: ${{ secrets.ETCD_BACKUP_R2_SECRET_ACCESS_KEY }}
          TF_VAR_age_recipients:                   ${{ vars.SOPS_AGE_RECIPIENTS }}
          SOPS_AGE_KEY:                            ${{ secrets.SOPS_AGE_KEY }}
        # Downstream layers (02/03/04) read upstream remote state that doesn't
        # exist until the first apply lands on main. On a PR pre-bootstrap those
        # plans will fail with "No stored state was found" — that's expected, so
        # in plan mode we soft-fail and surface a workflow warning instead of
        # blocking the PR. In apply mode, all failures are hard.
        #
        # -lock=false on plan: plans are read-only for lock purposes; allowing
        # concurrent plans across PRs prevents cross-ref R2 lockfile collisions
        # (the apply step below keeps locking so state writes stay serialised
        # by the tofu-apply-production concurrency group).
        run: |
          set +e
          tofu plan -out=tfplan -input=false -lock=false
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            if [ "${{ inputs.mode }}" = "plan" ] && [[ "${{ inputs.layer }}" =~ ^(02|03|04)- ]]; then
              echo "::warning::plan failed for ${{ inputs.layer }} (exit $rc) — expected pre-bootstrap when upstream remote state is absent. Soft-failing in plan mode."
              exit 0
            fi
            exit $rc
          fi

      - uses: actions/upload-artifact@v6
        if: inputs.mode == 'plan' || inputs.mode == 'apply'
        with:
          name: tfplan-${{ inputs.layer }}
          path: tofu/layers/${{ inputs.layer }}/tfplan
          retention-days: 30

      - name: Apply
        if: inputs.mode == 'apply'
        working-directory: tofu/layers/${{ inputs.layer }}
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          TF_VAR_age_recipients: ${{ vars.SOPS_AGE_RECIPIENTS }}
          SOPS_AGE_KEY:          ${{ secrets.SOPS_AGE_KEY }}
        run: tofu apply -input=false -auto-approve tfplan

      # When a local-exec provisioner has sensitive env vars, Terraform
      # suppresses its stdout/stderr entirely — which makes it
      # impossible to see what the script reported. modules/node-contabo/
      # ensure-image.sh tees its output to /tmp/ensure-image-*.log. Dump
      # those here so they appear in the job log regardless of whether
      # Apply succeeded or failed.
      - name: Dump ensure-image provisioner logs
        if: always() && inputs.layer == '01-contabo-infra'
        run: |
          shopt -s nullglob
          for f in /tmp/ensure-image-*.log; do
            echo "::group::$f"
            cat "$f" || true
            echo "::endgroup::"
          done
