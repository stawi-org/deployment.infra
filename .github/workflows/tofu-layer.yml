# .github/workflows/tofu-layer.yml
name: tofu-layer
on:
  # Reusable workflow used by tofu-plan / tofu-apply / reconstruction.
  workflow_call:
    inputs:
      layer:            { required: true, type: string }
      mode:             { required: true, type: string, description: "plan | apply" }
      environment:      { required: false, type: string, default: "" }
      extra_plan_args:  { required: false, type: string, default: "", description: "Extra args appended to tofu plan (e.g. -replace=foo.bar). Recovery use only." }
      account:          { required: false, type: string, default: "", description: "Account key for per-account-state layers (01-contabo-infra, 02-oracle-infra, 02-onprem-infra). When non-empty, the Init step overrides the backend key to production/<layer>-<account>.tfstate and TF_VAR_account_key is exported so the layer's variable validation accepts the run." }
  # Direct operator dispatch — used for one-off recovery actions that
  # don't fit the standard plan/apply graph (e.g. -replace= a single
  # resource without dragging the whole layer chain along).
  workflow_dispatch:
    inputs:
      layer:           { required: true, type: string }
      mode:            { required: true, type: string, description: "plan | apply" }
      environment:     { required: false, type: string, default: "production" }
      extra_plan_args: { required: false, type: string, default: "" }
      account:         { required: false, type: string, default: "" }
      pre_apply_state_rm:
        required: false
        type: string
        default: ""
        description: "Whitespace-separated resource addresses to `tofu state rm` before plan/apply. Recovery / cross-layer move use only."
    secrets:
      R2_ACCOUNT_ID:            { required: true }
      R2_ACCESS_KEY_ID:         { required: true }
      R2_SECRET_ACCESS_KEY:     { required: true }
      CONTABO_CLIENT_ID:        { required: false }
      CONTABO_CLIENT_SECRET:    { required: false }
      CONTABO_API_USER:         { required: false }
      CONTABO_API_PASSWORD:     { required: false }
      CLOUDFLARE_API_TOKEN:     { required: false }
      FLUX_GITHUB_APP_ID:               { required: false }
      FLUX_GITHUB_APP_INSTALLATION_ID:  { required: false }
      FLUX_GITHUB_APP_PRIVATE_KEY:      { required: false }
      SOPS_AGE_KEY:                     { required: false }
      ETCD_BACKUP_R2_ACCESS_KEY_ID:     { required: false }
      ETCD_BACKUP_R2_SECRET_ACCESS_KEY: { required: false }
      # Omni-host (00-omni-server layer) — Dex OIDC into Omni via a
      # GitHub OAuth App. Required only for the omni-server layer's
      # apply; other layers ignore unrecognised secret names.
      # GitHub reserves the GITHUB_ prefix, so secrets are namespaced
      # under OMNI_DEX_*.
      OMNI_DEX_GITHUB_CLIENT_ID:     { required: false }
      OMNI_DEX_GITHUB_CLIENT_SECRET: { required: false }
      # Operator SSH public key authorised for root login on the
      # omni-host VPS — diagnostics only (Omni stack troubleshooting).
      # Used by 00-omni-server; other layers ignore.
      CONTABO_PUBLIC_SSH_KEY:        { required: false }
      # Service-account key minted in the Omni dashboard (Operator
      # role). Used by layer-03's cluster.tf null_resources to apply
      # machine-classes, sync the cluster template, and label
      # registered machines via omnictl. Other layers ignore.
      OMNI_SERVICE_ACCOUNT_KEY:      { required: false }
      # OCI accounts now come exclusively from production/config/ under R2.
      # The workflow syncs the provider/account YAML files and aggregates them.
      # Repository variable:
      #   OCI_RETAINED_PROFILES   — comma-separated profile names kept provider-only
      #                            for one apply while their resources are destroyed.

jobs:
  run:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write   # for OIDC to OCI
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: "1.10.0"

      - name: Sync R2 inventory to /tmp/inventory/ (node-state module reads from here)
        if: inputs.layer == '00-omni-server' || inputs.layer == '01-contabo-infra' || inputs.layer == '02-oci-storage' || inputs.layer == '02-oracle-infra' || inputs.layer == '02-onprem-infra' || inputs.layer == '03-talos'
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/inventory
          aws s3 sync "s3://cluster-tofu-state/production/inventory/" /tmp/inventory/ \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --region us-east-1 \
            --delete

      # Layer 03 drives Omni via omnictl shell-outs from null_resources.
      # Pinned to the same omnictl release used by sync-cluster-template /
      # regenerate-talos-images so the resource shapes match what's running
      # on the omni-host.
      - name: Install omnictl
        if: inputs.layer == '03-talos'
        env:
          OMNI_VERSION: v1.7.1
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/omnictl \
            "https://github.com/siderolabs/omni/releases/download/$OMNI_VERSION/omnictl-linux-amd64"
          chmod +x /tmp/omnictl
          sudo install -m 0755 /tmp/omnictl /usr/local/bin/omnictl
          rm /tmp/omnictl
          omnictl --version

          # Pin cp/cpd.stawi.org to their A records in /etc/hosts.
          # GitHub-hosted runners are IPv4-only by default; cpd has
          # both A (CF-routable IPv4) and AAAA (omni-host's Contabo
          # static IPv6, used by IPv6-capable Talos clients). Without
          # a hint, glibc's getaddrinfo can return AAAA first and
          # omnictl dials [v6]:443 → "network is unreachable" because
          # the runner has no IPv6 egress route. Pin v4 explicitly so
          # every omnictl invocation in the talos layer's local-exec
          # provisioners (cluster template validate/diff/sync,
          # machine-labels apply) hits the v4 path deterministically.
          for h in cp.stawi.org cpd.stawi.org; do
            ipv4=$(getent ahostsv4 "$h" | awk '/STREAM/{print $1; exit}' || true)
            if [[ -n "$ipv4" ]]; then
              echo "$ipv4 $h" | sudo tee -a /etc/hosts
            fi
          done

      - name: OCI workload-identity federation
        # Fires for any layer that needs OCI provider auth at plan/apply
        # time:
        #   - 02-oracle-infra: per-account OCI compute matrix
        #   - 00-omni-server: provisions the omni-host VM in OCI bwire
        #     (post-PR #156) and needs the bwire profile
        #   - 02-oci-storage: bwire-only buckets + operator CSK
        if: inputs.layer == '02-oracle-infra' || inputs.layer == '00-omni-server' || inputs.layer == '02-oci-storage'
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          TMPDIR_AUTH=$(mktemp -d)
          aws s3 sync "s3://cluster-tofu-state/production/inventory/oracle/" "${TMPDIR_AUTH}/" \
            --endpoint-url "$ENDPOINT" --region us-east-1 \
            --exclude "*" --include "*/auth.yaml" || true
          AUTH_JSON=$(python3 scripts/build-oci-auth-json.py "${TMPDIR_AUTH}")
          if [[ "$AUTH_JSON" == "[]" ]]; then
            echo "::notice::no OCI auth profiles in R2 inventory — skipping WIF setup"
          else
            echo "$AUTH_JSON" > /tmp/oci_auth_accounts.json
            scripts/configure-oci-wif.sh /tmp/oci_auth_accounts.json
          fi

      - name: Stage Talos .oci archive for OCI image import
        if: inputs.layer == '02-oracle-infra'
        # OCI's CreateImage / UpdateImage APIs do NOT expose
        # launchOptions in any SDK or CLI surface — the only way to
        # pin them is via image_metadata.json embedded in a `.oci`
        # archive (qcow2 + JSON, plain tar). OCI auto-detects the
        # archive on import and reads externalLaunchOptions as the
        # image's defaults — exactly what Talos arm64 needs (UEFI_64
        # + fully-paravirtualized virtio so /dev/sda is visible).
        #
        # Schema follows Talos's published template verbatim:
        #   docs.siderolabs.com/talos/v1.13/platform-specific-
        #   installations/cloud-platforms/oracle/
        # Three fields are non-obvious but load-bearing:
        #   * version: 2 (number, NOT "1.0" string) — OCI's parser
        #     rejects unknown schema versions silently and falls back
        #     to no-metadata defaults (ISCSI bootVolumeType — Talos
        #     can't find /dev/sda).
        #   * externalLaunchOptions.launchOptionsSource — without
        #     this, OCI doesn't apply the launchOptions overrides.
        #   * additionalMetadata.shapeCompatibilities — declares
        #     which shapes the metadata is valid for. Lives under
        #     additionalMetadata, not at the top level.
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(/tmp/inventory/oracle/*/auth.yaml)
          if (( ${#files[@]} == 0 )); then
            echo "::notice::no oracle accounts in inventory; skipping OCI image stage"
            exit 0
          fi
          TALOS_VERSION=$(jq -r '.talos_version' tofu/shared/versions.auto.tfvars.json)
          if [[ -z "$TALOS_VERSION" || "$TALOS_VERSION" == "null" ]]; then
            echo "::error::could not read talos_version from tofu/shared/versions.auto.tfvars.json"
            exit 1
          fi
          # The schematic file is static YAML. Tofu may append a
          # `siderolink.api=<url>` extraKernelArg at apply time when
          # var.omni_siderolink_url is non-empty (see image.tf in
          # consuming layers) — but the workflow only needs the base
          # schematic to compute the qcow2 download URL.
          # Capture HTTP code so we can accept any 2xx (factory returns
          # 201 Created on a fresh registration; idempotent reposts
          # may return 200 OK).
          schematic_response=$(curl -sS -w '\n__HTTP__%{http_code}' -X POST \
            https://factory.talos.dev/schematics \
            -H "Content-Type: application/yaml" \
            --data-binary @tofu/shared/schematic.yaml)
          schematic_http=$(echo "$schematic_response" | tail -1 | sed 's/^__HTTP__//')
          schematic_body=$(echo "$schematic_response" | head -n -1)
          if [[ ! "$schematic_http" =~ ^2[0-9][0-9]$ ]]; then
            echo "::error::factory rejected schematic (HTTP $schematic_http): $schematic_body"
            exit 1
          fi
          SCHEMATIC_ID=$(echo "$schematic_body" | jq -r '.id')
          if [[ -z "$SCHEMATIC_ID" || "$SCHEMATIC_ID" == "null" ]]; then
            echo "::error::failed to resolve Talos schematic id"
            exit 1
          fi
          mkdir -p /tmp/talos-oci
          OCI_ARCHIVE="/tmp/talos-oci/talos-${TALOS_VERSION}-${SCHEMATIC_ID}-oracle-arm64.oci"
          if [[ ! -s "$OCI_ARCHIVE" ]]; then
            staging=$(mktemp -d)
            curl -fsSL -o "$staging/image.qcow2" \
              "https://factory.talos.dev/image/${SCHEMATIC_ID}/${TALOS_VERSION}/oracle-arm64.qcow2"
            # Strip leading "v" from talos version — OCI metadata's
            # operatingSystemVersion is unprefixed (e.g. "1.13.0").
            OS_VERSION="${TALOS_VERSION#v}"
            cat > "$staging/image_metadata.json" <<META
          {
            "version": 2,
            "externalLaunchOptions": {
              "firmware": "UEFI_64",
              "networkType": "PARAVIRTUALIZED",
              "bootVolumeType": "PARAVIRTUALIZED",
              "remoteDataVolumeType": "PARAVIRTUALIZED",
              "localDataVolumeType": "PARAVIRTUALIZED",
              "launchOptionsSource": "PARAVIRTUALIZED",
              "pvAttachmentVersion": 2,
              "pvEncryptionInTransitEnabled": true,
              "consistentVolumeNamingEnabled": true
            },
            "imageCapabilityData": null,
            "imageCapsFormatVersion": null,
            "operatingSystem": "Talos",
            "operatingSystemVersion": "${OS_VERSION}",
            "additionalMetadata": {
              "shapeCompatibilities": [
                {
                  "internalShapeName": "VM.Standard.A1.Flex",
                  "ocpuConstraints": null,
                  "memoryConstraints": null
                }
              ]
            }
          }
          META
            tar -cf "$OCI_ARCHIVE" -C "$staging" image.qcow2 image_metadata.json
            rm -rf "$staging"
            echo "built $(stat -c%s "$OCI_ARCHIVE") byte .oci archive"
          else
            echo "already present, reusing"
          fi
          # Variable name retained for state continuity — module's
          # oci_objectstorage_object reads from this path; contents
          # are now a .oci archive instead of a raw qcow2.
          echo "TF_VAR_talos_qcow2_local_path=$OCI_ARCHIVE" >> "$GITHUB_ENV"

      - name: Clear stale state lock
        if: inputs.mode == 'plan' || inputs.mode == 'apply'
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          # Per-account-state layers (01-contabo-infra, 02-oracle-infra,
          # 02-onprem-infra) split state by account. Match the partial-
          # backend key the Init step builds so we clear the right lock
          # object.
          case "${{ inputs.layer }}" in
            01-contabo-infra|02-oracle-infra|02-onprem-infra)
              if [[ -n "${{ inputs.account }}" ]]; then
                LOCK_KEY="production/${{ inputs.layer }}-${{ inputs.account }}.tfstate.tflock"
              else
                LOCK_KEY="production/${{ inputs.layer }}.tfstate.tflock"
              fi
              ;;
            *)
              LOCK_KEY="production/${{ inputs.layer }}.tfstate.tflock"
              ;;
          esac
          # R2 requires a real AWS region name in the CLI even though R2 ignores it.
          aws s3 rm "s3://cluster-tofu-state/${LOCK_KEY}" \
            --endpoint-url "https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com" \
            --region us-east-1 \
            2>&1 | grep -v "NoSuchKey\|^$" || true

      - name: Init
        working-directory: tofu/layers/${{ inputs.layer }}
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          # Required at init too — per-account-state layers
          # (01-contabo-infra, 02-oracle-infra, 02-onprem-infra) have
          # provider/module for_each blocks that transitively depend
          # on var.account_key. Tofu evaluates provider configuration
          # at init to decide which provider plugins to install, so
          # the variable must be set even though init normally doesn't
          # read input variables. Without this, init errors with
          # "Unable to compute static value: local.<provider>_account_keys
          # depends on var.account_key which is not available".
          # Harmless on layers that don't declare the variable (Tofu
          # ignores unrecognized TF_VAR_*).
          TF_VAR_account_key:    ${{ inputs.account }}
        # Retry tofu init up to 3 times — provider signature/checksum
        # fetches from github.com (releases assets) and registry.opentofu.org
        # are flaky, observed 502 Bad Gateway on
        # github.com/.../terraform-provider-sops/.../SHA256SUMS.sig that
        # killed an entire reinstall apply chain. Transient; a retry
        # 30s later succeeds.
        #
        # 01-contabo-infra, 02-oracle-infra and 02-onprem-infra are
        # partial backends (no `key` in backend.tf): this step supplies
        # key=production/<layer>-<account>.tfstate via -backend-config
        # so each account has its own state file. -reconfigure is
        # required because the on-runner .terraform/terraform.tfstate
        # (cached from the previous matrix cell, if any) holds a
        # different backend key. Other layers fall through to the
        # original single-key behavior.
        run: |
          set +e
          case "${{ inputs.layer }}" in
            01-contabo-infra|02-oracle-infra|02-onprem-infra)
              if [[ -n "${{ inputs.account }}" ]]; then
                backend_args=(
                  -backend-config="key=production/${{ inputs.layer }}-${{ inputs.account }}.tfstate"
                  -reconfigure
                )
              else
                backend_args=()
              fi
              ;;
            *)
              backend_args=()
              ;;
          esac
          for attempt in 1 2 3; do
            tofu init \
              -input=false \
              -backend-config="endpoints={s3=\"https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com\"}" \
              "${backend_args[@]}"
            rc=$?
            if [[ $rc -eq 0 ]]; then
              break
            fi
            if [[ $attempt -lt 3 ]]; then
              echo "::warning::tofu init failed (rc=$rc) — retrying in 30s (attempt $attempt/3)"
              sleep 30
              # Drop the partial .terraform dir so the retry redownloads cleanly
              rm -rf .terraform
            fi
          done
          exit "$rc"

      - name: Validate
        working-directory: tofu/layers/${{ inputs.layer }}
        env:
          # Same reason as the Init step — provider for_each depends on
          # var.account_key, and validate evaluates provider config.
          TF_VAR_account_key: ${{ inputs.account }}
        run: tofu validate

      - name: Pre-apply state rm (manual recovery)
        if: inputs.pre_apply_state_rm != ''
        working-directory: tofu/layers/${{ inputs.layer }}
        env:
          AWS_ACCESS_KEY_ID:        ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:    ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
          TF_VAR_account_key:       ${{ inputs.account }}
        run: |
          set -euo pipefail
          for addr in ${{ inputs.pre_apply_state_rm }}; do
            echo "::warning::tofu state rm $addr (manual recovery)"
            tofu state rm "$addr" || echo "::warning::$addr not in state, continuing"
          done

      - name: Plan
        if: inputs.mode == 'plan' || inputs.mode == 'apply'
        working-directory: tofu/layers/${{ inputs.layer }}
        env:
          AWS_ACCESS_KEY_ID:           ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:       ${{ secrets.R2_SECRET_ACCESS_KEY }}
          TF_VAR_r2_account_id:        ${{ secrets.R2_ACCOUNT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_github_app_id:              ${{ secrets.FLUX_GITHUB_APP_ID }}
          TF_VAR_github_app_installation_id: ${{ secrets.FLUX_GITHUB_APP_INSTALLATION_ID }}
          TF_VAR_github_app_private_key:     ${{ secrets.FLUX_GITHUB_APP_PRIVATE_KEY }}
          TF_VAR_sops_age_key:               ${{ secrets.SOPS_AGE_KEY }}
          TF_VAR_etcd_backup_r2_access_key_id:     ${{ secrets.ETCD_BACKUP_R2_ACCESS_KEY_ID }}
          TF_VAR_etcd_backup_r2_secret_access_key: ${{ secrets.ETCD_BACKUP_R2_SECRET_ACCESS_KEY }}
          TF_VAR_age_recipients:                   ${{ vars.SOPS_AGE_RECIPIENTS }}
          # Omni-host (00-omni-server layer). Cloudflare IDs are repo
          # vars; the GitHub OIDC pair is sensitive. Other Omni-host
          # config (Ubuntu image ID, SSH keys, versions) is sourced
          # via tofu data lookups + terraform.tfvars in the layer
          # itself — no workflow-level pass-through needed.
          TF_VAR_cloudflare_account_id:          ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id_antinvestor: ${{ vars.CLOUDFLARE_ZONE_ID_ANTINVESTOR }}
          TF_VAR_cloudflare_zone_id_stawi:       ${{ vars.CLOUDFLARE_ZONE_ID_STAWI }}
          TF_VAR_github_oidc_client_id:          ${{ secrets.OMNI_DEX_GITHUB_CLIENT_ID }}
          TF_VAR_github_oidc_client_secret:      ${{ secrets.OMNI_DEX_GITHUB_CLIENT_SECRET }}
          TF_VAR_contabo_public_ssh_key:         ${{ secrets.CONTABO_PUBLIC_SSH_KEY }}
          # Operator identity for Sidero EULA + Omni initial-admin
          # promotion. Stored as repo Variables (not secrets) — the
          # values aren't sensitive, just operator-specific.
          TF_VAR_omni_eula_name:                 ${{ vars.OMNI_EULA_NAME }}
          TF_VAR_omni_eula_email:                ${{ vars.OMNI_EULA_EMAIL }}
          TF_VAR_omni_initial_users:             ${{ vars.OMNI_INITIAL_USERS }}
          # R2 credentials threaded through to module.omni_host so the
          # on-host omni-backup.timer / omni-restore.service can read+write
          # /var/lib/omni snapshots in s3://cluster-tofu-state/production/
          # omni-backups/. Reuses the workflow's existing R2 credential.
          TF_VAR_r2_access_key_id:               ${{ secrets.R2_ACCESS_KEY_ID }}
          TF_VAR_r2_secret_access_key:           ${{ secrets.R2_SECRET_ACCESS_KEY }}
          # Per-account-state layers (01-contabo-infra, 02-oracle-infra,
          # 02-onprem-infra) read var.account_key to scope their
          # for_each maps to a single account; harmless on layers that
          # don't declare the variable (Terraform ignores unrecognized
          # TF_VAR_*).
          TF_VAR_account_key:                      ${{ inputs.account }}
          SOPS_AGE_KEY:                            ${{ secrets.SOPS_AGE_KEY }}
          EXTRA_PLAN_ARGS:                         ${{ inputs.extra_plan_args }}
          # Layer-03 cluster.tf null_resources call omnictl to apply
          # machine-classes, sync the cluster template, and label
          # machines. omnictl reads the service-account key + endpoint
          # from env. Other layers don't reference these.
          OMNI_SERVICE_ACCOUNT_KEY:                ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}
        # Downstream layers (02/03/04) read upstream remote state that doesn't
        # exist until the first apply lands on main. On a PR pre-bootstrap those
        # plans will fail with "No stored state was found" — that's expected, so
        # in plan mode we soft-fail and surface a workflow warning instead of
        # blocking the PR. In apply mode, all failures are hard.
        #
        # -lock=false on plan: plans are read-only for lock purposes; allowing
        # concurrent plans across PRs prevents cross-ref R2 lockfile collisions
        # (the apply step below keeps locking so state writes stay serialised
        # by the tofu-apply-production concurrency group).
        run: |
          set +e
          # shellcheck disable=SC2086 # intentional word-splitting on extra args
          tofu plan -out=tfplan -input=false -lock=false ${EXTRA_PLAN_ARGS}
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            if [ "${{ inputs.mode }}" = "plan" ] && [[ "${{ inputs.layer }}" =~ ^(02|03|04)- ]]; then
              echo "::warning::plan failed for ${{ inputs.layer }} (exit $rc) — expected pre-bootstrap when upstream remote state is absent. Soft-failing in plan mode."
              exit 0
            fi
            exit $rc
          fi

      # Render plan.json HERE while we still have providers + variables
      # initialised. tofu-plan-regression.yml then reads plan.json with
      # jq directly (no tofu init / no per-layer var.account_key shim).
      - name: Render plan.json for regression check
        if: inputs.mode == 'plan' || inputs.mode == 'apply'
        working-directory: tofu/layers/${{ inputs.layer }}
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          TF_VAR_account_key:    ${{ inputs.account }}
        run: tofu show -json tfplan > plan.json

      # actions/upload-artifact@v4+ refuses duplicate names in a single
      # workflow run. With the per-account oracle matrix, every matrix
      # cell uploads its plan; suffix the artifact name with the account
      # when present so cells don't collide. tofu-plan-regression.yml
      # downloads with a glob so account-suffixed names still match.
      - uses: actions/upload-artifact@v6
        if: inputs.mode == 'plan' || inputs.mode == 'apply'
        with:
          name: tfplan-${{ inputs.layer }}${{ inputs.account != '' && format('-{0}', inputs.account) || '' }}
          path: |
            tofu/layers/${{ inputs.layer }}/tfplan
            tofu/layers/${{ inputs.layer }}/plan.json
          retention-days: 30

      - name: Apply
        if: inputs.mode == 'apply'
        working-directory: tofu/layers/${{ inputs.layer }}
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          TF_VAR_age_recipients: ${{ vars.SOPS_AGE_RECIPIENTS }}
          TF_VAR_account_key:    ${{ inputs.account }}
          SOPS_AGE_KEY:          ${{ secrets.SOPS_AGE_KEY }}
          LAYER:                 ${{ inputs.layer }}
          # Layer-03 cluster.tf null_resources need omnictl auth at
          # apply time too (the local-exec provisioners run during
          # apply, not plan).
          OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}
        run: |
          set -uo pipefail
          # Stream tofu output to console + capture for post-mortem
          # classification of any failures.
          : >/tmp/apply.log
          if tofu apply -input=false -auto-approve tfplan 2>&1 | tee /tmp/apply.log; then
            exit 0
          fi
          rc=${PIPESTATUS[0]}

          # Worker-isolation post-mortem applies only to 02-oracle-infra.
          # Contabo (layer 01) and Talos (layer 03) already implement
          # worker warn-and-continue inside their own provisioner scripts
          # (modules/node-contabo/ensure-image.sh, scripts/talos-apply-or-
          # upgrade.sh). The oracle layer uses tofu's native oci provider
          # whose error model is fail-the-apply binary, so we have to
          # decide soft-vs-hard fail here at the workflow level.
          if [[ "$LAYER" != "02-oracle-infra" ]]; then
            exit "$rc"
          fi

          # Pull the addresses of failed oci_core_instance.this resources
          # out of tofu's error output. Format:
          #   "  with module.oracle_account[\"<acct>\"].module.node[\"<key>\"].oci_core_instance.this,"
          mapfile -t failed_addrs < <(
            grep -oE 'module\.oracle_account\["[^"]+"\]\.module\.node\["[^"]+"\]\.oci_core_instance\.this' /tmp/apply.log \
              | sort -u
          )

          # Count total tofu error blocks (each starts with `╷`). If
          # there are more error blocks than instance-create errors, the
          # remainder are on non-instance resources (VCN, bastion,
          # image, image bucket, etc.) — those gate everything
          # downstream and can't be soft-failed.
          err_total=$(grep -c '^╷' /tmp/apply.log || true)
          err_instance=${#failed_addrs[@]}

          if (( err_instance == 0 )); then
            echo "::error::Apply failed without any oci_core_instance.this errors. Hard-failing."
            exit "$rc"
          fi
          if (( err_total > err_instance )); then
            echo "::error::Mixed errors detected ($err_total total error blocks, $err_instance on instances). Non-instance failures gate downstream layers; hard-failing."
            exit "$rc"
          fi

          # Every failure is on an instance. Classify by role using the
          # already-synced /tmp/inventory/oracle/<acct>/nodes.yaml.
          declare -a worker_keys=() cp_keys=()
          for addr in "${failed_addrs[@]}"; do
            acct=$(sed -E 's/.*oracle_account\["([^"]+)"\].*/\1/' <<<"$addr")
            node_key=$(sed -E 's/.*node\["([^"]+)"\].*/\1/' <<<"$addr")
            role=$(yq -r ".nodes.\"$node_key\".role" \
              "/tmp/inventory/oracle/$acct/nodes.yaml" 2>/dev/null || true)
            [[ -z "$role" || "$role" == "null" ]] && role="worker"
            if [[ "$role" == "controlplane" ]]; then
              cp_keys+=("$acct/$node_key")
            else
              worker_keys+=("$acct/$node_key")
            fi
          done

          if (( ${#cp_keys[@]} > 0 )); then
            echo "::error::Control-plane create failure(s): ${cp_keys[*]}. CP failures gate cluster quorum; hard-failing."
            exit "$rc"
          fi

          echo "::warning::Worker-only create failure(s): ${worker_keys[*]}. Continuing per worker-isolation policy — affected workers absent from tfstate, downstream layers will skip them."
          exit 0

      # When a local-exec provisioner has sensitive env vars, Terraform
      # suppresses its stdout/stderr entirely — which makes it
      # impossible to see what the script reported. modules/node-contabo/
      # ensure-image.sh tees its output to /tmp/ensure-image-*.log. Dump
      # those here so they appear in the job log regardless of whether
      # Apply succeeded or failed.
      - name: Dump ensure-image provisioner logs
        if: always() && inputs.layer == '01-contabo-infra'
        run: |
          shopt -s nullglob
          for f in /tmp/ensure-image-*.log; do
            echo "::group::$f"
            cat "$f" || true
            echo "::endgroup::"
          done
