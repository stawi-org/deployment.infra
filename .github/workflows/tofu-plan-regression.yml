# Catches layers that propose unexpected changes on a steady-state plan.
# Runs after every tofu-plan on main/PR; fails if any layer has a non-zero
# resource diff.
#
# Reads plan.json (rendered upstream by tofu-layer.yml so providers and
# var.account_key are already in scope). Pure jq + bash — no tofu init.
name: tofu-plan-regression
on:
  workflow_run:
    workflows: [tofu-plan]
    types: [completed]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        layer: [01-contabo-infra, 02-oracle-infra, 02-onprem-infra, 02-gcp-infra, 03-talos]
    steps:
      - uses: actions/checkout@v5
      # Per-account-state layers (01-contabo-infra, 02-oracle-infra,
      # 02-onprem-infra, 02-gcp-infra) upload one artifact per account
      # (tfplan-<layer>-<acct>); 03-talos uploads a single
      # tfplan-<layer>. Glob with `*` so the regression check covers
      # every per-account artifact while staying a single download for
      # 03-talos. With v6 + multi-match the artifacts land in
      # `artifacts/<artifact-name>/` — `find` walks them all uniformly.
      - uses: actions/download-artifact@v6
        with:
          pattern: tfplan-${{ matrix.layer }}*
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts
        continue-on-error: true

      - name: Assert zero resource diffs
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t plans < <(find artifacts -name plan.json -type f 2>/dev/null)
          if (( ${#plans[@]} == 0 )); then
            # Empty gcp: [] skips the plan matrix entirely — no artifact.
            if [[ "${{ matrix.layer }}" == "02-gcp-infra" ]]; then
              echo "::notice::no plan.json for 02-gcp-infra (empty gcp matrix or skipped) — ok"
              exit 0
            fi
            echo "::error::no plan.json artifact found for ${{ matrix.layer }}"
            exit 1
          fi
          rc=0
          for p in "${plans[@]}" ; do
            # plan.json may omit resource_changes (null) on empty/failed plans.
            if ! jq -e '.resource_changes | type == "array"' "$p" >/dev/null 2>&1; then
              echo "::warning::$p has no resource_changes array — treating as empty plan"
              continue
            fi
            # Pure ["create"] is expected for newly onboarded accounts /
            # free-tier seed capacity before the first apply. Fail only on
            # updates, deletes, or multi-action changes (replace thrash).
            n=$(jq '[.resource_changes[]?
              | select(.change.actions != ["no-op"]
                       and .change.actions != ["read"]
                       and .change.actions != ["create"])
              ] | length' "$p")
            creates=$(jq '[.resource_changes[]? | select(.change.actions == ["create"])] | length' "$p")
            echo "::notice::artifact=$p thrash-diffs=$n creates=$creates"
            if [ "$creates" -ne 0 ]; then
              echo "::notice::allowing $creates pure create(s) (first-time capacity)"
            fi
            if [ "$n" -ne 0 ]; then
              jq '.resource_changes[]?
                | select(.change.actions != ["no-op"]
                         and .change.actions != ["read"]
                         and .change.actions != ["create"])
                | {address,actions:.change.actions}' "$p"
              echo "::error::$p proposes $n update/delete/replace changes on a steady-state plan"
              rc=1
            fi
          done
          exit "$rc"
