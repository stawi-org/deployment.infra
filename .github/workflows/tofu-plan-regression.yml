# Catches layers that propose unexpected changes on a steady-state plan.
# Runs after every tofu-plan on main/PR; fails if any layer has a non-zero
# resource diff.
name: tofu-plan-regression
on:
  workflow_run:
    workflows: [tofu-plan]
    types: [completed]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        layer: [01-contabo-infra, 02-oracle-infra, 02-onprem-infra, 03-talos]
    steps:
      - uses: actions/checkout@v5
      # The three per-account-state layers (01-contabo-infra,
      # 02-oracle-infra, 02-onprem-infra) upload one tfplan per account
      # (tfplan-<layer>-<acct>); 03-talos uploads a single tfplan-<layer>.
      # Glob with `*` so the regression check covers every per-account
      # artifact while staying a single download for 03-talos.
      # Pin extraction to artifacts/<artifact-name>/<file> via the
      # path: parameter. Without it, actions/download-artifact@v6
      # extracts directly into the workdir on a single-artifact match
      # (different from v4's always-make-subdir behaviour), and the
      # regression check's bash glob found nothing on layers with a
      # single per-account cell (e.g. 01-contabo-infra-bwire,
      # 02-onprem-infra-tindase, 03-talos).
      - uses: actions/download-artifact@v6
        with:
          pattern: tfplan-${{ matrix.layer }}*
          path: artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Assert zero resource diffs
        run: |
          set -euo pipefail
          mapfile -t plans < <(find artifacts -name tfplan -type f 2>/dev/null)
          if (( ${#plans[@]} == 0 )); then
            echo "::error::no tfplan artifact found for ${{ matrix.layer }}"
            ls -laR artifacts/ 2>/dev/null || echo "(artifacts/ does not exist)"
            exit 1
          fi
          rc=0
          for p in "${plans[@]}" ; do
            tofu show -json "$p" > plan.json
            n=$(jq '[.resource_changes[] | select(.change.actions != ["no-op"] and .change.actions != ["read"])] | length' plan.json)
            echo "::notice::artifact=$p non-noop-diffs=$n"
            if [ "$n" -ne 0 ]; then
              jq '.resource_changes[] | select(.change.actions != ["no-op"] and .change.actions != ["read"]) | {address,actions:.change.actions}' plan.json
              echo "::error::$p proposes $n changes on a steady-state plan"
              rc=1
            fi
          done
          exit "$rc"
