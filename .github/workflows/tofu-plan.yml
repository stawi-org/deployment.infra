# .github/workflows/tofu-plan.yml
name: tofu-plan
on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - 'tofu/**'
      - '.github/workflows/tofu-*.yml'

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: tofu-plan-${{ github.ref }}
  cancel-in-progress: true

# Downstream layers (01..04) read from upstream remote state. On a fresh repo
# (or any PR opened before the first apply has landed on main), upstream state
# won't exist yet and those plans will fail with "No stored state was found".
# That's expected pre-bootstrap — mark downstream plan jobs as continue-on-error
# so PR checks don't block merges during initial setup. On main, tofu-apply.yml
# applies in order and these layers get their upstream state before they plan.
jobs:
  secrets:
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-layer.yml
    with: { layer: 00-talos-secrets, mode: plan }
    secrets: inherit
  contabo-infra:
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-layer.yml
    with: { layer: 01-contabo-infra, mode: plan }
    secrets: inherit
    needs: secrets
  # Oracle plans are matrixed per-account to mirror tofu-apply.yml — same
  # reasoning, same per-account-state shape, so plan diffs are scoped to
  # one account at a time.
  read-oracle-accounts:
    needs: secrets
    runs-on: ubuntu-latest
    outputs:
      accounts: ${{ steps.read.outputs.accounts }}
    steps:
      - uses: actions/checkout@v5
      - id: read
        run: |
          set -euo pipefail
          accounts=$(yq -o=json '.oracle' tofu/shared/accounts.yaml | jq -c .)
          echo "accounts=$accounts" >> "$GITHUB_OUTPUT"
          echo "::notice::oracle accounts: $accounts"
  oracle-infra:
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        account: ${{ fromJson(needs.read-oracle-accounts.outputs.accounts) }}
    uses: ./.github/workflows/tofu-layer.yml
    with:
      layer: 02-oracle-infra
      account: ${{ matrix.account }}
      mode: plan
    secrets: inherit
    needs: read-oracle-accounts
  onprem-infra:
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-layer.yml
    with: { layer: 02-onprem-infra, mode: plan }
    secrets: inherit
    needs: secrets
  talos:
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    # Mirror tofu-apply.yml's failure-isolation semantics: a failed
    # oracle matrix cell shouldn't block the talos plan as long as the
    # connectivity-backbone layers planned cleanly.
    if: always() && needs.contabo-infra.result == 'success' && needs.onprem-infra.result == 'success'
    uses: ./.github/workflows/tofu-layer.yml
    with: { layer: 03-talos, mode: plan }
    secrets: inherit
    needs: [contabo-infra, oracle-infra, onprem-infra]
  flux:
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tofu-layer.yml
    with: { layer: 04-flux, mode: plan }
    secrets: inherit
    needs: talos
# continue-on-error is not allowed on reusable-workflow caller jobs; soft-fail
# behaviour for downstream layers (02/03/04 in plan mode) is implemented inside
# tofu-layer.yml's Plan step instead.
