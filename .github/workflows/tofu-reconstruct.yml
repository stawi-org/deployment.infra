# .github/workflows/tofu-reconstruct.yml
#
# Request workflow for destructive cluster reconstruction. Two operations:
#
#   reset     — wipe layer 01-04 R2 state + Cloudflare cp* records + Contabo
#               custom Talos images. Cluster instances themselves are left
#               in place; layer 01's imports.tf re-adopts them on the next
#               apply. Run this when the cluster is in an unrecoverable
#               state and you want a truly clean baseline.
#
#   reinstall — wipe every node's disk via the per-provider reinstall path
#               (Contabo: PUT /compute/instances/{id}, OCI: destroy+create
#               via terraform_data.reinstall_marker). State is preserved;
#               instance identities (and their fixed IPs) survive. Run
#               this when the cluster works but you want to re-image every
#               node from scratch.
#
# Both operations are gated by a request-file-driven PR. Merging the PR
# triggers cluster-reset.yml or cluster-reinstall.yml to perform the
# actual destructive work.
#
# Trigger:
#   gh workflow run tofu-reconstruct.yml --ref main \
#       -f operation=reinstall \
#       -f scope=all \
#       -f confirm=RECONSTRUCT \
#       -f reason="Migrate off generation counters"

name: tofu-reconstruct
on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'reset (wipe state) or reinstall (wipe disks).'
        required: true
        type: choice
        options:
          - reset
          - reinstall
      scope:
        description: 'all (every node) or selected (use the nodes input). Reset is always cluster-wide; this only affects reinstall.'
        required: false
        default: all
        type: choice
        options:
          - all
          - selected
      nodes:
        description: 'Comma-separated node keys when scope=selected (e.g. "contabo-bwire-node-2,oci-bwire-node-1"). Ignored otherwise.'
        required: false
        default: ''
        type: string
      confirm:
        description: 'Type RECONSTRUCT verbatim to confirm.'
        required: true
        type: string
      reason:
        description: 'Short reason — shown in the notification PR.'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: tofu-reconstruct-request
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    env:
      CONFIRM: ${{ inputs.confirm }}
      OPERATION: ${{ inputs.operation }}
      SCOPE: ${{ inputs.scope }}
      NODES: ${{ inputs.nodes }}
    steps:
      - name: Validate inputs
        run: |
          if [[ "$CONFIRM" != "RECONSTRUCT" ]]; then
            echo "::error::confirm input must be the literal string RECONSTRUCT. Got: $CONFIRM"
            exit 1
          fi
          if [[ "$OPERATION" != "reset" && "$OPERATION" != "reinstall" ]]; then
            echo "::error::operation must be reset or reinstall. Got: $OPERATION"
            exit 1
          fi
          if [[ "$OPERATION" == "reinstall" && "$SCOPE" == "selected" && -z "$NODES" ]]; then
            echo "::error::scope=selected requires a non-empty nodes list"
            exit 1
          fi

  request:
    needs: guard
    runs-on: ubuntu-latest
    env:
      ACTOR: ${{ github.triggering_actor }}
      OPERATION: ${{ inputs.operation }}
      SCOPE: ${{ inputs.scope }}
      NODES_RAW: ${{ inputs.nodes }}
      REASON: ${{ inputs.reason }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      RUN_ID: ${{ github.run_id }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Write reconstruction request file
        id: request
        run: |
          set -euo pipefail
          TS="$(date -u +'%Y%m%dT%H%M%SZ')"
          REQUEST_DIR=".github/reconstruction"
          REQUEST_FILE="${REQUEST_DIR}/${OPERATION}-${TS}-${RUN_ID}.yaml"
          mkdir -p "$REQUEST_DIR"

          # For reset, scope is always 'all' regardless of input. For
          # reinstall with scope=all, nodes is ignored. For reinstall
          # with scope=selected, the nodes list is required.
          EFFECTIVE_SCOPE="$SCOPE"
          [[ "$OPERATION" == "reset" ]] && EFFECTIVE_SCOPE="all"

          # Build nodes YAML list from the comma-separated input.
          NODES_YAML="[]"
          if [[ "$OPERATION" == "reinstall" && "$EFFECTIVE_SCOPE" == "selected" ]]; then
            NODES_YAML="["
            FIRST=1
            IFS=',' read -ra NODE_ARR <<< "$NODES_RAW"
            for N in "${NODE_ARR[@]}"; do
              N_TRIM="$(echo "$N" | xargs)"
              [[ -z "$N_TRIM" ]] && continue
              if (( FIRST )); then FIRST=0; else NODES_YAML+=", "; fi
              NODES_YAML+="\"$N_TRIM\""
            done
            NODES_YAML+="]"
          fi

          REQUESTED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          {
            echo "operation: ${OPERATION}"
            echo "scope: ${EFFECTIVE_SCOPE}"
            echo "nodes: ${NODES_YAML}"
            echo "reason: |-"
            # Indent the reason by 2 spaces for YAML block-scalar safety.
            printf '%s\n' "$REASON" | sed 's/^/  /'
            echo "requested_by: ${ACTOR}"
            echo "requested_at: ${REQUESTED_AT}"
            echo "source_run_id: \"${RUN_ID}\""
            echo "source_run_url: ${RUN_URL}"
          } > "$REQUEST_FILE"

          REQUEST_ID="${OPERATION}-${TS}-${RUN_ID}"
          {
            echo "request_file=$REQUEST_FILE"
            echo "request_id=$REQUEST_ID"
            echo "operation=$OPERATION"
            echo "scope=$EFFECTIVE_SCOPE"
            echo "branch=reconstruction/$REQUEST_ID"
            echo "title=[cluster $OPERATION] $REASON"
            echo "label=cluster-$OPERATION"
          } >> "$GITHUB_OUTPUT"

      - name: Open reconstruction PR
        id: pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.request.outputs.branch }}
          commit-message: "cluster ${{ steps.request.outputs.operation }} request ${{ steps.request.outputs.request_id }}"
          title: ${{ steps.request.outputs.title }}
          body: |
            This PR requests a cluster ${{ steps.request.outputs.operation }} (${{ steps.request.outputs.scope }}).

            Merge this PR after approval. The matching workflow on `main`
            (`cluster-${{ steps.request.outputs.operation }}.yml`) triggers on
            the request file landing under `.github/reconstruction/`.
          labels: ${{ steps.request.outputs.label }}
          add-paths: |
            .github/reconstruction
          delete-branch: true

      - name: Summarize
        env:
          PR_URL: ${{ steps.pr.outputs.pull-request-url }}
          OP: ${{ steps.request.outputs.operation }}
        run: |
          echo "::notice::Opened ${OP} PR ${PR_URL}"
