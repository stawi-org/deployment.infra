# .github/workflows/tofu-reinstall.yml
#
# Request workflow for destructive cluster reinstalls / resets.
#
# A user runs this workflow with a reason. It writes a reset-request file under
# `.github/reset-requests/` and opens a PR. The PR must be reviewed and merged
# before the actual reset workflow runs.
#
# Merge path:
#   1. approve the PR
#   2. merge it to main
#   3. .github/workflows/reset-cluster.yml triggers on the push and performs
#      the reset
#
# Trigger:
#   gh workflow run tofu-reinstall.yml --ref main \
#       -f confirm=REINSTALL \
#       -f reason="Baseline to Talos v1.12.6"

name: tofu-reinstall
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type REINSTALL verbatim to confirm.'
        required: true
        type: string
      reason:
        description: 'Short reason — shown in the notification PR.'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: tofu-reset-request
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - env:
          CONFIRM: ${{ inputs.confirm }}
        run: |
          if [[ "$CONFIRM" != "REINSTALL" ]]; then
            echo "::error::`confirm` input must be the literal string REINSTALL. Got: $CONFIRM"
            exit 1
          fi

  request:
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Write reset request file
        id: request
        env:
          ACTOR: ${{ github.triggering_actor }}
          REASON: ${{ inputs.reason }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          REQUEST_ID="$(date -u +'%Y%m%dT%H%M%SZ')-${RUN_ID}"
          REQUEST_DIR=".github/reset-requests"
          REQUEST_FILE="${REQUEST_DIR}/${REQUEST_ID}.yaml"
          mkdir -p "$REQUEST_DIR"
          cat <<EOF | sed 's/^          //' > "$REQUEST_FILE"
          request:
            requested_at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
            requested_by: ${ACTOR}
            reason: |-
              ${REASON}
            source_run_id: ${RUN_ID}
            source_run_url: ${RUN_URL}
          EOF
          echo "request_file=$REQUEST_FILE" >> "$GITHUB_OUTPUT"
          echo "request_id=$REQUEST_ID" >> "$GITHUB_OUTPUT"

      - name: Open reset PR
        id: pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: reset-request/${{ github.run_id }}
          commit-message: "cluster reset request ${{ steps.request.outputs.request_id }}"
          title: "[cluster reset] ${{ inputs.reason }}"
          body: |
            This PR requests a cluster reset.

            Merge this PR after approval to trigger the reset workflow on `main`.
            The reset workflow runs from `.github/workflows/reset-cluster.yml`
            when `.github/reset-requests/**` changes land on `main`.
          labels: cluster-reset
          add-paths: |
            .github/reset-requests
          delete-branch: true

      - name: Summarize
        run: |
          set -euo pipefail
          echo "::notice::Opened reset PR ${{ steps.pr.outputs.pull-request-url }}"
