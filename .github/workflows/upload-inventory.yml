# One-shot workflow: upload a per-account nodes.yaml to R2 at
# production/inventory/<provider>/<account>/nodes.yaml.
#
# Auth files moved into the repo (tofu/shared/accounts/) in PR M2 — this
# workflow no longer handles auth.yaml. Use the bootstrap-oci-oidc.sh
# script (or a direct sops -e edit) to rotate credentials.
#
# All untrusted inputs go through env vars + shell case validation
# before reaching commands.
name: upload-inventory
on:
  workflow_dispatch:
    inputs:
      provider:
        description: "Provider directory (contabo|oracle|onprem)"
        required: true
        type: choice
        options: [contabo, oracle, onprem]
      account:
        description: "Account / location key (no slashes; e.g. bwire)"
        required: true
        type: string
      content_b64:
        description: "Base64-encoded plaintext nodes.yaml body (use base64 -w0)"
        required: true
        type: string

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_ACCESS_KEY_ID:        ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:    ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ACCOUNT_ID:            ${{ secrets.R2_ACCOUNT_ID }}
      PROVIDER:                 ${{ inputs.provider }}
      ACCOUNT:                  ${{ inputs.account }}
      CONTENT_B64:              ${{ inputs.content_b64 }}
    steps:
      - name: Decode + upload
        run: |
          set -euo pipefail
          # Strict input validation — every value used in a path is whitelisted.
          case "$PROVIDER" in contabo|oracle|onprem) ;; *) echo "::error::bad provider"; exit 2 ;; esac
          case "$ACCOUNT"  in *[!a-zA-Z0-9._-]*|""|.*) echo "::error::bad account"; exit 2 ;; esac

          tmp_plain=$(mktemp)
          printf '%s' "$CONTENT_B64" | base64 -d > "$tmp_plain"
          # Validate YAML syntax before upload.
          python3 -c "import sys,yaml; yaml.safe_load(open(sys.argv[1]))" "$tmp_plain"

          KEY="production/inventory/${PROVIDER}/${ACCOUNT}/nodes.yaml"
          aws s3 cp "$tmp_plain" "s3://cluster-tofu-state/${KEY}" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --region us-east-1
          rm -f "$tmp_plain"
          echo "::notice::uploaded ${KEY}"
