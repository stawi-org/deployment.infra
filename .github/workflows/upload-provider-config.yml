# One-shot workflow: upload providers/config/<provider>/<file>.yaml to R2 at
# production/config/<provider>/<file>.yaml. Useful when the gitignored local
# config needs syncing to R2 without operator R2 credentials.
#
# All untrusted inputs are pulled from inputs.* into env vars (per the
# GitHub Actions injection guidance) and validated via shell case before
# concatenation into shell commands.
name: upload-provider-config
on:
  workflow_dispatch:
    inputs:
      provider:
        description: "Provider directory (contabo|oci|onprem)"
        required: true
        type: choice
        options: [contabo, oci, onprem]
      filename:
        description: "Filename inside the provider dir (no slashes)"
        required: true
        type: string
      content_b64:
        description: "Base64-encoded YAML body (use base64 -w0)"
        required: true
        type: string

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_ACCESS_KEY_ID:        ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:    ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ACCOUNT_ID:            ${{ secrets.R2_ACCOUNT_ID }}
      PROVIDER:                 ${{ inputs.provider }}
      FILENAME:                 ${{ inputs.filename }}
      CONTENT_B64:              ${{ inputs.content_b64 }}
    steps:
      - name: Decode + upload
        run: |
          set -euo pipefail
          case "$FILENAME" in
            */*|..*|*/) echo "::error::filename must not contain path separators or .." ; exit 2 ;;
          esac
          case "$PROVIDER" in
            contabo|oci|onprem) ;;
            *) echo "::error::provider must be contabo|oci|onprem" ; exit 2 ;;
          esac
          tmp=$(mktemp)
          printf '%s' "$CONTENT_B64" | base64 -d > "$tmp"
          python3 -c "import sys,yaml; yaml.safe_load(open(sys.argv[1]))" "$tmp"
          KEY="production/config/${PROVIDER}/${FILENAME}"
          aws s3 cp "$tmp" "s3://cluster-tofu-state/${KEY}" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --region us-east-1
          rm -f "$tmp"
          echo "::notice::uploaded ${KEY}"
