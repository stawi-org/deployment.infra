name: validate-flux-gh-secrets
# Sanity-checks the FLUX_GITHUB_APP_* secrets against the actual repo
# Flux syncs from. Fails loudly if any of them are wrong or if the
# app installation doesn't grant access to that repo.
#
# This workflow is INDEPENDENT of which repo it runs from — the Flux
# GitHub App does not need to be installed on deployment.infra.
# We pass the stored installation-id explicitly to the token-mint
# step so it skips the auto-resolve-against-github.repository path
# (which would 404 if the app isn't on this repo).
on:
  workflow_dispatch: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      # Derive the manifests repo slug from the FluxInstance YAML — that
      # file is the source of truth for which repo source-controller
      # syncs from. Avoids drift between the validate workflow and the
      # actual cluster config.
      - name: Resolve manifests repo from fluxcd-setup.yaml
        id: manifests
        run: |
          set -euo pipefail
          URL=$(awk '/^[[:space:]]*url:/ {gsub(/"/,"",$2); print $2; exit}' \
            tofu/layers/04-flux/fluxcd-setup.yaml)
          if [[ -z "$URL" ]]; then
            echo "::error::no spec.sync.url in tofu/layers/04-flux/fluxcd-setup.yaml"
            exit 1
          fi
          # https://github.com/<owner>/<repo>(.git)? → <owner>/<repo>
          SLUG="${URL#https://github.com/}"
          SLUG="${SLUG%.git}"
          if [[ "$SLUG" == "$URL" || -z "$SLUG" ]]; then
            echo "::error::could not parse owner/repo from $URL"
            exit 1
          fi
          OWNER="${SLUG%%/*}"
          REPO="${SLUG#*/}"
          {
            echo "manifests_repo=$SLUG"
            echo "manifests_owner=$OWNER"
            echo "manifests_name=$REPO"
          } >> "$GITHUB_OUTPUT"
          echo "Manifests repo per fluxcd-setup.yaml: $SLUG"

      # Mint a token using the stored installation-id. Source-controller
      # uses the same triple at runtime, so if this works the secret
      # values are fit for purpose. Owner + repositories scope the
      # token to exactly the repo Flux pulls from.
      - name: Mint installation token (manifests repo scope)
        uses: actions/create-github-app-token@v3
        id: tok
        with:
          app-id:          ${{ secrets.FLUX_GITHUB_APP_ID }}
          private-key:     ${{ secrets.FLUX_GITHUB_APP_PRIVATE_KEY }}
          installation-id: ${{ secrets.FLUX_GITHUB_APP_INSTALLATION_ID }}
          owner:           ${{ steps.manifests.outputs.manifests_owner }}
          repositories:    ${{ steps.manifests.outputs.manifests_name }}

      - name: Confirm token reads the Flux-synced manifests repo
        env:
          GH_TOKEN:       ${{ steps.tok.outputs.token }}
          MANIFESTS_REPO: ${{ steps.manifests.outputs.manifests_repo }}
        run: |
          set -euo pipefail
          if ! gh api "repos/${MANIFESTS_REPO}" --jq '.full_name,.private,.visibility' ; then
            echo "::error::The Flux GitHub App installation cannot read ${MANIFESTS_REPO}. Install the app on that repo (or add it to the existing installation's allowed-repos list) at https://github.com/settings/installations, then re-run."
            exit 1
          fi
          echo "✓ App+installation can read ${MANIFESTS_REPO}; source-controller will be able to pull it."
