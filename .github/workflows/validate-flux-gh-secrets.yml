name: validate-flux-gh-secrets
# Sanity-checks the FLUX_GITHUB_APP_* secrets — fails loudly if any are wrong.
# Also verifies the app can reach the manifests repo Flux actually syncs from.
on:
  workflow_dispatch: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      INFRA_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v5

      # Derive the manifests repo slug from the FluxInstance YAML — that
      # file is the source of truth for which repo source-controller
      # syncs from. Avoids drift between the validate workflow and the
      # actual cluster config.
      - name: Resolve manifests repo from fluxcd-setup.yaml
        id: manifests
        run: |
          set -euo pipefail
          URL=$(awk '/^[[:space:]]*url:/ {gsub(/"/,"",$2); print $2; exit}' \
            tofu/layers/04-flux/fluxcd-setup.yaml)
          if [[ -z "$URL" ]]; then
            echo "::error::no spec.sync.url in tofu/layers/04-flux/fluxcd-setup.yaml"
            exit 1
          fi
          # https://github.com/<owner>/<repo>(.git)? → <owner>/<repo>
          SLUG="${URL#https://github.com/}"
          SLUG="${SLUG%.git}"
          if [[ "$SLUG" == "$URL" || -z "$SLUG" ]]; then
            echo "::error::could not parse owner/repo from $URL"
            exit 1
          fi
          echo "manifests_repo=$SLUG" >> "$GITHUB_OUTPUT"
          echo "Manifests repo per fluxcd-setup.yaml: $SLUG"

      # 1. Mint a token; action internally verifies app-id + private-key and
      #    auto-resolves the installation id for this repo.
      - name: Mint installation token
        uses: actions/create-github-app-token@v3
        id: tok
        with:
          app-id:      ${{ secrets.FLUX_GITHUB_APP_ID }}
          private-key: ${{ secrets.FLUX_GITHUB_APP_PRIVATE_KEY }}

      - name: Confirm token works against this repo
        env:
          GH_TOKEN: ${{ steps.tok.outputs.token }}
        run: |
          set -euo pipefail
          gh api "repos/${INFRA_REPO}" --jq '.full_name,.private,.visibility'
          echo "✓ FLUX_GITHUB_APP_ID + FLUX_GITHUB_APP_PRIVATE_KEY valid, and app is installed on ${INFRA_REPO}."

      # 2. Compare FLUX_GITHUB_APP_INSTALLATION_ID against what the action
      #    resolved. GitHub masks secrets even as env vars, so we compare
      #    using string length + sha256 rather than printing values.
      - name: Check FLUX_GITHUB_APP_INSTALLATION_ID matches the resolved installation
        env:
          RESOLVED: ${{ steps.tok.outputs.installation-id }}
          STORED:   ${{ secrets.FLUX_GITHUB_APP_INSTALLATION_ID }}
        run: |
          set -euo pipefail
          RESOLVED_HASH=$(printf '%s' "$RESOLVED" | sha256sum | head -c 16)
          STORED_HASH=$(printf '%s' "$STORED" | sha256sum | head -c 16)
          echo "Resolved installation id (from app-id + private-key): len=${#RESOLVED} hash16=$RESOLVED_HASH"
          echo "Stored FLUX_GITHUB_APP_INSTALLATION_ID:                len=${#STORED}   hash16=$STORED_HASH"
          if [[ "$RESOLVED_HASH" != "$STORED_HASH" ]]; then
            echo "::error::FLUX_GITHUB_APP_INSTALLATION_ID does not match the installation id resolved by the app credentials. Update the secret to match the resolved value."
            exit 1
          fi
          echo "✓ FLUX_GITHUB_APP_INSTALLATION_ID matches. All three FLUX_GITHUB_APP_* secrets are a consistent triple."

      # 3. Confirm the app installation has access to the manifests repo
      #    that source-controller actually syncs from. A common failure mode:
      #    the Flux GitHub App is installed on deployment.infra but not
      #    granted access to deployment.manifests, so source-controller's
      #    GitRepository reconcile fails with 403/404 and Kustomizations
      #    stall waiting for the source. Catch it here instead of via
      #    in-cluster error logs.
      - name: Confirm token works against the Flux-synced manifests repo
        env:
          GH_TOKEN:       ${{ steps.tok.outputs.token }}
          MANIFESTS_REPO: ${{ steps.manifests.outputs.manifests_repo }}
        run: |
          set -euo pipefail
          if ! gh api "repos/${MANIFESTS_REPO}" --jq '.full_name,.private,.visibility' ; then
            echo "::error::The Flux GitHub App cannot read ${MANIFESTS_REPO}. Install the app on that repo (or add it to the existing installation's repo list) at https://github.com/settings/installations and re-run. Without this, source-controller cannot pull the manifests Flux is configured to sync from."
            exit 1
          fi
          echo "✓ App can read ${MANIFESTS_REPO}; source-controller will be able to pull it."
