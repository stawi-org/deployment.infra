name: validate-flux-gh-secrets
# Sanity-checks the FLUX_GITHUB_APP_* secrets — fails loudly if any are wrong.
on:
  workflow_dispatch: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # 1. Mint a token; action internally verifies app-id + private-key and
      #    auto-resolves the installation id for this repo.
      - name: Mint installation token
        uses: actions/create-github-app-token@v3
        id: tok
        with:
          app-id:      ${{ secrets.FLUX_GITHUB_APP_ID }}
          private-key: ${{ secrets.FLUX_GITHUB_APP_PRIVATE_KEY }}

      - name: Confirm token works against this repo
        env:
          GH_TOKEN: ${{ steps.tok.outputs.token }}
        run: |
          set -euo pipefail
          gh api repos/${{ github.repository }} --jq '.full_name,.private,.visibility'
          echo "✓ FLUX_GITHUB_APP_ID + FLUX_GITHUB_APP_PRIVATE_KEY valid, and app is installed on this repo."

      # 2. Compare FLUX_GITHUB_APP_INSTALLATION_ID against what the action
      #    resolved. GitHub masks secrets even as env vars, so we compare
      #    using string length + sha256 rather than printing values.
      - name: Check FLUX_GITHUB_APP_INSTALLATION_ID matches the resolved installation
        env:
          RESOLVED: ${{ steps.tok.outputs.installation-id }}
          STORED:   ${{ secrets.FLUX_GITHUB_APP_INSTALLATION_ID }}
        run: |
          set -euo pipefail
          RESOLVED_HASH=$(printf '%s' "$RESOLVED" | sha256sum | head -c 16)
          STORED_HASH=$(printf '%s' "$STORED" | sha256sum | head -c 16)
          echo "Resolved installation id (from app-id + private-key): len=${#RESOLVED} hash16=$RESOLVED_HASH"
          echo "Stored FLUX_GITHUB_APP_INSTALLATION_ID:                len=${#STORED}   hash16=$STORED_HASH"
          if [[ "$RESOLVED_HASH" != "$STORED_HASH" ]]; then
            echo "::error::FLUX_GITHUB_APP_INSTALLATION_ID does not match the installation id resolved by the app credentials. Update the secret to match the resolved value."
            exit 1
          fi
          echo "✓ FLUX_GITHUB_APP_INSTALLATION_ID matches. All three FLUX_GITHUB_APP_* secrets are a consistent triple."
