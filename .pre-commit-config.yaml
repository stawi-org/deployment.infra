# Pre-commit hooks for deployment.infra
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run -a
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: detect-private-key

  # tofu fmt via local hook — pre-commit-terraform wraps the `terraform` binary;
  # we use tofu, so the formatting invocation is local.
  - repo: local
    hooks:
      - id: tofu-fmt
        name: tofu fmt
        entry: tofu fmt -recursive -diff
        language: system
        pass_filenames: false
        files: '\.tf$|\.tfvars$'

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_tflint
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl

      - id: terraform_trivy
