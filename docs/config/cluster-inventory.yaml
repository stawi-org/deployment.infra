# Example R2 object: s3://cluster-tofu-state/production/config/cluster-inventory.yaml
#
# Canonical inventory for the cluster. This is the preferred source of truth
# for provider/account/site placement. Keep real secrets in the R2 bucket; do
# not commit them to git.

contabo:
  accounts:
    stawi-contabo:
      auth:
        oauth2_client_id: "<clientId>"
        oauth2_client_secret: "<clientSecret>"
        oauth2_user: "<api-user>"
        oauth2_pass: "<api-password>"
      labels:
        node.antinvestor.io/capacity-pool: control-plane
      annotations:
        node.antinvestor.io/account-owner: platform
      nodes:
        kubernetes-controlplane-api-1:
          role: controlplane
          product_id: V94
          region: EU
        kubernetes-controlplane-api-2:
          role: controlplane
          product_id: V94
          region: EU
        kubernetes-controlplane-api-3:
          role: controlplane
          product_id: V94
          region: EU

oci:
  accounts:
    stawi-a:
      tenancy_ocid: ocid1.tenancy.oc1..example
      compartment_ocid: ocid1.compartment.oc1..example
      region: eu-frankfurt-1
      vcn_cidr: 10.200.0.0/16
      enable_ipv6: true
      labels:
        node.antinvestor.io/capacity-pool: ampere-a1
      annotations:
        node.antinvestor.io/account-owner: platform
      auth:
        domain_base_url: https://idcs-example.identity.oraclecloud.com
        oidc_client_identifier: "<clientId>:<clientSecret>"
      workers:
        wk-1:
          shape: VM.Standard.A1.Flex
          ocpus: 4
          memory_gb: 24
          labels:
            node.antinvestor.io/workload-class: edge
          annotations:
            node.antinvestor.io/operator-note: primary-oci-worker
  retained_accounts: {}

onprem:
  locations:
    kampala-hq:
      description: Kampala headquarters
      region: UG
      site_ipv4_cidrs:
        - 192.0.2.0/24
      site_ipv6_cidrs:
        - 2001:db8:10::/64
      nodes:
        rack-1:
          labels:
            node.antinvestor.io/hardware-class: mini-pc
        rack-2:
          annotations:
            node.antinvestor.io/operator-note: dhcp-address-changes
