# Example only — live nodes live in R2 production/inventory/gcp/<account>/nodes.yaml
# Empty inventory: OpenTofu seeds two Spot e2-standard-2 (8 GiB) workers on apply.
#
# Region: europe-west9 (Paris) — closest French GCE region to Marseille.
# CNPG affinity (deployment.manifests) requires role-database=true and
# provider NotIn contabo. GCP nodes force role-database=false so Postgres
# stays on OCI.
gcp:
  accounts:
    stawi-prod:
      project_id: stawi-prod-123456
      region: europe-west9
      vpc_cidr: 10.210.0.0/24
      labels:
        node.stawi.org/capacity-pool: gce-spot
        node.stawi.org/role-database: "false"
      nodes:
        gcp-stawi-prod-node-1:
          role: worker
          machine_type: e2-standard-2
          zone: europe-west9-b
          boot_disk_gb: 50
          preemptible: true
        gcp-stawi-prod-node-2:
          role: worker
          machine_type: e2-standard-2
          zone: europe-west9-b
          boot_disk_gb: 50
          preemptible: true
