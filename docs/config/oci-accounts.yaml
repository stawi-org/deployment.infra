# Example R2 object: s3://cluster-tofu-state/production/config/oci-accounts.yaml
#
# Account keys become OpenTofu provider profile names and node-name prefixes.
# Store this object in the R2 state bucket's config folder, not in git, when it
# contains real tenancy IDs or OIDC client secrets.
accounts:
  stawi-a:
    tenancy_ocid: ocid1.tenancy.oc1..example
    compartment_ocid: ocid1.compartment.oc1..example
    region: eu-frankfurt-1
    vcn_cidr: 10.200.0.0/16
    enable_ipv6: true
    bastion_client_cidr_block_allow_list:
      - 0.0.0.0/0
    labels:
      node.antinvestor.io/capacity-pool: ampere-a1
    annotations:
      node.antinvestor.io/account-owner: platform
    auth:
      domain_base_url: https://idcs-example.identity.oraclecloud.com
      oidc_client_identifier: "<clientId>:<clientSecret>"
    workers:
      wk-1:
        shape: VM.Standard.A1.Flex
        ocpus: 4
        memory_gb: 24
        labels:
          node.antinvestor.io/workload-class: edge
        annotations:
          node.antinvestor.io/operator-note: primary-oci-worker

# Move an account here, or set `retained: true` on an account above, for one
# apply while OpenTofu destroys resources but keeps the OCI provider profile.
retained_accounts: {}
