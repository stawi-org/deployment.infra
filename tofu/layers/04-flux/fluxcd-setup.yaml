---
apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcileEvery: "1h"
    fluxcd.controlplane.io/reconcileTimeout: "5m"
spec:
  distribution:
    version: "2.x"
    registry: "ghcr.io/fluxcd"
    artifact: "oci://ghcr.io/controlplaneio-fluxcd/flux-operator-manifests"
  components:
    - source-controller
    - source-watcher
    - kustomize-controller
    - helm-controller
    - notification-controller
    - image-reflector-controller
    - image-automation-controller
  cluster:
    type: kubernetes
    size: medium
    multitenant: false
    networkPolicy: true
    domain: "cluster.local"
  kustomize:
    patches:
      # Pin every Flux controller Deployment (source-controller,
      # kustomize-controller, helm-controller, notification-controller,
      # image-reflector-controller, image-automation-controller,
      # source-watcher) to the control-plane node. Keeps Flux
      # infrastructure isolated on the CP; application workloads
      # without an explicit CP toleration land only on workers.
      - target:
          kind: Deployment
        patch: |
          - op: replace
            path: /spec/template/spec/nodeSelector
            value:
              kubernetes.io/os: linux
              node-role.kubernetes.io/control-plane: ""
          - op: add
            path: /spec/template/spec/tolerations
            value:
              - key: "CriticalAddonsOnly"
                operator: "Exists"
              - key: "node-role.kubernetes.io/control-plane"
                operator: "Exists"
                effect: "NoSchedule"

      # Bump per-controller reconcile concurrency from the medium-
      # profile default (10 for kustomize/helm, lower for source) up
      # to 20. With ~80 HelmReleases and ~40 Kustomizations across
      # the deployment.manifests tree, default concurrency serialises
      # cold-start. pflag takes the last `--concurrent` value, so
      # appending overrides the profile default cleanly.
      - target:
          kind: Deployment
          name: "(kustomize-controller|helm-controller|source-controller)"
        patch: |
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --concurrent=20

      # Reduce the dependency-requeue interval from 30s default to
      # 10s. Only kustomize-controller and helm-controller have a
      # `dependsOn` graph; everything else ignores this flag. With
      # the deep cross-namespace dependsOn chain in
      # deployment.manifests, 10s shaves minutes off cold-start
      # because blocked Kustomizations re-check predecessors 3× more
      # often.
      - target:
          kind: Deployment
          name: "(kustomize-controller|helm-controller)"
        patch: |
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --requeue-dependency=10s

      # helm-controller copies chart blobs from source-controller over
      # the cluster network. With control-plane nodes split across
      # OCI tenancies (SideroLink), that fetch times out
      # ("failed to copy and verify chart artifact: context deadline
      # exceeded"). Require helm-controller on the same node as
      # source-controller so cold-start installs succeed.
      - target:
          kind: Deployment
          name: helm-controller
        patch: |
          - op: add
            path: /spec/template/spec/affinity
            value:
              podAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchLabels:
                        app: source-controller
                    topologyKey: kubernetes.io/hostname
  sync:
    kind: GitRepository
    provider: github
    url: "https://github.com/stawi-org/deployment.manifests"
    ref: "refs/heads/main"
    # deployment.manifests has the flux-system root Kustomization at
    # the repo root (per its MANIFESTS.md: "The repository root *is*
    # the manifests root; FluxCD reconciles directly from flux-system/
    # here.") — NOT under a leading manifests/ prefix.
    path: "flux-system"
    pullSecret: "ghapp-secret"
