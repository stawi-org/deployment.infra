# Declares which provider/account keys exist. The node-state module uses
# these to know which R2 keys to read. Edit this file to onboard a new
# account; the inventory tree is seeded separately by seed-inventory.sh.
contabo:
  - stawi-contabo
# oracle disabled until operator re-runs scripts/bootstrap-oci-oidc.sh — the
# updated cluster-provisioners-policy (PR #8) needs to land in OCI before
# CreateImage / CreateVcn stop returning 404-NotAuthorizedOrNotFound.
oracle: []
onprem:
  - savannah-hq
