# Omni MachineClass resources, applied via `omnictl apply` from
# the sync-cluster-template workflow before the cluster template.
#
# Format mirrors the upstream libvirt-provider test fixture
# (https://github.com/siderolabs/omni-infra-provider-libvirt/blob/main/test/machineclass.yaml).
# COSI resource shape: metadata.type = MachineClasses.omni.sidero.dev,
# spec.match_labels = list of "key=value" strings (per
# client/api/omni/specs/omni.proto MachineClassSpec).
#
# Earlier attempts failed with "illegal base64 data at input byte 6"
# but at the time the OMNI_SERVICE_ACCOUNT_KEY itself was malformed —
# every omnictl call was failing on auth, surfacing as a misleading
# decoder error. With auth working, the apply path is reachable.
metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: cp
spec:
  match_labels:
    - role=cp
---
metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: workers
spec:
  match_labels:
    - role=worker
