# Omni MachineClass resources — applied via `omnictl apply` from
# the sync-cluster-template workflow before the cluster template
# itself, so the template's machine-set references resolve.
#
# Format mirrors the upstream test fixtures
# (https://github.com/siderolabs/omni-infra-provider-libvirt/blob/main/test/machineclass.yaml):
# COSI resource shape with metadata.type = "MachineClasses.omni.sidero.dev",
# spec carries match_labels (the protobuf field is `match_labels`
# []string per client/api/omni/specs/omni.pb.go MachineClassSpec).
# Each label is a single key=value string.
#
# No `description` field — MachineClassSpec only has match_labels and
# auto_provision; arbitrary keys made omnictl fail at parse time
# ("illegal base64 data at input byte 6" — Omni's apply pipeline
# treated unknown fields as opaque bytes).
metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: cp
spec:
  match_labels:
    - role=cp
---
metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: workers
spec:
  match_labels:
    - role=worker
