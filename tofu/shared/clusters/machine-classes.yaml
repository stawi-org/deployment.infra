# Omni MachineClass resources, applied via `omnictl apply` from
# the sync-cluster-template workflow before the cluster template.
#
# Format mirrors the upstream libvirt-provider test fixture
# (https://github.com/siderolabs/omni-infra-provider-libvirt/blob/main/test/machineclass.yaml).
# COSI resource shape: metadata.type = MachineClasses.omni.sidero.dev,
# protobuf-go-generated MachineClassSpec has the field MatchLabels;
# go-yaml/v4 reflection lowercases it to `matchlabels` (no
# underscore) — same flattening that produces `providerid` /
# `providerdata` in the libvirt fixture for `provider_id` /
# `provider_data`. Snake-case `match_labels` parses without error
# but leaves the spec empty, which Omni rejects with
# "machine class should either have auto provision or match labels
# set" (validated against client/api/omni/specs/omni.proto).
metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: cp
spec:
  matchlabels:
    - role=cp
---
metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: workers
spec:
  matchlabels:
    - role=worker
