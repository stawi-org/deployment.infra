# Omni MachineClass resources — applied via `omnictl apply` from
# the sync-cluster-template workflow before the cluster template
# itself, so the template's machine-set references resolve.
#
# Format mirrors the upstream test fixtures
# (https://github.com/siderolabs/omni-infra-provider-libvirt/blob/main/test/machineclass.yaml):
# COSI resource shape with metadata.type = "MachineClasses.omni.sidero.dev",
# spec carries matchlabels (the protobuf field is `match_labels`
# []string per client/api/omni/specs/omni.proto, but go-yaml/v4
# lowercase-merges the struct's exported name `MatchLabels` to
# `matchlabels` — the libvirt example uses `providerid` /
# `providerdata` for the same reason). Each label is a single
# key=value string.
#
# MachineClassSpec only has match_labels and auto_provision; any
# unknown spec field makes Omni's apply pipeline misparse the block
# ("illegal base64 data at input byte 6").
metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: cp
spec:
  matchlabels:
    - role=cp
---
metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: workers
spec:
  matchlabels:
    - role=worker
