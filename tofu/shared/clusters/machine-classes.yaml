# Omni MachineClass resources, applied via `omnictl apply` by the
# sync-cluster-template workflow on every change under
# tofu/shared/clusters/**.
#
# Selector keys match the labels tofu's per-node `derived_labels`
# emits — see `tofu/modules/node-{contabo,oracle,onprem}/main.tf`.
# Layer-03's `null_resource.omnictl_machine_labels` reconciles those
# labels onto each registered Omni Machine, so machines end up in the
# `cp` or `workers` set automatically.
#
# Format note: COSI resource shape requires metadata.type =
# MachineClasses.omni.sidero.dev. The MachineClassSpec field is
# protobuf MatchLabels; go-yaml/v4 reflection lowercases it to
# `matchlabels` (no underscore) — same flattening that produces
# `providerid` / `providerdata` in the libvirt-provider test fixture
# for `provider_id` / `provider_data`. Snake-case `match_labels`
# parses without error but leaves the spec empty, which Omni rejects
# with "machine class should either have auto provision or match
# labels set".
metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: cp
spec:
  matchlabels:
    - node.antinvestor.io/role=controlplane
---
metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: workers
spec:
  matchlabels:
    - node.antinvestor.io/role=worker
