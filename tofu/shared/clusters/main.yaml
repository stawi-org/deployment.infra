# Omni cluster template for the `stawi` cluster.
#
# Applied via `omnictl cluster template sync` from
# .github/workflows/sync-cluster-template.yml whenever this file
# changes on main. Defines the canonical cluster spec; tofu's role is
# only to provision machines that auto-register against Omni — Omni
# decides what goes where based on the machine class selectors.
#
# Cluster templates accept ONLY the cluster-scoped kinds: Cluster,
# ControlPlane, Workers, ConfigPatch (cluster-level patches). Top-
# level Omni resources like MachineClass live in their own file
# (machine-classes.yaml) and are applied via `omnictl apply` — the
# template references them by name.
#
# Multi-document YAML: one resource per top-level kind. Order is
# Cluster → ControlPlane → Workers, mirroring the layout in Omni's
# docs (https://omni.siderolabs.com/how-to-guides/manage-clusters-
# using-templates/cluster-template-reference).
#
# Machine assignment:
#   Until per-role kernel cmdline initial-labels are baked into the
#   image build pipeline (see `regenerate-talos-images.yml` — TODO),
#   the operator must label machines manually after they register.
#   Either via the Omni dashboard, or:
#     omnictl machine update <machine-id> \
#       --label role=cp           # for control planes
#     omnictl machine update <machine-id> \
#       --label role=worker       # for workers
#   Once labelled, the machine joins the matching machine set
#   automatically (Cluster reconciler).

kind: Cluster
name: stawi
kubernetes:
  # Pinned to match tofu/shared/versions.auto.tfvars.json's
  # `kubernetes_version`. Bumps to the cluster k8s version go in BOTH
  # files in lock-step so tofu and Omni agree.
  version: v1.35.2
talos:
  # Pinned to match tofu/shared/versions.auto.tfvars.json's
  # `talos_version`. The image inventory in
  # tofu/shared/inventory/talos-images.yaml is built with this same
  # version; mismatch produces an upgrade-on-bootstrap.
  version: v1.13.0
features:
  # workload-proxy lets `kubectl --kubeconfig <omni-issued>` route via
  # the Omni dashboard's k8s-proxy without needing direct CP IP
  # access. With the cluster behind CF-proxied DNS, this is the only
  # supported access mode.
  enableWorkloadProxy: true
  # Use Omni's built-in discovery service rather than the public
  # Sidero one (discovery.talos.dev). Omni already maintains the
  # peer-endpoint map for SideroLink; reusing it for KubeSpan node
  # discovery avoids an extra third-party dependency on the cluster
  # bootstrap path. Per Omni docs this is a no-cost flip when Omni
  # is the management plane.
  useEmbeddedDiscoveryService: true
patches:
  # Bootstrap-time manifest delivery: Talos fetches each URL once
  # during cluster bootstrap (initial CP bring-up) and applies the
  # YAML to the cluster before kube-controller-manager declares the
  # cluster ready. Re-runs only on a fresh bootstrap — changing this
  # list on a running cluster does NOT re-apply.
  #
  # The `flux2/install.yaml` artifact is the single-file install for
  # Flux v2: namespace, CRDs (HelmRelease, Kustomization, Git/
  # OCIRepository, Bucket, Receiver, Alert, Provider), the four
  # controllers (source / kustomize / helm / notification), and
  # their RBAC. After bootstrap, Flux is up but idle — operator
  # bootstraps the GitRepository + Kustomization pointing at the
  # config repo (separate manifests, applied via flux CLI or as a
  # second extraManifest once the GitHub App credentials are
  # threaded through as a Secret in cluster).
  #
  # Version pinned to var.flux_version in
  # tofu/shared/versions.auto.tfvars.json — bump in both places when
  # rolling Flux. Talos validates the manifest at apply time so a
  # broken release is caught before the cluster comes up.
  - name: flux-base-install
    inline:
      cluster:
        extraManifests:
          - https://github.com/fluxcd/flux2/releases/download/v2.4.0/install.yaml

  # KubeSpan: direct node-to-node WireGuard mesh for ALL cluster
  # traffic (etcd peer-url, kubelet→apiserver, pod CNI, service mesh).
  # Solves cross-provider routing without per-component patches —
  # nodes can advertise any local IP and KubeSpan tunnels the traffic
  # via each peer's reachable WG endpoint.
  #
  # This is the correct architectural answer to "Contabo CP can't
  # reach OCI CP at 10.0.2.106:2380 for etcd peer membership":
  # KubeSpan establishes a WG tunnel from each Contabo node directly
  # to each OCI node, advertised endpoints are the public IPs that
  # ARE reachable, encrypted traffic flows direct (NOT relayed via
  # the omni-host like SideroLink would do — SideroLink is
  # hub-and-spoke, KubeSpan is full-mesh).
  #
  # Pairs with `features.useEmbeddedDiscoveryService: true` above —
  # nodes learn each other's endpoint via Omni's discovery, then
  # establish KubeSpan tunnels.
  - name: kubespan-enable
    inline:
      machine:
        network:
          kubespan:
            enabled: true

---
# Control-plane machine set. `size` MUST be explicit — leaving it
# unset (or 0) makes Omni's MachineSetController treat the set as
# Static-with-zero-members and bind nothing, even when matching
# machines exist. Three CPs gives etcd quorum tolerance for one CP
# loss; bump to 5 once we have the spare nodes.
kind: ControlPlane
machineClass:
  name: cp
  size: 3
# Cluster-wide KubeSpan handles all cross-CP networking (see the
# Cluster.patches block above), so etcd needs no per-component
# preferential treatment. Earlier iterations of this template
# tried `cluster.etcd.advertisedSubnets` pinned to the SideroLink
# ULA, but SideroLink is hub-and-spoke (every node tunnels to the
# omni-host, no direct node-to-node) — etcd Raft would relay
# through the management plane on every round-trip. KubeSpan fixes
# this at the right layer.

---
# Worker machine set. Same shape; size matches the number of
# machines carrying `node.antinvestor.io/role=worker` in the
# inventory yaml files (oracle-side workers + the on-prem node).
kind: Workers
machineClass:
  name: workers
  size: 3
