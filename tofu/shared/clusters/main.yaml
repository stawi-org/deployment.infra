# Omni cluster template for the `stawi` cluster.
#
# Applied via `omnictl cluster template sync` from
# .github/workflows/sync-cluster-template.yml whenever this file
# changes on main. Defines the canonical cluster spec; tofu's role is
# only to provision machines that auto-register against Omni — Omni
# decides what goes where based on the machine class selectors.
#
# Cluster templates accept ONLY the cluster-scoped kinds: Cluster,
# ControlPlane, Workers, ConfigPatch (cluster-level patches). Top-
# level Omni resources like MachineClass live in their own file
# (machine-classes.yaml) and are applied via `omnictl apply` — the
# template references them by name.
#
# Multi-document YAML: one resource per top-level kind. Order is
# Cluster → ControlPlane → Workers, mirroring the layout in Omni's
# docs (https://omni.siderolabs.com/how-to-guides/manage-clusters-
# using-templates/cluster-template-reference).
#
# Machine assignment:
#   tofu/layers/03-talos/cluster.tf reconciles per-node labels onto
#   each registered Omni Machine via `omnictl apply` of a
#   `MachineLabels.omni.sidero.dev` resource (the `omnictl machine
#   update --label k=v` README example was wrong — that subcommand
#   doesn't exist). Labels come from each upstream node module's
#   `derived_labels` output, including `node.stawi.org/role=
#   {controlplane,worker}` which the machine-classes.yaml selectors
#   match against. So machines auto-bind to `cp` / `workers`
#   MachineSets once labelled.
#
#   TODO: bake the role label into per-role kernel-cmdline initial-
#   labels at image build time so machines are bound to the correct
#   MachineSet immediately on boot, dropping the post-registration
#   label-sync loop entirely. Two paths to investigate:
#     1. Omni's siderolink-api join URL accepts query params that
#        become MachineLabels — would need per-role schematics with
#        `siderolink.api=...?role=cp` (or `worker`) baked into the
#        kernel cmdline.
#     2. Talos's `talos.machine.label.<key>=<value>` kernel args
#        (if supported in the version we're on) — same per-role
#        schematic requirement.
#   Either way needs the sync-talos-images workflow to mint
#   N schematics and the talos-images.yaml schema to grow per-role
#   entries; node modules then pick the right schematic_id based
#   on `var.role`. Substantial pipeline rework; do as a focused PR
#   after validating the exact Omni-side mechanism on a test cluster.

kind: Cluster
name: stawi
kubernetes:
  # Pinned to match tofu/shared/versions.auto.tfvars.json's
  # `kubernetes_version`. Bumps to the cluster k8s version go in BOTH
  # files in lock-step so tofu and Omni agree.
  version: v1.36.0
talos:
  # Pinned to match tofu/shared/versions.auto.tfvars.json's
  # `talos_version`. The image inventory in
  # tofu/shared/inventory/talos-images.yaml is built with this same
  # version; mismatch produces an upgrade-on-bootstrap.
  version: v1.13.0
features:
  # workload-proxy lets `kubectl --kubeconfig <omni-issued>` route via
  # the Omni dashboard's k8s-proxy without needing direct CP IP
  # access. With the cluster behind CF-proxied DNS, this is the only
  # supported access mode.
  enableWorkloadProxy: true
  # Use Omni's embedded discovery service for KubeSpan peer
  # discovery (rather than Sidero's public discovery.talos.dev). The
  # cluster is behind CF-proxied DNS and outbound connections from
  # OCI VCNs to public discovery often hit egress filtering on cold
  # boot — keeping discovery endpoint inside Omni avoids that.
  # KubeSpan (machine.network.kubespan.enabled below in patches:)
  # needs cluster.discovery.enabled=true AND a working discovery
  # registry; the embedded one couples those settings directly to
  # the Omni-managed cluster identity.
  useEmbeddedDiscoveryService: true
  # Cluster-etcd backup cadence. Omni takes a point-in-time-consistent
  # raft snapshot every `interval` and uploads it via the destination
  # configured by the global EtcdBackupS3Configs resource (see
  # tofu/shared/clusters/etcd-backup-s3-configs.yaml.tmpl + the
  # sync-cluster-template workflow).
  #
  # NOTE: this lives under `features.backupConfiguration` (not at
  # cluster top level) per Omni's cluster-template schema — top-
  # level placement fails template validation with
  # "field backupConfiguration not found in type models.Cluster".
  #
  # Effective only when the omni-server has --etcd-backup-s3 set
  # (controlled by var.etcd_backup_enabled in tofu/layers/00-omni-
  # server/terraform.tfvars). Without that flag the field is parsed
  # but no backups happen — strictly safe to leave on either way.
  backupConfiguration:
    interval: 1h
patches:
  # Cluster-wide LinkAliasConfig: makes `wan0` resolve to each node's
  # first physical Ethernet interface. MUST precede any per-node
  # LinkConfig that references `wan0` — Omni applies cluster-template
  # patches to every Machine, so order is positional within this list.
  #
  # Inlined (rather than `file: ../patches/...`) because Omni's
  # cluster-template `file:` resolution goes through filepath.Abs(path)
  # (see siderolabs/omni client/pkg/template/internal/models/patch.go),
  # which resolves relative to the process CWD — not relative to the
  # template file's directory. The sync-cluster-template workflow
  # invokes `omnictl cluster template validate -f tofu/shared/clusters/
  # main.yaml` from the repo root, so any `../patches/...` path lands
  # outside the os.Root-restricted area and fails.
  #
  # Selector + alias rationale:
  #   - `link.driver == "virtio_net"`: Talos's CEL binding for
  #     LinkStatus exposes `link.type` as an int (netlink ARPHRD
  #     enum, not the YAML-string-rendered name), so the natural-
  #     looking `link.type == "ether"` fails CEL type-check with:
  #       found no matching overload for '_==_' applied to (int, string)
  #     Confirmed empirically via ClusterMachineConfigStatuses
  #     after 0930fe2 landed. `link.driver` is string-typed, matches
  #     the documented Talos v1.13 example for LinkAliasConfig, and
  #     is what the 490ae67-retired patch had used. Every current
  #     cluster node — Contabo VPS (KVM virtio_net, confirmed via
  #     MachineStatus.network.networklinks.description="Red Hat,
  #     Inc. Virtio network device") and OCI A1.Flex (paravirt
  #     virtio_net) — exposes its uplink under this driver. On-prem
  #     bare-metal (out of scope per the 2026-05-03 realignment)
  #     would need a different selector if it returns to scope.
  #   - `wan%d` rather than fixed `wan`: a fixed alias requires the
  #     selector to match exactly one link, or Talos rejects the doc.
  #     `wan%d` accepts multiple matches and assigns sequential
  #     aliases. Single-uplink nodes (every current cluster node) get
  #     `wan0` deterministically; multi-NIC nodes (future on-prem
  #     or Contabo Private Networking) get non-deterministic
  #     enumeration and would need a per-node MAC-pinned override.
  - name: link-alias
    inline:
      apiVersion: v1alpha1
      kind: LinkAliasConfig
      name: wan%d
      selector:
        match: link.driver == "virtio_net"
  # Dual-stack networking. Adds IPv6 pod + service CIDRs alongside the
  # existing IPv4 ones so workloads, services, and ClusterIPs all get
  # both v4 and v6. Talos's default Flannel CNI supports this.
  #
  # ULA prefixes used:
  #   pod IPv6:     fd00:10:244::/56  (mirrors the v4 10.244/16 by
  #                                   convention; /56 leaves room for
  #                                   ~256 nodes with /64 each)
  #   service IPv6: fd00:10:96::/108  (Kubernetes recommends /108
  #                                   for service CIDRs to keep
  #                                   service IP allocation fast)
  #
  # Note: this is a CLUSTER-LEVEL setting that takes effect at first
  # bootstrap only — Kubernetes can't switch from single-stack to
  # dual-stack at runtime. Adding/removing this patch on a running
  # cluster requires a cluster re-creation (omnictl cluster delete +
  # template sync).
  - name: dual-stack
    inline:
      cluster:
        network:
          podSubnets:
            - fd00:10:244::/56
            - 10.244.0.0/16
          serviceSubnets:
            - fd00:10:96::/108
            - 10.96.0.0/12
          # MTU note: pod traffic crosses KubeSpan WireGuard tunnels
          # cluster-wide. WG MTU is 1420; Flannel's VXLAN backend
          # adds 50 bytes, so pod MTU must be ≤ 1370 to avoid
          # cross-node TCP/TLS handshake blackhole on cert-chain
          # replies. Tried `cni.flannel.extraArgs: [--iface=kubespan]`
          # to make Flannel auto-detect MTU from WG, but the
          # KubeSpan iface is IPv6-only and Flannel's --iface
          # mandates an IPv4 address ("Could not find valid
          # interface matching kubespan: failed to find IPv4 address
          # for interface kubespan"). Instead, we patch kube-flannel-
          # cfg's net-conf.json with `Backend.MTU: 1370` via Flux
          # (deployment.manifests/providers/network/), which Flannel
          # honors and propagates as FLANNEL_MTU=1320 to every pod
          # veth pair. Verified: pod eth0 MTU drops 8950 → 1320,
          # cross-node TLS handshake succeeds.
      # Kubelet needs `--node-ip` to include both v4 and v6 so each
      # node reports both InternalIPs and gets a v6 podCIDR. Without
      # this, kubelet auto-detects only the primary v4 address and
      # the cluster effectively stays single-stack for node IPs.
      #
      # validSubnets order matches the IPv6-FIRST family ordering
      # above. The first matching family becomes kubelet's primary
      # nodeIP, which kube-apiserver derives its advertise-address
      # from via POD_IP. K8s requires the primary service-cluster-ip-
      # range family to match this advertise-address family — listing
      # ::/0 first ensures v6 wins on every node that has a routable
      # v6, satisfying the apiserver's family-match check.
      #
      # Explicit EXCLUDE of the SideroLink ULA so kubelet doesn't
      # pick the WG management address as nodeIP (it's a hub-spoke
      # tunnel address, not a routable cluster-internal address).
      machine:
        kubelet:
          nodeIP:
            validSubnets:
              - "::/0"
              - 0.0.0.0/0
              - "!fdae:41e4:649b:9303::/64"
  # IPv6 enablement + tuning, cluster-wide. Mirrors the antinvestor/
  # deployments Ansible roles' common.yaml — that setup runs IPv6-
  # first dual-stack on Contabo + OCI without issue, and the sysctls
  # below are the load-bearing portion. Listing them ALL ensures
  # Contabo nodes can:
  #   - RFC4861 RA acceptance even when forwarding is on (default
  #     accept_ra=1 ignores RAs when forwarding=1, which kube-proxy +
  #     CNI both flip on; without =2 no v6 default route lands and
  #     kube-flannel crash-loops with "unable to find default v6
  #     route"). Note: on a node with a fully-static LinkConfig
  #     (v6 + gateway), accept_ra is moot — the route is already
  #     there. We keep =2 as a safety net for any future v6 route
  #     re-derivation.
  #   - Forwarding turned on for both families so flannel-VXLAN over
  #     v6 works between nodes (kube-proxy expects forwarding=1).
  #   - NDP gateway-discovery tuning that the antinvestor/deployments
  #     roles found necessary on Contabo's `fe80::1` link-local
  #     gateway — the default neighbor-cache base_reachable_time of
  #     30s flapped the v6 default route under load.
  #   - Bridge netfilter for v6 so kube-proxy's iptables-rules
  #     module on bridged traffic also fires for ip6tables. Without
  #     this, v6 service-IP DNAT breaks for pods on the same node.
  #
  # Cluster-wide instead of per-account: harmless on OCI nodes (their
  # v6 is delivered statically via OCI metadata; no RAs in flight to
  # accept anyway, and the NDP tuning matches Linux defaults from the
  # OCI side). Avoids needing a per-machine ConfigPatch + Omni
  # selector machinery for what's strictly tuning.
  - name: machine-tuning
    inline:
      machine:
        sysctls:
          # File descriptors — chart sidecars + flannel + kube-proxy
          # collectively open many fds.
          fs.file-max: "2000000"
          # Balanced backlogs for moderate ingress.
          net.core.somaxconn: "262144"
          net.core.netdev_max_backlog: "131072"
          net.ipv4.tcp_max_syn_backlog: "131072"
          # Socket buffers tuned to handle bulk transfers (image pulls,
          # etcd snapshots, flannel VXLAN payloads).
          net.core.rmem_default: "8388608"
          net.core.wmem_default: "8388608"
          net.core.rmem_max: "67108864"
          net.core.wmem_max: "67108864"
          net.ipv4.tcp_rmem: "4096 87380 67108864"
          net.ipv4.tcp_wmem: "4096 65536 67108864"
          # Conntrack — Service IP DNAT path.
          net.netfilter.nf_conntrack_max: "1048576"
          net.netfilter.nf_conntrack_tcp_timeout_established: "86400"
          # TCP behaviour.
          net.ipv4.tcp_fin_timeout: "15"
          net.ipv4.tcp_tw_reuse: "0"
          net.ipv4.tcp_slow_start_after_idle: "0"
          # Keepalive (safe for both v4/v6).
          net.ipv4.tcp_keepalive_time: "300"
          net.ipv4.tcp_keepalive_intvl: "30"
          net.ipv4.tcp_keepalive_probes: "5"
          # IPv6 — fully enabled and tuned for dual-stack. The block
          # below mirrors antinvestor/deployments common.yaml exactly.
          net.bridge.bridge-nf-call-iptables: "1"
          net.bridge.bridge-nf-call-ip6tables: "1"
          net.ipv6.conf.all.disable_ipv6: "0"
          net.ipv6.conf.default.disable_ipv6: "0"
          net.ipv6.conf.all.forwarding: "1"
          net.ipv6.conf.default.forwarding: "1"
          net.ipv6.conf.all.accept_ra: "2"
          net.ipv6.conf.default.accept_ra: "2"
          # ICMPv6 ratelimit + DAD enabled for proper RFC4861 NDP.
          net.ipv6.icmp.ratelimit: "1000"
          net.ipv6.conf.all.accept_dad: "1"
          net.ipv6.conf.default.accept_dad: "1"
          # NDP cache tuning for Contabo's `fe80::1` link-local
          # gateway — Ansible's roles found these necessary or the v6
          # default route flapped under load.
          net.ipv6.neigh.default.base_reachable_time_ms: "120000"
          net.ipv6.neigh.default.gc_stale_time: "240"
          net.ipv6.neigh.default.delay_first_probe_time: "10"
          net.ipv6.neigh.default.mcast_solicit: "6"
  # DNS resolvers. Mirrors antinvestor/deployments resolvers.yaml —
  # IPv6-first list to align with the IPv6-first podSubnet/serviceSubnet
  # ordering. Talos v1.13 requires each entry to be a `{address: ...}`
  # object (bare strings were dropped in v1.13).
  - name: dns
    inline:
      apiVersion: v1alpha1
      kind: ResolverConfig
      nameservers:
        - address: "2a02:c207::1:53"        # Contabo IPv6
        - address: "2606:4700:4700::1111"   # Cloudflare IPv6
        - address: "2606:4700:4700::1001"   # Cloudflare IPv6
        - address: "2001:4860:4860::8888"   # Google IPv6
        - address: "213.136.95.10"          # Contabo IPv4
        - address: "213.136.95.11"          # Contabo IPv4
        - address: "1.1.1.1"                # Cloudflare IPv4 fallback
        - address: "8.8.8.8"                # Google IPv4 fallback
  # NTP servers — mirrors antinvestor/deployments timesync.yaml. Talos's
  # default is time.cloudflare.com only; widening to pool.ntp.org adds
  # redundancy.
  - name: time
    inline:
      apiVersion: v1alpha1
      kind: TimeSyncConfig
      ntp:
        servers:
          - pool.ntp.org
          - time.cloudflare.com
  # KubeSpan: Talos's full-mesh WireGuard between every cluster
  # member. Each node runs an outbound-initiated WG tunnel to every
  # other node; cross-provider traffic punches through Contabo and
  # OCI VCN firewalls because both ends are dialing OUT (provider
  # security lists block inbound v6 service ports cross-provider but
  # not inbound replies to outbound flows).
  #
  # Why we need this: kube-apiserver → OCI worker kubelet:10250 over
  # public v6 was timing out, and pods on OCI couldn't reach the
  # kubernetes Service ClusterIP fd00:10:96::1 (DNATs to the CP's
  # public v6) — both because cross-provider v6 isn't permitted in
  # the OCI VCN's default security lists. KubeSpan transparently
  # handles ALL inter-node traffic via its WG mesh, so flannel
  # VXLAN, kube-proxy DNAT, and apiserver→kubelet all just work
  # regardless of the underlying provider firewalls.
  #
  # Discovery: KubeSpan needs nodes to find each other's WG public
  # keys + endpoint candidates. cluster.discovery.enabled=true
  # turns that on; the registry choice lives at the discovery
  # registries level. We enable the SERVICE registry (Omni's
  # embedded discovery via features.useEmbeddedDiscoveryService=
  # true above) and disable the KUBERNETES registry — the latter
  # races bootstrap (k8s api isn't up yet during initial peering),
  # while service is the canonical Talos-native registry.
  #
  # Apply path: this is a per-machine config patch. After the
  # sync-cluster-template push, each node's machined picks up the
  # new config and the KubeSpan service comes up without a reboot
  # (verified by `talosctl get kubespanpeerstatuses` which lists
  # connected peers when the mesh is healthy). A reboot is only
  # needed if a node's machineconfig was previously rejected and
  # held in a half-applied state — recover via contabo-reboot-vps
  # or `omnictl machine reboot`.
  - name: kubespan
    inline:
      machine:
        network:
          kubespan:
            enabled: true
      cluster:
        discovery:
          enabled: true
          registries:
            kubernetes:
              disabled: true
            service: {}
  # Volume layout — every cluster node carves three volumes from its
  # system disk. Mirror of tofu/shared/patches/storage.yaml split into
  # individual single-doc inline patches because Omni's cluster-template
  # `inline:` field accepts ONE v1alpha1 document per patch.
  #
  #   1. EPHEMERAL — resizes the default Talos ephemeral volume to a
  #      bounded 15-20GB so it doesn't crowd out the other volumes on
  #      smaller VPSes.
  #   2. swap-vol  — 3-4GiB swap volume on every node. Talos doesn't
  #      use swap by default; this lets memory-pressured pods survive
  #      brief spikes without OOM-killing.
  #   3. local-path-provisioner — the rest of the disk as an xfs
  #      partition auto-mounted at /var/mnt/local-path-provisioner
  #      (Talos derives the mount path from the UserVolumeConfig
  #      name). Rancher's local-path-provisioner ConfigMap points
  #      its nodePathMap at this directory; it then carves a per-PV
  #      subdirectory for every PVC. Name follows Sidero's docs at
  #      https://docs.siderolabs.com/kubernetes-guides/csi/local-storage.
  - name: storage-ephemeral
    inline:
      apiVersion: v1alpha1
      kind: VolumeConfig
      name: EPHEMERAL
      provisioning:
        diskSelector:
          match: system_disk
        minSize: 15GB
        maxSize: 20GB
  - name: storage-swap
    inline:
      apiVersion: v1alpha1
      kind: SwapVolumeConfig
      name: swap-vol
      provisioning:
        diskSelector:
          match: system_disk
        minSize: 3GiB
        maxSize: 4GiB
  - name: storage-local-path-provisioner
    inline:
      apiVersion: v1alpha1
      kind: UserVolumeConfig
      name: local-path-provisioner
      provisioning:
        diskSelector:
          match: system_disk
        minSize: 30GB
        grow: true
      filesystem:
        type: xfs
# NOTE: Flux extraManifests was removed 2026-05-01 (1+ hour cluster
# bootstrap stall — a 656KB manifest in cluster.extraManifests caused
# timing issues on slow OCI ARM nodes). Flux is now installed via
# the standalone deploy-flux.yml workflow against the running
# cluster instead — same outcome, no bootstrap-time fetch on every
# node. KubeSpan, the OTHER previously-deferred patch, is enabled
# above (re-introduced 2026-05-06 after the IPv6-first dualstack
# work made cross-provider routing the next blocker).

---
# Control-plane machine set.
#
# size:1 reflects a deliberate architectural choice for this cluster.
# With CPs spread across Contabo (public IPv4) and OCI (NAT'd private
# IPv4 + ephemeral public IPv4), etcd peer URLs that work for one
# provider are unreachable from the other:
#   - Public IPv4 on Contabo → not reachable on OCI peers (their
#     "public IPv4" is a NAT translation; inbound from internet doesn't
#     hit the Talos node).
#   - Private IPv4 on OCI → not reachable from Contabo (different VPC).
#   - SideroLink ULA (fdae:.../64) — was the "obvious" pick because
#     every CP has one and the WG mesh proves omni-host reaches each
#     peer. But Omni's siderolink is hub-and-spoke, and the WG peer
#     allowed-ips on each Talos node only cover the omni-host's own
#     /128, so cross-CP packets get dropped at the WG layer even with
#     IPv6 forwarding enabled on the hub. Proven empirically 2026-05:
#     after gen=8 OCI bump + IPv6-forwarding on the hub, etcd ports
#     2379/2380 stayed `connection refused` on every CP indefinitely.
#
# Single-CP avoids the cross-provider etcd peering problem entirely.
# Trade-off: no HA — losing the CP loses the cluster API until it
# recovers — but the omni-backup tarball captures /var/lib/omni
# hourly, so a CP-host failure is recoverable via Contabo PUT-based
# reinstall + omni-restore. We'll re-introduce HA as part of a
# separate KubeSpan-or-equivalent full-mesh PR.
#
# Current sole CP: contabo-bwire-node-2 (Talos; Contabo bare-VPS).
#
# size is rendered at sync time by .github/workflows/sync-cluster-
# template.yml — it counts R2-inventory nodes with role=controlplane
# AND provider_data.status=running. The integer here is a
# validation-only placeholder; edits to it are overwritten on every
# sync. To change the intended CP count, edit the R2 inventory
# (providers/config/<provider>/<account>.yaml → upload-inventory.yml
# → R2) and let the next sync render the new size.
kind: ControlPlane
machineClass:
  name: cp
  size: 1

---
# Worker machine set.
#
# size is rendered at sync time from the R2 inventory's count of
# nodes with role=worker AND provider_data.status=running. See the
# ControlPlane block above for the same rationale and the operator
# flow for changing it. The integer here is a validation-only
# placeholder.
#
# Counting only provider_data.status=running has two implications:
#   - declared-but-not-yet-provisioned entries (OCI cells stuck in
#     Out-of-Capacity, onprem placeholders) are excluded, so the
#     MachineSet never sits ScalingUp waiting for a VM that doesn't
#     exist.
#   - the moment a tofu-apply create succeeds, R2's nodes-writer
#     flips status to "running" and the workflow_run trigger fires
#     sync-cluster-template, which renders the new count and binds
#     the node.
#
# Cross-account redundancy on prod.<zone>: LB-targeted workers
# (carrying node.stawi.org/external-load-balancer=true) are
# spread across distinct accounts so single-account outages don't
# take the ingress pool down.
kind: Workers
machineClass:
  name: workers
  size: 1
