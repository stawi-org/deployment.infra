---
# tofu/shared/patches/cluster-network.yaml
#
# Cluster-wide dual-stack network, IPv6-first. Matches Ansible's
# talos_pod_subnets / talos_service_subnets so the same Contabo-backed
# cluster identity + PKI continues to work.
#
# /112 is the max service CIDR size for IPv6 in Kubernetes.
#
# CNI: Talos's built-in Flannel. Starting with Talos v1.13.0, this
# bundle ships an embedded NetworkPolicy controller (kube-router-style
# enforcement via iptables) — standard k8s NetworkPolicy resources
# applied via Flux are honored cluster-wide without an extra CNI
# (Cilium / Calico) layer. No CNI override needed here; Talos defaults
# to flannel and the v1.13 update is the policy enforcement.

cluster:
  # Allow workloads on control-plane nodes. Cluster is small (3 CPs, few
  # workers), so spreading pods across CPs saves capacity.
  allowSchedulingOnControlPlanes: true
  network:
    podSubnets:
      - fd00:10:244::/48
      - 10.244.0.0/16
    serviceSubnets:
      - fd00:10:96::/112
      - 10.96.0.0/12
