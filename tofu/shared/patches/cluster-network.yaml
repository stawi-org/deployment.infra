---
# tofu/shared/patches/cluster-network.yaml
#
# Reference dual-stack + CNI document. LIVE Omni apply path is the
# dual-stack / related patches inlined in tofu/shared/clusters/main.yaml
# (Omni cluster-template `file:` resolution is CWD-relative — see
# main.yaml comments). Keep CIDRs and CNI name in lock-step with that
# template.
#
# CNI choice for this fleet: Talos built-in Flannel (not Calico).
# Multi-provider (OCI NAT + Contabo public + GCP Spot) with KubeSpan
# WireGuard full-mesh means pod traffic already rides encrypted tunnels.
# Flannel VXLAN on top is simple, dual-stack proven, and does not fight
# nested encapsulation the way Calico eBPF dataplane does on mixed
# public/NAT fabrics. NetworkPolicy can be opted in via Flannel's
# kube-network-policies without changing the CNI. See docs/topology.md.

cluster:
  # Allow workloads on control-plane nodes. Cluster is small (3 CPs, few
  # workers), so spreading pods across CPs saves capacity.
  allowSchedulingOnControlPlanes: true
  network:
    cni:
      name: flannel
      # NetworkPolicy via kube-network-policies (Talos ≥1.13). Safe to
      # enable once all nodes are on ≥1.13.7; no-ops if controllers lag.
      flannel:
        kubeNetworkPoliciesEnabled: true
    podSubnets:
      # Match main.yaml dual-stack patch (IPv6-first).
      - fd00:10:244::/56
      - 10.244.0.0/16
    serviceSubnets:
      - fd00:10:96::/108
      - 10.96.0.0/12
