---
version: v1alpha1 # Indicates the schema used to decode the contents.
# Provides machine specific configuration options.
machine:
  install:
    wipe: true # Indicates if the installation disk should be wiped at installation time.
    # /dev/sda is what every provider here presents under a paravirt-
    # SCSI transport: Contabo VPSes directly, OCI once the .oci
    # archive's image_metadata.json forces bootVolumeType =
    # PARAVIRTUALIZED (see modules/oracle-account-infra/image.tf).
    disk: /dev/sda
  network:
    # KubeSpan: WireGuard mesh for low-ops cross-provider connectivity.
    # Contabo public, OCI public, on-prem behind NAT — all peer up via
    # discovery.talos.dev without per-provider VPN wiring.
    #
    # Past blackhole incident (documented so we don't regress): on a
    # bootstrap node with no reachable peers yet, Talos installed a
    # kubespan default route at metric 1 above the physical-link 1024.
    # Outbound responses got eaten by the dead tunnel. Guard is now
    # threefold:
    #   1. cluster.discovery.registries.service is explicitly enabled
    #      (see cluster-network.yaml's discovery block) so peers find
    #      each other via Sidero's discovery.talos.dev.
    #   2. Re-enabling only after at least one stable peer exists means
    #      a newly-booted node has somewhere to handshake to.
    #   3. advertiseKubernetesNetworks left at default (false) — the
    #      kubespan interface only gets pod/service traffic, never
    #      carries the default route for general internet egress.
    kubespan:
      enabled: true
    # Note: DNS nameservers are configured via ResolverConfig (resolvers.yaml)
    # Note: NTP servers are configured via TimeSyncConfig (timesync.yaml)
  kernel:
    modules:
      - name: nf_conntrack
      - name: br_netfilter
      - name: ipv6            # Ensure IPv6 module is loaded
  kubelet:
    extraArgs:
      rotate-server-certificates: true
    extraConfig:
      maxOpenFiles: 2097152
  sysctls:
    # File descriptors
    fs.file-max: "2000000"

    # Balanced backlog
    net.core.somaxconn: "262144"
    net.core.netdev_max_backlog: "131072"
    net.ipv4.tcp_max_syn_backlog: "131072"

    # Socket buffers (balanced)
    net.core.rmem_default: "8388608"
    net.core.wmem_default: "8388608"
    net.core.rmem_max: "67108864"
    net.core.wmem_max: "67108864"
    net.ipv4.tcp_rmem: "4096 87380 67108864"
    net.ipv4.tcp_wmem: "4096 65536 67108864"

    # Conntrack (balanced)
    net.netfilter.nf_conntrack_max: "1048576"
    net.netfilter.nf_conntrack_tcp_timeout_established: "86400" # 1 day

    # TCP behavior
    net.ipv4.tcp_fin_timeout: "15"
    net.ipv4.tcp_tw_reuse: "0"
    net.ipv4.tcp_slow_start_after_idle: "0"

    # Keepalive (safe for both)
    net.ipv4.tcp_keepalive_time: "300"
    net.ipv4.tcp_keepalive_intvl: "30"
    net.ipv4.tcp_keepalive_probes: "5"

    # IPv6 – fully enabled and optimized for dual-stack
    net.bridge.bridge-nf-call-iptables: "1"
    net.bridge.bridge-nf-call-ip6tables: "1"
    net.ipv6.conf.all.disable_ipv6: "0"
    net.ipv6.conf.default.disable_ipv6: "0"
    net.ipv6.conf.all.forwarding: "1"
    net.ipv6.conf.default.forwarding: "1"
    # Accept router advertisements even when forwarding is enabled
    net.ipv6.conf.all.accept_ra: "2"
    net.ipv6.conf.default.accept_ra: "2"
    # Contabo-specific: RFC4861 compliance for NDP gateway discovery
    net.ipv6.icmp.ratelimit: "1000"
    net.ipv6.conf.all.accept_dad: "1"
    net.ipv6.conf.default.accept_dad: "1"
    # NDP cache tuning for Contabo gateway (fe80::1) reliability
    net.ipv6.neigh.default.base_reachable_time_ms: "120000"
    net.ipv6.neigh.default.gc_stale_time: "240"
    net.ipv6.neigh.default.delay_first_probe_time: "10"
    net.ipv6.neigh.default.mcast_solicit: "6"

cluster:
  # this enables cluster vpn encryption
  discovery:
    enabled: true
    registries:
      kubernetes:
        disabled: true # Recommended when control plane is reachable via KubeSpan
      service: {}
  extraManifests:
    # Pinned versions for reproducible builds and supply chain security
    # kubelet-serving-cert-approver v0.8.7 (2024-01-15)
    - https://raw.githubusercontent.com/alex1989hu/kubelet-serving-cert-approver/v0.8.7/deploy/standalone-install.yaml
    # metrics-server v0.7.2 (2024-10-01)
    - https://github.com/kubernetes-sigs/metrics-server/releases/download/v0.7.2/components.yaml
