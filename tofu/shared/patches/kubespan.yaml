---
# tofu/shared/patches/kubespan.yaml
#
# LIVE APPLY PATH: Omni cluster template tofu/shared/clusters/main.yaml
# (patches: kubespan + cluster-discovery). Keep this file aligned.
#
# Talos v1.13 multi-doc KubeSpanConfig (preferred). The legacy
# machine.network.kubespan form is deprecated and no longer used here.
#
# KubeSpan: throughput-oriented WireGuard mesh across every provider.
# Contabo / OCI / GCP / on-prem peer via Omni embedded discovery —
# features.useEmbeddedDiscoveryService=true on the Cluster template.
# Design goal: high aggregate goodput regardless of locality
# (see docs/network-throughput.md).
#
# Past blackhole incident (documented so we don't regress): on a
# bootstrap node with no reachable peers yet, Talos installed a
# kubespan default route at metric 1 above the physical-link 1024.
# Guard is threefold:
#   1. cluster.discovery + service registry enabled (cluster-discovery
#      patch in main.yaml).
#   2. advertiseKubernetesNetworks: false — never steal default route.
#   3. allowDownPeerBypass: true — partial mesh still routes.

apiVersion: v1alpha1
kind: KubeSpanConfig
enabled: true
advertiseKubernetesNetworks: false
mtu: 1380
allowDownPeerBypass: true
