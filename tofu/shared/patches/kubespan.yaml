---
# tofu/shared/patches/kubespan.yaml
#
# KubeSpan configuration as a strategic merge patch on the legacy
# inline `machine.network.kubespan` block. Talos v1.13 introduced
# a standalone `KubeSpanConfig` multi-doc kind for this, but the
# Talos v1.13.0 oracle-arm64 qcow2's maintenance-mode parser
# rejects that kind ("KubeSpanConfig" "v1alpha1": not registered)
# despite the qcow2's OS-release reporting v1.13.0 — a likely
# build-pipeline lag where maintenance-mode binaries are built
# from an earlier point in the v1.13 release lifecycle than the
# installed-Talos binary that runs after first reboot. The inline
# form is still accepted by v1.13.0 (deprecation, not removal),
# and works in both maintenance-mode and running-mode parsers.
#
# LIVE APPLY PATH: Omni cluster template tofu/shared/clusters/main.yaml
# (patch name: kubespan). Keep this file aligned when changing MTU/flags.
#
# KubeSpan: throughput-oriented WireGuard mesh across every provider.
# Contabo / OCI / GCP / on-prem peer via discovery.talos.dev — no
# per-provider VPN. Design goal: high aggregate goodput *regardless of
# locality* (see docs/network-throughput.md). Latency co-location is
# optional; the mesh must stay full-mesh and loss-resistant.
#
# Past blackhole incident (documented so we don't regress): on a
# bootstrap node with no reachable peers yet, Talos installed a
# kubespan default route at metric 1 above the physical-link 1024.
# Outbound responses got eaten by the dead tunnel. Guard is now
# threefold:
#   1. cluster.discovery.registries.service is explicitly enabled
#      (see common.yaml's discovery block) so peers find each
#      other via Sidero's discovery.talos.dev.
#   2. Re-enabling only after at least one stable peer exists
#      means a newly-booted node has somewhere to handshake to.
#   3. advertiseKubernetesNetworks left at false — the kubespan
#      interface only gets pod/service traffic, never carries the
#      default route for general internet egress.
machine:
  network:
    kubespan:
      enabled: true
      # Pinned explicitly so a future operator reading this knows
      # the past-incident reason without having to grep history.
      advertiseKubernetesNetworks: false
      # Multi-cloud: slightly under 1420 so WG + Flannel/VXLAN + path
      # MTU quirks do not fragment. Loss from oversize MTU destroys
      # throughput far more than a few smaller packets.
      mtu: 1380
      # If a peer is down on the mesh, allow non-mesh routes to still
      # work (robustness when discovery is partial).
      allowDownPeerBypass: true
