

---

apiVersion: v1alpha1
kind: VolumeConfig
name: EPHEMERAL
provisioning:
  diskSelector:
    match: system_disk
  minSize: 15GB
  maxSize: 20GB

---

apiVersion: v1alpha1
kind: SwapVolumeConfig
name: swap-vol
provisioning:
  diskSelector:
    match: system_disk
  minSize: 3GiB
  maxSize: 4GiB

---
# local-path-provisioner data partition: consumes ALL remaining disk
# on every node. Talos auto-mounts a UserVolumeConfig at
# /var/mnt/<name>, so naming this `local-path-provisioner` pins the
# mount at /var/mnt/local-path-provisioner — the path Rancher's
# local-path-provisioner ConfigMap carves PV subdirectories under,
# per Sidero's documented setup
# (https://docs.siderolabs.com/kubernetes-guides/csi/local-storage).
# This is the ONLY user volume.
apiVersion: v1alpha1
kind: UserVolumeConfig
name: local-path-provisioner
provisioning:
  diskSelector:
    match: system_disk
  minSize: 30GB
  grow: true
filesystem:
  type: xfs
