# see : https://docs.siderolabs.com/talos/v1.12/platform-specific-installations/boot-assets

customization:
  extraKernelArgs:
    - ipv6.disable=0
    # IPv6 optimizations for Contabo
    - ipv6.autoconf=0        # Disable SLAAC, we use static config
  systemExtensions:
    officialExtensions:
      # Include useful extensions for networking diagnostics
      - siderolabs/util-linux-tools
