# tofu/shared/schematic.yaml
#
# Static base for the Talos Image Factory schematic. The workflow's
# "Stage Talos .oci archive" step uploads this verbatim to compute
# the schematic_id used in qcow2 download URLs. Tofu's
# talos_image_factory_schematic resource reads this same file and
# may append additional extraKernelArgs at apply time (notably
# `siderolink.api=...` when var.omni_siderolink_url is non-empty —
# see image.tf in each layer that consumes the schematic). The
# append produces a different schematic_id, which forces an image
# rebuild — exactly what we want when the SideroLink URL changes.

customization:
  extraKernelArgs:
    - ipv6.disable=0
    # ipv6.autoconf=1 (re-enabled 2026-05-05): see the longer
    # rationale block in tofu/shared/schematics/cluster.yaml — the
    # prior `=0` made static LinkConfig the only path to IPv6 and
    # caused live-delta disruption on Contabo nodes when applied.
    # Re-enabling kernel autoconf lets RAs configure IPv6 cleanly.
    - ipv6.autoconf=1
  systemExtensions:
    officialExtensions:
      - siderolabs/util-linux-tools
      # NOTE: SideroLink is built into Talos core (the apid daemon
      # parses siderolink.api= from /proc/cmdline at boot). No extension
      # is required to wire nodes to Omni — adding `siderolabs/
      # siderolink-agent` here used to fail with "official extension
      # ... is not available for Talos version v1.13.0" because that
      # extension does not exist in the factory catalog.
