# Cluster Talos image schematic — fed to Omni's image factory.
#
# Omni mints images from this customization YAML; the factory ID is a
# SHA256 of the rendered output. When this file changes, the image URL
# at https://cp.stawi.org/image/<schematic-id>/<version>/<format>
# changes too, and the regenerate-talos-images workflow uploads the new
# variants to R2 (and to OCI Object Storage for the OCI accounts).
#
# Omni adds the SideroLink kernel args itself when serving the image —
# we deliberately do NOT include `siderolink.api=` here so the same
# schematic stays valid across Omni reinstalls (the URL changes on a
# new Omni master key but the schematic doesn't).
customization:
  extraKernelArgs:
    - ipv6.disable=0
    # ipv6.autoconf=1 (re-enabled 2026-05-05): the prior `=0` setting
    # disabled kernel-level IPv6 autoconfiguration entirely, which
    # made static LinkConfig the only path to IPv6 on the node.
    # On the Omni-managed flow that meant per-node ConfigPatch
    # LinkConfigs applied as live deltas to running kernels, which
    # disrupted Contabo nodes' networking on every patch change
    # (regression history: PR #177, root-caused via
    # ClusterMachineConfigStatuses dump in PR #179).
    #
    # With `=1` the kernel does standard SLAAC: accepts Router
    # Advertisements and derives a usable IPv6 + default route on
    # any uplink that receives them. OCI nodes already get IPv6 via
    # Talos's OCI platform driver — unaffected. Contabo nodes pick
    # up RAs (combined with the cluster-wide `accept_ra=2` sysctl
    # in tofu/shared/clusters/main.yaml's contabo-ipv6-ra patch).
    # No per-node static LinkConfig required — the live-delta
    # disruption is structurally avoided.
    - ipv6.autoconf=1
    # Vendor-namespaced no-op arg whose only purpose is to bump the
    # rendered schematic_id when we need to force a fleet-wide reinstall
    # without changing real Talos / k8s versions. The kernel logs unknown
    # args at boot but ignores them. Bump the date+seq when re-rolling
    # the cluster (e.g. to refresh SideroLink registrations after an
    # Omni-host backup-restore left the public-key store stale, OR to
    # roll out the autoconf change above).
    - cluster.regen-token=2026-05-05-1
  systemExtensions:
    officialExtensions:
      - siderolabs/util-linux-tools
