# Cluster Talos image schematic — fed to Omni's image factory.
#
# Omni mints images from this customization YAML; the factory ID is a
# SHA256 of the rendered output. When this file changes, the image URL
# at https://cp.stawi.org/image/<schematic-id>/<version>/<format>
# changes too, and the regenerate-talos-images workflow uploads the new
# variants to R2 (and to OCI Object Storage for the OCI accounts).
#
# Omni adds the SideroLink kernel args itself when serving the image —
# we deliberately do NOT include `siderolink.api=` here so the same
# schematic stays valid across Omni reinstalls (the URL changes on a
# new Omni master key but the schematic doesn't).
customization:
  extraKernelArgs:
    - ipv6.disable=0
    # ipv6.autoconf=0 — restored 2026-05-05 after `=1` left Contabo
    # VPSes in an unbootable state (post-reinstall: nodes responded
    # to ICMP but Talos apid never came up, Omni "CONFIGURING"
    # indefinitely). Suspected interaction between SLAAC during
    # boot and Contabo's RA delivery; not fully root-caused.
    # Revert to known-working `=0` + ICR token bump to roll the
    # cluster back to the prior schematic. Keeping the constraint
    # that Contabo nodes have no IPv6 at the link level — same as
    # pre-#177 state. Cluster-level dual-stack (pod/service IPv6
    # subnets) still works through flannel-on-SideroLink-ULA tunnels.
    - ipv6.autoconf=0
    # Vendor-namespaced no-op arg whose only purpose is to bump the
    # rendered schematic_id when we need to force a fleet-wide reinstall
    # without changing real Talos / k8s versions.
    - cluster.regen-token=2026-05-05-2
  systemExtensions:
    officialExtensions:
      - siderolabs/util-linux-tools
